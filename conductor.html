<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Las Catalinas - Conductor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-logo {
            font-size: 3rem; margin-bottom: 10px;
        }
        .login-title {
            font-size: 1.8rem; font-weight: 700; margin-bottom: 5px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            color: #888; margin-bottom: 40px; font-size: 0.95rem;
        }
        .login-form {
            width: 100%; max-width: 320px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; color: #fff; font-size: 1rem;
            outline: none; transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #00d4ff; background: rgba(255,255,255,0.12);
        }
        .btn-primary {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none; border-radius: 12px; color: #fff;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== APP LAYOUT ===== */
        #app { display: none; height: 100vh; flex-direction: column; }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .header-info h3 { font-size: 0.95rem; font-weight: 600; }
        .header-info p { font-size: 0.75rem; color: #00d4ff; }
        .header-status {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .status-online {
            background: rgba(0, 212, 255, 0.15); color: #00d4ff; border: 1px solid rgba(0,212,255,0.3);
        }
        .status-offline {
            background: rgba(255, 71, 87, 0.15); color: #ff4757; border: 1px solid rgba(255,71,87,0.3);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-online .status-dot { background: #00d4ff; }
        .status-offline .status-dot { background: #ff4757; animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* ===== MAP ===== */
        #map {
            flex: 1; min-height: 0;
            background: #1a1a1a;
        }
        .leaflet-container { background: #1a1a1a !important; }

        /* ===== BOTTOM PANEL ===== */
        .bottom-panel {
            background: linear-gradient(180deg, #1a1a2e, #0f0f0f);
            border-top: 1px solid rgba(255,255,255,0.08);
            max-height: 45vh; min-height: 60px;
            display: flex; flex-direction: column;
            transition: max-height 0.3s ease;
        }
        .panel-handle {
            display: flex; align-items: center; justify-content: center;
            padding: 8px; cursor: pointer;
        }
        .panel-handle-bar {
            width: 40px; height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.2);
        }
        .panel-content {
            flex: 1; overflow-y: auto; padding: 0 16px 16px;
        }
        .panel-tabs {
            display: flex; gap: 8px; margin-bottom: 12px;
        }
        .panel-tab {
            flex: 1; padding: 10px; text-align: center;
            background: rgba(255,255,255,0.05); border-radius: 10px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; border: 1px solid transparent;
        }
        .panel-tab.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0,212,255,0.3); color: #00d4ff;
        }

        /* ===== TRIP CARDS ===== */
        .trip-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 14px;
            margin-bottom: 10px; cursor: pointer;
            transition: all 0.2s;
        }
        .trip-card:hover { background: rgba(255,255,255,0.08); }
        .trip-card.active-trip {
            border-color: rgba(0,212,255,0.4);
            background: rgba(0,212,255,0.08);
        }
        .trip-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 10px;
        }
        .trip-passenger {
            display: flex; align-items: center; gap: 10px;
        }
        .passenger-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 700;
        }
        .passenger-info h4 { font-size: 0.95rem; font-weight: 600; }
        .passenger-info p { font-size: 0.75rem; color: #888; }
        .trip-price {
            text-align: right;
        }
        .trip-price .amount {
            font-size: 1.3rem; font-weight: 700; color: #00d4ff;
        }
        .trip-price .distance {
            font-size: 0.75rem; color: #888;
        }
        .trip-route {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 10px;
        }
        .route-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .route-dot.pickup { background: #00d4ff; }
        .route-dot.dropoff { background: #ff6b6b; }
        .route-line {
            width: 2px; height: 24px; background: rgba(255,255,255,0.15);
            margin-left: 4px;
        }
        .route-text {
            font-size: 0.8rem; color: #ccc; line-height: 1.4;
        }
        .trip-actions {
            display: flex; gap: 8px;
        }
        .btn-action {
            flex: 1; padding: 12px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            border: none; transition: all 0.2s;
        }
        .btn-accept {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }
        .btn-reject {
            background: rgba(255,71,87,0.15); color: #ff4757;
            border: 1px solid rgba(255,71,87,0.3);
        }
        .btn-navigate {
            background: linear-gradient(135deg, #2ed573, #1e90ff);
            color: #fff;
        }
        .btn-complete {
            background: linear-gradient(135deg, #ffa502, #ff6348);
            color: #fff;
        }
        .btn-cancel {
            background: rgba(255,71,87,0.15); color: #ff4757;
            border: 1px solid rgba(255,71,87,0.3);
        }

        /* ===== ACTIVE TRIP OVERLAY ===== */
        .active-trip-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, transparent, rgba(15,15,15,0.95));
            padding: 20px 16px 16px; z-index: 500;
            display: none;
        }
        .active-trip-overlay.visible { display: block; }
        .trip-progress-bar {
            height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; margin-bottom: 12px; overflow: hidden;
        }
        .trip-progress-fill {
            height: 100%; background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 2px; transition: width 0.5s ease;
        }
        .trip-timer {
            text-align: center; margin-bottom: 12px;
        }
        .trip-timer .time {
            font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums;
        }
        .trip-timer .label {
            font-size: 0.75rem; color: #888;
        }

        /* ===== CUSTOM MARKERS ===== */
        .custom-marker {
            background: none; border: none;
        }
        .marker-pulse {
            width: 20px; height: 20px; border-radius: 50%;
            background: #00d4ff; position: relative;
        }
        .marker-pulse::after {
            content: ''; position: absolute; inset: -8px;
            border-radius: 50%; border: 2px solid #00d4ff;
            animation: markerPulse 2s infinite;
        }
        @keyframes markerPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .marker-car {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,212,255,0.4);
            border: 2px solid #fff;
        }
        .marker-passenger {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            border: 2px solid #fff;
        }
        .marker-destination {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #2ed573, #1e90ff);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(46,213,115,0.4);
            border: 2px solid #fff;
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed; top: 80px; left: 16px; right: 16px;
            z-index: 9998; display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: rgba(30,30,50,0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 14px 16px;
            display: flex; align-items: center; gap: 12px;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 4.7s forwards;
            pointer-events: auto;
        }
        .toast-icon { font-size: 1.3rem; }
        .toast-content h4 { font-size: 0.9rem; font-weight: 600; }
        .toast-content p { font-size: 0.8rem; color: #aaa; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            position: fixed; inset: 0; z-index: 9997;
            background: rgba(15,15,15,0.9);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
        }
        .loading-overlay.visible { display: flex; }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: #666;
        }
        .empty-state i { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
        .empty-state h3 { font-size: 1rem; margin-bottom: 6px; }
        .empty-state p { font-size: 0.85rem; }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex; justify-content: space-around;
            padding: 10px 16px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.1rem; font-weight: 700; color: #00d4ff; }
        .stat-label { font-size: 0.7rem; color: #888; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 380px) {
            .login-title { font-size: 1.5rem; }
            .trip-price .amount { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
    <div class="login-logo">🚕</div>
    <div class="login-title">TuMovil Conductor</div>
    <div class="login-subtitle">Las Catalinas</div>
    <form class="login-form" id="loginForm">
        <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" id="driverName" placeholder="Ej: Juan Pérez" required>
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="driverPhone" placeholder="Ej: 1133667793" required>
        </div>
        <div class="form-group">
            <label>Patente del vehículo</label>
            <input type="text" id="driverPlate" placeholder="Ej: ABC123" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Entrar como Conductor
        </button>
    </form>
</div>

<!-- ===== APP ===== -->
<div id="app">
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-avatar">🚕</div>
            <div class="header-info">
                <h3 id="driverNameDisplay">Conductor</h3>
                <p id="driverPlateDisplay">Patente: -</p>
            </div>
        </div>
        <div class="header-status status-online" id="statusToggle">
            <div class="status-dot"></div>
            <span id="statusText">Online</span>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="statEarnings">$0</div>
            <div class="stat-label">Ganancias hoy</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statTrips">0</div>
            <div class="stat-label">Viajes hoy</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statRating">5.0</div>
            <div class="stat-label">Rating</div>
        </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Active Trip Overlay -->
    <div class="active-trip-overlay" id="activeTripOverlay">
        <div class="trip-progress-bar">
            <div class="trip-progress-fill" id="tripProgress" style="width: 0%"></div>
        </div>
        <div class="trip-timer">
            <div class="time" id="tripTimer">00:00</div>
            <div class="label" id="tripTimerLabel">Tiempo de viaje</div>
        </div>
        <div class="trip-actions">
            <button class="btn-action btn-navigate" id="btnNavigate">
                <i class="fas fa-location-arrow"></i> Navegar
            </button>
            <button class="btn-action btn-complete" id="btnComplete">
                <i class="fas fa-check"></i> Finalizar
            </button>
            <button class="btn-action btn-cancel" id="btnCancel">
                <i class="fas fa-times"></i> Cancelar
            </button>
        </div>
    </div>

    <!-- Bottom Panel -->
    <div class="bottom-panel" id="bottomPanel">
        <div class="panel-handle" id="panelHandle">
            <div class="panel-handle-bar"></div>
        </div>
        <div class="panel-content">
            <div class="panel-tabs">
                <div class="panel-tab active" data-tab="pending">
                    <i class="fas fa-clock"></i> Pendientes
                    <span id="pendingCount" style="background:#00d4ff;color:#000;padding:2px 6px;border-radius:10px;font-size:0.7rem;margin-left:4px;">0</span>
                </div>
                <div class="panel-tab" data-tab="active">
                    <i class="fas fa-car"></i> Mi Viaje
                </div>
                <div class="panel-tab" data-tab="history">
                    <i class="fas fa-history"></i> Historial
                </div>
            </div>
            <div id="panelContent">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p id="loadingText">Cargando...</p>
</div>

<script>
// ===== CONFIG =====
const SUPABASE_URL = 'https://tu-proyecto.supabase.co';  // REEMPLAZAR
const SUPABASE_KEY = 'tu-anon-key';  // REEMPLAZAR
const OSRM_URL = 'https://router.project-osrm.org/route/v1/driving/';
const UPDATE_INTERVAL = 5000; // 5 segundos

// ===== STATE =====
let supabase, map, driver = null, currentTrip = null;
let pendingTrips = [], tripHistory = [];
let locationWatchId = null, locationUpdateInterval = null;
let tripStartTime = null, tripTimerInterval = null;
let realtimeChannel = null, activeTab = 'pending';
let routeLayer = null, markers = {};
let isOnline = true, earningsToday = 0, tripsToday = 0;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    initMap();
    loadDriverFromStorage();
    setupEventListeners();
});

function initMap() {
    map = L.map('map', {
        zoomControl: false,
        attributionControl: false
    }).setView([-34.6037, -58.3816], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // Custom locate control
    const locateBtn = L.control({position: 'topright'});
    locateBtn.onAdd = () => {
        const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
        div.innerHTML = `<a href="#" style="background:#1a1a2e;color:#00d4ff;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border-radius:4px;text-decoration:none;"><i class="fas fa-crosshairs"></i></a>`;
        div.onclick = (e) => { e.preventDefault(); centerOnDriver(); };
        return div;
    };
    locateBtn.addTo(map);
}

function setupEventListeners() {
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    document.getElementById('statusToggle').addEventListener('click', toggleOnlineStatus);
    document.getElementById('panelHandle').addEventListener('click', togglePanel);
    document.getElementById('btnNavigate').addEventListener('click', openNavigation);
    document.getElementById('btnComplete').addEventListener('click', completeTrip);
    document.getElementById('btnCancel').addEventListener('click', cancelTrip);

    document.querySelectorAll('.panel-tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
}

// ===== LOGIN =====
function handleLogin(e) {
    e.preventDefault();
    const name = document.getElementById('driverName').value.trim();
    const phone = document.getElementById('driverPhone').value.trim();
    const plate = document.getElementById('driverPlate').value.trim().toUpperCase();

    if (!name || !phone || !plate) return;

    driver = {
        id: 'drv_' + Date.now(),
        nombre: name,
        telefono: phone,
        patente: plate,
        lat: null,
        lng: null
    };

    localStorage.setItem('tumovil_driver', JSON.stringify(driver));
    showApp();
}

function loadDriverFromStorage() {
    const stored = localStorage.getItem('tumovil_driver');
    if (stored) {
        driver = JSON.parse(stored);
        showApp();
    }
}

function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('driverNameDisplay').textContent = driver.nombre;
    document.getElementById('driverPlateDisplay').textContent = 'Patente: ' + driver.patente;

    startLocationTracking();
    loadPendingTrips();
    setupRealtime();
    loadTripHistory();
}

// ===== LOCATION TRACKING =====
function startLocationTracking() {
    if (!navigator.geolocation) {
        showToast('error', 'GPS no disponible', 'Tu dispositivo no soporta geolocalización');
        return;
    }

    locationWatchId = navigator.geolocation.watchPosition(
        (pos) => {
            driver.lat = pos.coords.latitude;
            driver.lng = pos.coords.longitude;
            updateDriverMarker();
            map.setView([driver.lat, driver.lng], 16);

            // If has active trip, update location in DB
            if (currentTrip && isOnline) {
                updateDriverLocation();
            }
        },
        (err) => {
            console.error('GPS error:', err);
            showToast('error', 'Error GPS', err.message);
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );

    // Periodic DB updates
    locationUpdateInterval = setInterval(() => {
        if (currentTrip && driver.lat && isOnline) {
            updateDriverLocation();
        }
    }, UPDATE_INTERVAL);
}

function updateDriverLocation() {
    if (!currentTrip || !driver.lat) return;

    supabase.rpc('actualizar_ubicacion_conductor', {
        p_viaje_id: currentTrip.id,
        p_lat: driver.lat,
        p_lng: driver.lng
    }).catch(err => console.error('Error updating location:', err));
}

function updateDriverMarker() {
    if (!driver.lat) return;

    if (markers.driver) {
        markers.driver.setLatLng([driver.lat, driver.lng]);
    } else {
        const icon = L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-car"><i class="fas fa-taxi" style="color:#fff;font-size:1rem;"></i></div>`,
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });
        markers.driver = L.marker([driver.lat, driver.lng], { icon }).addTo(map);
    }
}

function centerOnDriver() {
    if (driver.lat) {
        map.setView([driver.lat, driver.lng], 17);
    }
}

// ===== REALTIME =====
function setupRealtime() {
    // Listen for new trips (INSERT on viajes with estado='pendiente')
    realtimeChannel = supabase
        .channel('conductor-viajes')
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'viajes',
            filter: 'estado=eq.pendiente'
        }, (payload) => {
            const trip = payload.new;
            // Only show if within reasonable distance (e.g., 10km)
            if (driver.lat && isNearby(trip.lat_salida, trip.lng_salida, 10)) {
                pendingTrips.unshift(trip);
                updatePendingCount();
                showToast('new-trip', '¡Nuevo viaje!', `${trip.nombre_pasajero} - $${trip.tarifa_total}`);
                playNotificationSound();
                renderPanel();
                addTripMarker(trip);
            }
        })
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'viajes'
        }, (payload) => {
            const trip = payload.new;
            // If our current trip was updated
            if (currentTrip && trip.id === currentTrip.id) {
                currentTrip = trip;
                if (trip.estado === 'completado' || trip.estado === 'cancelado') {
                    endCurrentTrip();
                }
            }
            // Remove from pending if no longer pending
            if (trip.estado !== 'pendiente') {
                pendingTrips = pendingTrips.filter(t => t.id !== trip.id);
                updatePendingCount();
                removeTripMarker(trip.id);
                renderPanel();
            }
        })
        .subscribe((status) => {
            console.log('Realtime status:', status);
        });
}

function isNearby(lat, lng, km) {
    const R = 6371;
    const dLat = (lat - driver.lat) * Math.PI / 180;
    const dLng = (lng - driver.lng) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(driver.lat * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLng/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c <= km;
}

function playNotificationSound() {
    // Simple beep using Web Audio API
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.value = 0.3;
        oscillator.start();
        setTimeout(() => oscillator.stop(), 200);
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.value = 1000;
            osc2.type = 'sine';
            gain2.gain.value = 0.3;
            osc2.start();
            setTimeout(() => osc2.stop(), 200);
        }, 250);
    } catch(e) { console.log('Audio not available'); }
}

// ===== TRIPS =====
async function loadPendingTrips() {
    showLoading('Buscando viajes pendientes...');
    const { data, error } = await supabase
        .from('viajes')
        .select('*')
        .eq('estado', 'pendiente')
        .order('created_at', { ascending: false });

    hideLoading();
    if (error) {
        showToast('error', 'Error', 'No se pudieron cargar los viajes');
        return;
    }

    pendingTrips = data || [];
    updatePendingCount();
    renderPanel();
    pendingTrips.forEach(addTripMarker);
}

async function loadTripHistory() {
    if (!driver) return;
    const today = new Date().toISOString().split('T')[0];
    const { data } = await supabase
        .from('viajes')
        .select('*')
        .eq('conductor_id', driver.id)
        .gte('created_at', today)
        .order('created_at', { ascending: false });

    tripHistory = data || [];
    tripsToday = tripHistory.length;
    earningsToday = tripHistory.reduce((sum, t) => sum + (t.tarifa_total || 0), 0);
    updateStats();
}

function updateStats() {
    document.getElementById('statTrips').textContent = tripsToday;
    document.getElementById('statEarnings').textContent = '$' + earningsToday.toFixed(0);
}

function updatePendingCount() {
    document.getElementById('pendingCount').textContent = pendingTrips.length;
}

// ===== MARKERS =====
function addTripMarker(trip) {
    if (!trip.lat_salida || !trip.lng_salida) return;

    const icon = L.divIcon({
        className: 'custom-marker',
        html: `<div class="marker-pulse"></div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10]
    });

    const marker = L.marker([trip.lat_salida, trip.lng_salida], { icon })
        .addTo(map)
        .bindPopup(`
            <div style="font-family:sans-serif;min-width:200px;">
                <h4 style="margin:0 0 8px;font-size:1rem;">${trip.nombre_pasajero || 'Pasajero'}</h4>
                <p style="margin:0 0 4px;font-size:0.85rem;color:#666;">
                    <i class="fas fa-map-marker-alt" style="color:#00d4ff;"></i> ${trip.direccion_salida || 'Salida'}
                </p>
                <p style="margin:0 0 8px;font-size:0.85rem;color:#666;">
                    <i class="fas fa-flag-checkered" style="color:#ff6b6b;"></i> ${trip.direccion_destino || 'Destino'}
                </p>
                <p style="margin:0;font-size:1.1rem;font-weight:700;color:#00d4ff;">$${trip.tarifa_total || 0}</p>
            </div>
        `);

    markers['trip_' + trip.id] = marker;
}

function removeTripMarker(tripId) {
    const key = 'trip_' + tripId;
    if (markers[key]) {
        map.removeLayer(markers[key]);
        delete markers[key];
    }
}

// ===== ACCEPT / REJECT =====
async function acceptTrip(tripId) {
    if (currentTrip) {
        showToast('error', 'Ocupado', 'Ya tenés un viaje activo');
        return;
    }

    showLoading('Aceptando viaje...');
    const { data, error } = await supabase.rpc('aceptar_viaje', {
        p_viaje_id: tripId,
        p_conductor_id: driver.id,
        p_conductor_nombre: driver.nombre
    });

    hideLoading();
    if (error) {
        showToast('error', 'Error', error.message);
        return;
    }

    currentTrip = pendingTrips.find(t => t.id === tripId);
    if (currentTrip) {
        currentTrip.conductor_id = driver.id;
        currentTrip.conductor_nombre = driver.nombre;
        currentTrip.estado = 'aceptado';
    }

    pendingTrips = pendingTrips.filter(t => t.id !== tripId);
    updatePendingCount();
    removeTripMarker(tripId);

    showToast('success', '¡Viaje aceptado!', `Dirigite a ${currentTrip.direccion_salida}`);
    startActiveTrip();
    switchTab('active');
}

function rejectTrip(tripId) {
    pendingTrips = pendingTrips.filter(t => t.id !== tripId);
    updatePendingCount();
    removeTripMarker(tripId);
    renderPanel();
}

// ===== ACTIVE TRIP =====
function startActiveTrip() {
    document.getElementById('activeTripOverlay').classList.add('visible');
    document.getElementById('bottomPanel').style.maxHeight = '25vh';

    // Add passenger and destination markers
    if (currentTrip.lat_salida && currentTrip.lng_salida) {
        const pickupIcon = L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-passenger"><i class="fas fa-user" style="color:#fff;font-size:0.8rem;"></i></div>`,
            iconSize: [32, 32], iconAnchor: [16, 16]
        });
        markers.pickup = L.marker([currentTrip.lat_salida, currentTrip.lng_salida], { icon: pickupIcon })
            .addTo(map).bindPopup('Recoger pasajero aquí');
    }

    if (currentTrip.lat_destino && currentTrip.lng_destino) {
        const destIcon = L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-destination"><i class="fas fa-flag-checkered" style="color:#fff;font-size:0.8rem;"></i></div>`,
            iconSize: [32, 32], iconAnchor: [16, 16]
        });
        markers.destination = L.marker([currentTrip.lat_destino, currentTrip.lng_destino], { icon: destIcon })
            .addTo(map).bindPopup('Destino final');
    }

    // Draw route
    drawRoute();

    // Start timer
    tripStartTime = Date.now();
    tripTimerInterval = setInterval(updateTripTimer, 1000);

    // Update status
    updateTripStatus('en_camino');
}

function updateTripTimer() {
    if (!tripStartTime) return;
    const elapsed = Math.floor((Date.now() - tripStartTime) / 1000);
    const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const secs = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('tripTimer').textContent = `${mins}:${secs}`;

    // Update progress based on time (estimated 15 min trip = 100%)
    const progress = Math.min((elapsed / 900) * 100, 100);
    document.getElementById('tripProgress').style.width = progress + '%';
}

async function drawRoute() {
    if (!currentTrip || !driver.lat) return;

    // Route: driver -> pickup -> destination
    const coords = [];
    if (currentTrip.estado === 'aceptado' || currentTrip.estado === 'en_camino') {
        coords.push(`${driver.lng},${driver.lat}`);
        coords.push(`${currentTrip.lng_salida},${currentTrip.lat_salida}`);
    }
    if (currentTrip.estado === 'en_viaje') {
        coords.push(`${currentTrip.lng_destino},${currentTrip.lat_destino}`);
    }

    if (coords.length < 2) return;

    try {
        const url = `${OSRM_URL}${coords.join(';')}?overview=full&geometries=geojson`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.routes && data.routes[0]) {
            if (routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.geoJSON(data.routes[0].geometry, {
                style: {
                    color: '#00d4ff',
                    weight: 5,
                    opacity: 0.8,
                    lineCap: 'round',
                    lineJoin: 'round'
                }
            }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
        }
    } catch (e) {
        console.error('Route error:', e);
    }
}

async function updateTripStatus(newStatus) {
    if (!currentTrip) return;

    const { error } = await supabase.rpc('actualizar_estado_viaje', {
        p_viaje_id: currentTrip.id,
        p_nuevo_estado: newStatus
    });

    if (error) {
        showToast('error', 'Error', error.message);
        return;
    }

    currentTrip.estado = newStatus;

    if (newStatus === 'en_viaje') {
        document.getElementById('tripTimerLabel').textContent = 'Viaje en curso';
        // Remove pickup marker, keep destination
        if (markers.pickup) {
            map.removeLayer(markers.pickup);
            delete markers.pickup;
        }
        drawRoute();
    }
}

function openNavigation() {
    if (!currentTrip) return;

    let lat, lng;
    if (currentTrip.estado === 'aceptado' || currentTrip.estado === 'en_camino') {
        lat = currentTrip.lat_salida;
        lng = currentTrip.lng_salida;
    } else {
        lat = currentTrip.lat_destino;
        lng = currentTrip.lng_destino;
    }

    if (lat && lng) {
        const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
        window.open(url, '_blank');
    }
}

async function completeTrip() {
    if (!currentTrip) return;

    showLoading('Finalizando viaje...');
    const { error } = await supabase.rpc('actualizar_estado_viaje', {
        p_viaje_id: currentTrip.id,
        p_nuevo_estado: 'completado'
    });

    hideLoading();
    if (error) {
        showToast('error', 'Error', error.message);
        return;
    }

    // Update stats
    tripsToday++;
    earningsToday += currentTrip.tarifa_total || 0;
    updateStats();

    showToast('success', '¡Viaje completado!', `Ganancia: $${currentTrip.tarifa_total}`);
    endCurrentTrip();
}

async function cancelTrip() {
    if (!currentTrip) return;

    if (!confirm('¿Seguro que querés cancelar este viaje?')) return;

    showLoading('Cancelando...');
    const { error } = await supabase.rpc('actualizar_estado_viaje', {
        p_viaje_id: currentTrip.id,
        p_nuevo_estado: 'cancelado'
    });

    hideLoading();
    if (error) {
        showToast('error', 'Error', error.message);
        return;
    }

    showToast('warning', 'Viaje cancelado', 'El viaje fue cancelado');
    endCurrentTrip();
}

function endCurrentTrip() {
    // Clear timer
    if (tripTimerInterval) {
        clearInterval(tripTimerInterval);
        tripTimerInterval = null;
    }
    tripStartTime = null;

    // Hide overlay
    document.getElementById('activeTripOverlay').classList.remove('visible');
    document.getElementById('bottomPanel').style.maxHeight = '45vh';

    // Clear route
    if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
    }

    // Clear markers
    if (markers.pickup) { map.removeLayer(markers.pickup); delete markers.pickup; }
    if (markers.destination) { map.removeLayer(markers.destination); delete markers.destination; }

    // Add to history
    if (currentTrip && currentTrip.estado === 'completado') {
        tripHistory.unshift(currentTrip);
    }

    currentTrip = null;
    switchTab('pending');
    renderPanel();
    centerOnDriver();
}

// ===== UI =====
function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.panel-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
    });
    renderPanel();
}

function renderPanel() {
    const container = document.getElementById('panelContent');

    if (activeTab === 'pending') {
        if (pendingTrips.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <h3>No hay viajes pendientes</h3>
                    <p>Los nuevos viajes aparecerán aquí en tiempo real</p>
                </div>`;
            return;
        }
        container.innerHTML = pendingTrips.map(trip => `
            <div class="trip-card" onclick="focusTrip('${trip.id}')">
                <div class="trip-header">
                    <div class="trip-passenger">
                        <div class="passenger-avatar">${(trip.nombre_pasajero || 'P').charAt(0).toUpperCase()}</div>
                        <div class="passenger-info">
                            <h4>${trip.nombre_pasajero || 'Pasajero'}</h4>
                            <p><i class="fas fa-phone" style="font-size:0.7rem;"></i> ${trip.telefono_pasajero || 'Sin teléfono'}</p>
                        </div>
                    </div>
                    <div class="trip-price">
                        <div class="amount">$${trip.tarifa_total || 0}</div>
                        <div class="distance">${(trip.distancia_km || 0).toFixed(1)} km</div>
                    </div>
                </div>
                <div class="trip-route">
                    <div>
                        <div class="route-dot pickup"></div>
                        <div class="route-line"></div>
                        <div class="route-dot dropoff"></div>
                    </div>
                    <div>
                        <div class="route-text">${trip.direccion_salida || 'Ubicación actual'}</div>
                        <div class="route-text">${trip.direccion_destino || 'Destino'}</div>
                    </div>
                </div>
                <div class="trip-actions">
                    <button class="btn-action btn-accept" onclick="event.stopPropagation(); acceptTrip('${trip.id}')">
                        <i class="fas fa-check"></i> Aceptar
                    </button>
                    <button class="btn-action btn-reject" onclick="event.stopPropagation(); rejectTrip('${trip.id}')">
                        <i class="fas fa-times"></i> Rechazar
                    </button>
                </div>
            </div>
        `).join('');

    } else if (activeTab === 'active') {
        if (!currentTrip) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-car"></i>
                    <h3>No tenés viaje activo</h3>
                    <p>Aceptá un viaje desde la pestaña "Pendientes"</p>
                </div>`;
            return;
        }
        container.innerHTML = `
            <div class="trip-card active-trip">
                <div class="trip-header">
                    <div class="trip-passenger">
                        <div class="passenger-avatar">${(currentTrip.nombre_pasajero || 'P').charAt(0).toUpperCase()}</div>
                        <div class="passenger-info">
                            <h4>${currentTrip.nombre_pasajero || 'Pasajero'}</h4>
                            <p><i class="fas fa-phone" style="font-size:0.7rem;"></i> ${currentTrip.telefono_pasajero || 'Sin teléfono'}</p>
                        </div>
                    </div>
                    <div class="trip-price">
                        <div class="amount">$${currentTrip.tarifa_total || 0}</div>
                        <div class="distance">${currentTrip.estado === 'en_viaje' ? 'En viaje' : 'Yendo a recoger'}</div>
                    </div>
                </div>
                <div class="trip-route">
                    <div>
                        <div class="route-dot pickup"></div>
                        <div class="route-line"></div>
                        <div class="route-dot dropoff"></div>
                    </div>
                    <div>
                        <div class="route-text">${currentTrip.direccion_salida || 'Salida'}</div>
                        <div class="route-text">${currentTrip.direccion_destino || 'Destino'}</div>
                    </div>
                </div>
                ${currentTrip.estado === 'aceptado' || currentTrip.estado === 'en_camino' ? `
                <button class="btn-action btn-navigate" style="width:100%;margin-top:8px;" onclick="updateTripStatus('en_viaje')">
                    <i class="fas fa-play"></i> Iniciar viaje (pasajero a bordo)
                </button>
                ` : ''}
            </div>
        `;

    } else if (activeTab === 'history') {
        if (tripHistory.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-history"></i>
                    <h3>Sin historial hoy</h3>
                    <p>Tus viajes completados aparecerán aquí</p>
                </div>`;
            return;
        }
        container.innerHTML = tripHistory.map(trip => `
            <div class="trip-card">
                <div class="trip-header">
                    <div class="trip-passenger">
                        <div class="passenger-avatar">${(trip.nombre_pasajero || 'P').charAt(0).toUpperCase()}</div>
                        <div class="passenger-info">
                            <h4>${trip.nombre_pasajero || 'Pasajero'}</h4>
                            <p>${new Date(trip.created_at).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                    <div class="trip-price">
                        <div class="amount">$${trip.tarifa_total || 0}</div>
                        <div class="distance" style="color:${trip.estado === 'completado' ? '#2ed573' : '#ff4757'}">${trip.estado}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }
}

function focusTrip(tripId) {
    const trip = pendingTrips.find(t => t.id === tripId);
    if (trip && trip.lat_salida && trip.lng_salida) {
        map.setView([trip.lat_salida, trip.lng_salida], 16);
    }
}

function togglePanel() {
    const panel = document.getElementById('bottomPanel');
    const isCollapsed = panel.style.maxHeight === '60px' || panel.style.maxHeight === '25vh';
    if (currentTrip) {
        panel.style.maxHeight = isCollapsed ? '45vh' : '25vh';
    } else {
        panel.style.maxHeight = isCollapsed ? '45vh' : '60px';
    }
}

function toggleOnlineStatus() {
    isOnline = !isOnline;
    const btn = document.getElementById('statusToggle');
    const text = document.getElementById('statusText');

    if (isOnline) {
        btn.className = 'header-status status-online';
        text.textContent = 'Online';
        showToast('success', 'Online', 'Estás recibiendo viajes');
        loadPendingTrips();
    } else {
        btn.className = 'header-status status-offline';
        text.textContent = 'Offline';
        showToast('warning', 'Offline', 'No recibirás nuevos viajes');
    }
}

// ===== TOAST =====
function showToast(type, title, message) {
    const container = document.getElementById('toastContainer');
    const icons = {
        success: '✅',
        error: '❌',
        warning: '⚠️',
        info: 'ℹ️',
        'new-trip': '🚕'
    };
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
        <div class="toast-icon">${icons[type] || 'ℹ️'}</div>
        <div class="toast-content">
            <h4>${title}</h4>
            <p>${message}</p>
        </div>
    `;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
}

function showLoading(text) {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingOverlay').classList.add('visible');
}

function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('visible');
}

// ===== CLEANUP =====
window.addEventListener('beforeunload', () => {
    if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
    if (locationUpdateInterval) clearInterval(locationUpdateInterval);
    if (tripTimerInterval) clearInterval(tripTimerInterval);
    if (realtimeChannel) supabase.removeChannel(realtimeChannel);
});
</script>
