<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #11121a; color: white; height: 100vh; overflow: hidden; }
        #mapaContainer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
        #mapaLeaflet { width: 100%; height: 100%; }
        #pantallaIngreso { position: fixed; top:0; left:0; width:100%; height:100%; background:#11121a; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
        .btn-rol { padding: 15px 30px; background: #1e293b; border: 2px solid #475569; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; width: 200px; text-align: center; }
        .btn-rol.active { border-color: #10b981; background: #065f46; }
        .bottom-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: #1e293b; padding: 20px; border-radius: 24px 24px 0 0; min-height: 22vh; text-align: center; }
        .btn-action { width: 100%; background: #10b981; color: white; border: none; padding: 15px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-finalizar { background: #e11d48; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="pantallaIngreso">
        <h2>TuMóvil Chofer</h2>
        <p>¿Qué vehículo vas a manejar hoy?</p>
        <div class="btn-rol active" id="rAuto" onclick="definirRol('auto')">🚗 AUTO</div>
        <div class="btn-rol" id="rMoto" onclick="definirRol('moto')">🏍️ MOTO</div>
        <button class="btn-action" style="max-width:250px;" onclick="conectarTurno()">INICIAR TURNO</button>
    </div>

    <div id="mapaContainer"><div id="mapaLeaflet"></div></div>

    <div class="bottom-panel">
        <h4 id="lblFiltro">Esperando Solicitudes...</h4>
        <div id="boxViajeEncontrado" class="hidden">
            <p style="margin: 10px 0; font-size: 1.2rem; font-weight: bold; color: #34d399;">¡Viaje Asignado! Valor: <span id="valPrecio">$0</span></p>
            <button class="btn-action" id="btnAccion" onclick="avanzarFlujo()">Aceptar Viaje</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mapa, vehiculoTurno = 'auto', viajeActivo = null, pasoFlujo = 0, wakeLock = null;

        function definirRol(tipo) {
            vehiculoTurno = tipo;
            document.getElementById('rAuto').classList.toggle('active', tipo === 'auto');
            document.getElementById('rMoto').classList.toggle('active', tipo === 'moto');
        }

        async function conectarTurno() {
            document.getElementById('pantallaIngreso').style.display = 'none';
            document.getElementById('lblFiltro').textContent = `Línea Activa: ${vehiculoTurno.toUpperCase()} - Buscando Pasajeros...`;
            
            mapa = L.map('mapaLeaflet', { zoomControl: false, attributionControl: false }).setView([-34.54291, -58.71212], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

            // ACTIVACIÓN DE PANTALLA SIEMPRE ENCENDIDA
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log("WakeLock no soportado o denegado."); }

            suscripcionDespacho();
        }

        function suscripcionDespacho() {
            supabaseClient.channel('despacho-chofer').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'viajes' }, (p) => {
                const v = p.new;
                if(!viajeActivo && v.estado === 'pendiente') {
                    const limitePrecioAuto = Number(localStorage.getItem('cfg_auto_base')) || 3000;
                    const esViajeDeMoto = v.precio < limitePrecioAuto;

                    if((vehiculoTurno === 'moto' && esViajeDeMoto) || (vehiculoTurno === 'auto' && !esViajeDeMoto)) {
                        ofrecerViaje(v);
                    }
                }
            }).subscribe();
        }

        function ofrecerViaje(v) {
            viajeActivo = v;
            pasoFlujo = 1;
            document.getElementById('boxViajeEncontrado').classList.remove('hidden');
            document.getElementById('valPrecio').textContent = `$${v.precio}`;
            
            // INTENTAR FORZAR SONIDO EN SEGUNDO PLANO
            try {
                let context = new (window.AudioContext || window.webkitAudioContext)();
                let osc = context.createOscillator();
                let gain = context.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, context.currentTime); // Tono agudo tipo sirena
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start();
                setTimeout(() => osc.stop(), 2500); // Suena por 2 segundos y medio duro
            } catch(e){}
        }

        async function avanzarFlujo() {
            const btn = document.getElementById('btnAccion');
            if(pasoFlujo === 1) {
                let nombre = localStorage.getItem('cfg_auto_chofer') || "Carlos Cueva";
                let descVehiculo = (localStorage.getItem('cfg_auto_modelo') || "Ford Fiesta") + " [" + (localStorage.getItem('cfg_auto_patente') || "JCP") + "]";
                
                if(vehiculoTurno === 'moto') {
                    nombre = localStorage.getItem('cfg_moto_chofer') || "Hijo de Carlos";
                    descVehiculo = (localStorage.getItem('cfg_moto_modelo') || "Honda Wave") + " [" + (localStorage.getItem('cfg_moto_patente') || "999") + "]";
                }

                await supabaseClient.from('viajes').update({
                    conductor_nombre: nombre,
                    conductor_auto: descVehiculo,
                    estado: 'en_viaje'
                }).eq('id', viajeActivo.id);

                btn.textContent = "Finalizar Viaje 💵";
                btn.className = "btn-action btn-finalizar";
                pasoFlujo = 2;
            } else if (pasoFlujo === 2) {
                await supabaseClient.from('viajes').update({ estado: 'finalizado' }).eq('id', viajeActivo.id);
                if(wakeLock) wakeLock.release(); // Libera el control de la pantalla al terminar
                location.reload();
            }
        }
    </script>
</body>
</html>
