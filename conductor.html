<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚕 Conductor - Las Catalinas Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root {
            --rojo: #e61e2b;
            --rojo-oscuro: #c4121f;
            --celeste: #00d4ff;
            --negro: #0a0a0a;
            --blanco: #ffffff;
            --verde: #00ff88;
            --naranja: #f47920;
        }

        /* Estilos generales y Mapa */
        body, html { height: 100%; width: 100%; font-family: sans-serif; background: var(--negro); overflow: hidden; margin:0; }
        #map { position: absolute; top: 0; height: 60%; width: 100%; z-index: 1; }

        /* Header Estilo Moreno */
        .header-conductor {
            position: absolute; top: 12px; left: 12px; right: 12px;
            z-index: 1000; display: flex; gap: 10px;
        }
        .header-card {
            flex: 1; background: linear-gradient(135deg, var(--rojo), var(--rojo-oscuro));
            border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px;
            border: 2px solid var(--celeste); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .avatar {
            width: 45px; height: 45px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        /* Panel Inferior */
        .panel {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: white; border-radius: 25px 25px 0 0; padding: 20px;
            height: 40%; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); overflow-y: auto;
        }

        /* Botones Profesionales */
        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; margin-top: 10px;
        }
        .btn-conectar { background: var(--celeste); color: var(--negro); }
        .btn-activo { background: var(--verde); color: var(--negro); }
        
        .gps-status {
            position: absolute; top: 75px; right: 12px; z-index: 1000;
            background: white; padding: 5px 12px; border-radius: 20px;
            font-size: 0.7rem; font-weight: bold; border: 2px solid #ddd;
        }
        .preciso { border-color: var(--verde); color: var(--verde); }

        /* Buscador / Resultados */
        #resultados-busqueda {
            margin-top: 10px; max-height: 150px; overflow-y: auto;
        }
        .item-resultado {
            padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="header-conductor">
        <div class="header-card">
            <div class="avatar" id="avatar-conductor">J</div>
            <div style="color:white">
                <h3 style="margin:0; font-size:1rem;">Juan - Móvil 53</h3>
                <p id="estado-texto" style="margin:0; font-size:0.8rem; opacity:0.8">Desconectado</p>
            </div>
        </div>
        <div id="btn-power" onclick="cambiarEstado()" style="width:50px; height:50px; background:#444; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; border:2px solid var(--celeste)">
            <i class="fas fa-power-off"></i>
        </div>
    </div>

    <div class="gps-status" id="gps-label">Buscando señal...</div>

    <div class="panel">
        <div id="modo-espera">
            <div style="display: flex; justify-content: space-between; margin-bottom:15px;">
                <div style="text-align:center"><strong>Viajes</strong><br><span id="count-viajes">0</span></div>
                <div style="text-align:center"><strong>Hoy</strong><br><span id="money-viajes">$0</span></div>
                <div style="text-align:center"><strong>Zona</strong><br><span>Trujui</span></div>
            </div>
            
            <input type="text" id="buscador-calle" placeholder="Buscar esquina o destino..." 
                   style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;"
                   onkeyup="buscarDireccionInteligente(this.value)">
            
            <div id="resultados-busqueda"></div>
        </div>

        <div id="alerta-viaje" style="display:none; text-align:center;">
            <h2 style="color:var(--rojo)">¡NUEVO PEDIDO!</h2>
            <p id="info-pasajero">Cargando datos...</p>
            <button class="btn btn-activo" onclick="aceptarViaje()">ACEPTAR VIAJE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // CONFIGURACIÓN
        const SUPABASE_URL = 'https://efryvjjunfeoxhekvwza.supabase.co';
        const SUPABASE_KEY = 'TU_LLAVE_AQUÍ'; // Poné tu llave anon aquí
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, marcadorYo, watchId;
        let online = false;
        let miPosicion = { lat: -34.5847, lng: -58.7482 };

        // 1. INICIALIZAR MAPA
        function initMapa() {
            map = L.map('map', { zoomControl: false }).setView([miPosicion.lat, miPosicion.lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // 2. GPS PROFESIONAL (Optimizado para Motorola)
        function iniciarGPS() {
            if (!navigator.geolocation) return;
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    miPosicion.lat = pos.coords.latitude;
                    miPosicion.lng = pos.coords.longitude;
                    
                    const label = document.getElementById('gps-label');
                    if(pos.coords.accuracy < 30) {
                        label.className = "gps-status preciso";
                        label.innerText = "GPS Preciso";
                    } else {
                        label.className = "gps-status";
                        label.innerText = "GPS Aproximado";
                    }

                    if(!marcadorYo) {
                        marcadorYo = L.marker([miPosicion.lat, miPosicion.lng]).addTo(map);
                    } else {
                        marcadorYo.setLatLng([miPosicion.lat, miPosicion.lng]);
                    }
                    map.panTo([miPosicion.lat, miPosicion.lng]);
                },
                (err) => console.error(err),
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // 3. BUSCADOR INTELIGENTE (Nominatim con límites de zona)
        let timeoutBusqueda;
        function buscarDireccionInteligente(query) {
            clearTimeout(timeoutBusqueda);
            if (query.length < 3) return;

            timeoutBusqueda = setTimeout(async () => {
                // Límite: Moreno, San Miguel, J.C. Paz
                const viewbox = "-58.85,-34.50,-58.65,-34.65";
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${query}+Moreno+Argentina&viewbox=${viewbox}&bounded=1&limit=5`;

                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    const div = document.getElementById('resultados-busqueda');
                    div.innerHTML = "";

                    if (data.length === 0) {
                        div.innerHTML = `<button onclick="activarManual()" class="btn" style="background:#f47920; color:white">No se encuentra. Escribir a mano</button>`;
                        return;
                    }

                    data.forEach(lugar => {
                        const item = document.createElement('div');
                        item.className = "item-resultado";
                        item.innerText = lugar.display_name;
                        item.onclick = () => { 
                            document.getElementById('buscador-calle').value = lugar.display_name;
                            div.innerHTML = "";
                        };
                        div.appendChild(item);
                    });
                } catch (e) { console.error(e); }
            }, 500);
        }

        function activarManual() {
            const ref = prompt("Escribí la esquina o referencia:");
            if(ref) document.getElementById('buscador-calle').value = ref;
            document.getElementById('resultados-busqueda').innerHTML = "";
        }

        // 4. ESTADO ONLINE/OFFLINE
        async function cambiarEstado() {
            online = !online;
            const btn = document.getElementById('btn-power');
            const txt = document.getElementById('estado-texto');

            if(online) {
                btn.style.background = "var(--verde)";
                txt.innerText = "Buscando pasajeros...";
                txt.style.color = "var(--verde)";
            } else {
                btn.style.background = "#444";
                txt.innerText = "Desconectado";
                txt.style.color = "white";
            }
            
            // Actualizar en Supabase
            await supabase.from('conductores').update({ estado: online ? 'disponible' : 'offline' }).eq('id', 'TU_ID');
        }

        // Iniciar todo
        window.onload = () => {
            initMapa();
            iniciarGPS();
        };
    </script>
</body>
</html>
