<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes Moreno - Pasajero</title>
    
    <!-- Leaflet CSS para Mapas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f8fafc; }
        #map { height: 40vh; width: 100%; border-bottom: 2px solid #ddd; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--dark); }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 8px; 
            background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        button:disabled { background: #94a3b8; }

        .price-tag { 
            margin-top: 15px; text-align: center; font-size: 20px; font-weight: bold; color: #059669; 
            display: none; 
        }

        /* Sugerencias de direcciones */
        .suggestions {
            position: absolute; background: white; width: 100%; z-index: 1000;
            border: 1px solid #ddd; border-top: none; max-height: 150px; overflow-y: auto;
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .suggestion-item:hover { background: #f1f5f9; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">
    <div class="card">
        <h2 style="margin-top:0">¿A dónde vamos?</h2>
        
        <div class="input-group">
            <label>Recogida (Tu ubicación)</label>
            <input type="text" id="origen" placeholder="Cargando ubicación..." readonly>
        </div>

        <div class="input-group">
            <label>Destino en Moreno / San Miguel</label>
            <input type="text" id="destino" placeholder="Ej: Murillo 124 o La Pinta..." autocomplete="off">
            <div id="lista-sugerencias" class="suggestions"></div>
        </div>

        <div class="price-tag" id="price-display">Estimado: $0.00</div>
        
        <button id="btn-solicitar" disabled>Solicitar Viaje</button>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN DE APIS (REEMPLAZA CON TUS DATOS) ---
    const SUPABASE_URL = "TU_URL_DE_SUPABASE";
    const SUPABASE_KEY = "TU_KEY_ANON_DE_SUPABASE";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- VARIABLES DE CONTROL ---
    let map, markerOrigen, markerDestino, routeLine;
    let coordsOrigen = null;
    let coordsDestino = null;
    const TARIFA_BASE = 500;
    const PRECIO_KM = 300;

    // --- INICIALIZAR MAPA ---
    function initMap() {
        map = L.map('map').setView([-34.648, -58.791], 13); // Moreno Centro
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Obtener ubicación real del pasajero
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                coordsOrigen = [pos.coords.latitude, pos.coords.longitude];
                map.setView(coordsOrigen, 15);
                markerOrigen = L.marker(coordsOrigen, {draggable: false}).addTo(map).bindPopup("Estás aquí").openPopup();
                document.getElementById('origen').value = "Tu ubicación actual";
            });
        }
    }

    // --- BUSCADOR INTELIGENTE (EL "ESCUDO" DE MORENO) ---
    const inputDestino = document.getElementById('destino');
    const listaSug = document.getElementById('lista-sugerencias');

    inputDestino.addEventListener('input', async (e) => {
        const query = e.target.value;
        if (query.length < 3) { listaSug.innerHTML = ""; return; }

        // Buscamos en Nominatim pero limitando a la zona de Moreno/San Miguel
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${query}+Moreno+San+Miguel+Buenos+Aires&limit=5&addressdetails=1`;
        
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            
            listaSug.innerHTML = data.map(item => `
                <div class="suggestion-item" onclick="seleccionarDestino(${item.lat}, ${item.lon}, '${item.display_name}')">
                    ${item.display_name}
                </div>
            `).join('');
        } catch (err) { console.error("Error buscando dirección", err); }
    });

    function seleccionarDestino(lat, lon, nombre) {
        coordsDestino = [lat, lon];
        inputDestino.value = nombre;
        listaSug.innerHTML = "";

        if (markerDestino) map.removeLayer(markerDestino);
        markerDestino = L.marker(coordsDestino, {icon: redIcon}).addTo(map);
        
        trazarRutaReal();
    }

    // Icono rojo para el destino
    const redIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        iconSize: [25, 41], iconAnchor: [12, 41]
    });

    // --- TRAZADO DE RUTA POR CALLES (OSRM) ---
    async function trazarRutaReal() {
        if (!coordsOrigen || !coordsDestino) return;

        const url = `https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.routes && data.routes.length > 0) {
                const route = data.routes[0];
                const distanciaKm = route.distance / 1000;
                
                // Dibujar línea en el mapa
                if (routeLine) map.removeLayer(routeLine);
                routeLine = L.geoJSON(route.geometry, {style: {color: '#2563eb', weight: 5}}).addTo(map);
                map.fitBounds(routeLine.getBounds());

                // Calcular precio
                const total = TARIFA_BASE + (distanciaKm * PRECIO_KM);
                const display = document.getElementById('price-display');
                display.innerText = `Estimado: $${total.toFixed(2)}`;
                display.style.display = "block";
                
                document.getElementById('btn-solicitar').disabled = false;
            }
        } catch (err) { alert("Error al trazar la ruta vial."); }
    }

    // --- ENVIAR A SUPABASE ---
    document.getElementById('btn-solicitar').addEventListener('click', async () => {
        const { data, error } = await supabase
            .from('viajes')
            .insert([
                { 
                    lat_salida: coordsOrigen[0], 
                    lng_salida: coordsOrigen[1],
                    lat_llegada: coordsDestino[0],
                    lng_llegada: coordsDestino[1],
                    estado: 'pendiente',
                    precio: document.getElementById('price-display').innerText
                }
            ]);

        if (error) alert("Error al solicitar: " + error.message);
        else alert("Viaje solicitado. Buscando conductor...");
    });

    window.onload = initMap;
</script>

</body>
</html>
