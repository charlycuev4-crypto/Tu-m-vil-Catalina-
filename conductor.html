<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        h1 { text-align: center; color: #11998e; margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; }
        button { background: #11998e; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .paso { display: none; }
        .paso.activo { display: block; }
        .viaje-item { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .viaje-item:hover { border-color: #11998e; }
        .tarifa-box { background: #667eea; color: white; padding: 15px; border-radius: 10px; text-align: center; margin: 15px 0; }
        .tarifa-box h2 { font-size: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚕 TuMovil Conductor</h1>
        
        <div id="paso1" class="paso activo">
            <input type="text" id="condNombre" placeholder="Tu nombre">
            <input type="text" id="condAuto" placeholder="Auto (ej: Ford Fiesta)">
            <button onclick="registrar()">EMPEZAR A TRABAJAR</button>
        </div>

        <div id="paso2" class="paso">
            <label><input type="checkbox" id="disp" onchange="toggleDisp()"> Estoy disponible</label>
            <div id="listaViajes"></div>
            <button onclick="borrarTodos()" style="background: #dc3545; margin-top: 20px;">🗑️ BORRAR TODOS LOS VIAJES</button>
        </div>

        <div id="paso3" class="paso">
            <div id="infoPasajero"></div>
            <input type="number" id="km" placeholder="Kilómetros" step="0.1">
            <div class="tarifa-box">
                <div>Tarifa</div>
                <h2 id="tarifa">$0</h2>
            </div>
            <button onclick="enviarPrecio()" style="background: #28a745;">💰 ENVIAR PRECIO</button>
            <button onclick="volver()" style="background: #6c757d;">❌ VOLVER</button>
        </div>

        <div id="paso4" class="paso">
            <h2>Esperando confirmación...</h2>
            <div id="estadoEspera"></div>
            <button onclick="volver()" style="background: #ff6b6b;">❌ CANCELAR</button>
        </div>

        <div id="paso5" class="paso">
            <h2>¡Confirmado! 🎉</h2>
            <button onclick="finalizar()" style="background: #28a745;">🏁 FINALIZAR VIAJE</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const TARIFA_BASE = 3000;
        const TARIFA_KM = 600;
        let conductor = null;
        let viajeActual = null;
        let pollInt = null;

        function mostrarPaso(id) {
            document.querySelectorAll('.paso').forEach(p => p.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        function registrar() {
            conductor = {
                nombre: document.getElementById('condNombre').value,
                auto: document.getElementById('condAuto').value
            };
            localStorage.setItem('cond', JSON.stringify(conductor));
            mostrarPaso('paso2');
            cargarViajes();
        }

        window.onload = () => {
            const c = localStorage.getItem('cond');
            if (c) {
                conductor = JSON.parse(c);
                mostrarPaso('paso2');
                cargarViajes();
            }
        };

        async function toggleDisp() {
            if (document.getElementById('disp').checked) cargarViajes();
            else document.getElementById('listaViajes').innerHTML = '<p>Activá disponibilidad</p>';
        }

        async function cargarViajes() {
            const { data, error } = await supabase.from('viajes').select('*').eq('estado', 'pendiente');
            if (error) return;
            
            const div = document.getElementById('listaViajes');
            if (!data || data.length === 0) {
                div.innerHTML = '<p>No hay viajes</p>';
                return;
            }
            
            div.innerHTML = data.map(v => `
                <div class="viaje-item" onclick="tomarViaje('${v.id}')">
                    <strong>${v.pasajero_nombre}</strong><br>
                    📍 ${v.origen_direccion}<br>
                    🏁 ${v.destino_direccion}
                </div>
            `).join('');
        }

        async function tomarViaje(id) {
            const { data, error } = await supabase.from('viajes').select('*').eq('id', id).single();
            if (error) return;
            
            viajeActual = data;
            document.getElementById('infoPasajero').innerHTML = `
                <p><strong>${data.pasajero_nombre}</strong></p>
                <p>📞 ${data.pasajero_telefono}</p>
                <p>🚩 ${data.origen_direccion}</p>
                <p>🏁 ${data.destino_direccion}</p>
            `;
            mostrarPaso('paso3');
        }

        function calcular() {
            const km = parseFloat(document.getElementById('km').value) || 0;
            const total = TARIFA_BASE + (km * TARIFA_KM);
            document.getElementById('tarifa').textContent = '$' + total.toLocaleString();
            return total;
        }

        document.getElementById('km').addEventListener('input', calcular);

        async function enviarPrecio() {
            const km = parseFloat(document.getElementById('km').value);
            if (!km || km <= 0) {
                alert('Poné los kilómetros');
                return;
            }
            
            const total = calcular();
            
            const { data, error } = await supabase.from('viajes').update({
                estado: 'aceptado',
                precio: total,
                distancia_km: km,
                conductor_nombre: conductor.nombre,
                conductor_auto: conductor.auto
            }).eq('id', viajeActual.id).select();

            if (error) {
                alert('Error: ' + error.message);
                return;
            }

            mostrarPaso('paso4');
            esperarConfirmacion();
        }

        function esperarConfirmacion() {
            pollInt = setInterval(async () => {
                const { data, error } = await supabase.from('viajes').select('*').eq('id', viajeActual.id).single();
                if (error || !data) return;

                document.getElementById('estadoEspera').textContent = 'Estado: ' + data.estado;

                if (data.estado === 'en_viaje') {
                    clearInterval(pollInt);
                    mostrarPaso('paso5');
                }
                
                if (data.estado === 'pendiente' && !data.precio) {
                    clearInterval(pollInt);
                    alert('Pasajero rechazó');
                    volver();
                }
            }, 2000);
        }

        async function finalizar() {
            await supabase.from('viajes').update({ estado: 'completado' }).eq('id', viajeActual.id);
            volver();
        }

        async function volver() {
            if (pollInt) clearInterval(pollInt);
            viajeActual = null;
            document.getElementById('km').value = '';
            mostrarPaso('paso2');
            cargarViajes();
        }

        async function borrarTodos() {
            if (!confirm('¿Borrar TODOS los viajes?')) return;
            
            const { data: todos, error: err } = await supabase.from('viajes').select('id');
            if (err) return;
            
            for (const v of todos || []) {
                await supabase.from('viajes').delete().eq('id', v.id);
            }
            
            alert('Viajes borrados: ' + (todos ? todos.length : 0));
            cargarViajes();
        }
    </script>
</body>
</html>
