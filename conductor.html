<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - Barrio Las Catalinas</title>
    
    <!-- Leaflet para el Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primario: #2ecc71; --oscuro: #27ae60; --alerta: #e74c3c; }
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; }
        #map { height: 60vh; width: 100%; }
        
        .panel-conductor { padding: 15px; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; position: relative; margin-top: -20px; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        
        .estado-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { padding: 5px 10px; border-radius: 15px; font-weight: bold; font-size: 0.8em; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }

        .btn-grande { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; color: white; cursor: pointer; margin-top: 10px; }
        .btn-espera { background: var(--primario); }
        .btn-cancelar { background: var(--alerta); }

        /* Tarjeta de Pedido Entrante */
        #pedido-entrante { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 9999; display: none;
            color: white; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .info-pedido { background: #333; padding: 20px; border-radius: 15px; margin-top: 50px; }
        .activo { display: block !important; }
        
        .datos-viaje { text-align: left; margin: 20px 0; border-left: 4px solid var(--primario); padding-left: 15px; }
        .precio-tag { font-size: 2em; color: var(--primario); font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="pedido-entrante">
        <h2>¡NUEVO VIAJE!</h2>
        <div class="info-pedido">
            <div class="precio-tag" id="p-precio">$0.00</div>
            <div class="datos-viaje">
                <p><strong>Pasajero:</strong> <span id="p-nombre">...</span></p>
                <p><strong>Desde:</strong> <span id="p-direccion">...</span></p>
                <p><strong>Hacia:</strong> <span id="p-destino">...</span></p>
            </div>
            <button class="btn-grande btn-espera" onclick="aceptarViaje()">ACEPTAR VIAJE</button>
            <button class="btn-grande btn-cancelar" onclick="rechazarViaje()">RECHAZAR</button>
        </div>
    </div>

    <div class="panel-conductor">
        <div class="estado-box">
            <div>
                <strong>Mi Estado:</strong> 
                <span id="status-label" class="badge offline">DESCONECTADO</span>
            </div>
            <button id="btn-toggle" onclick="toggleConexion()" style="padding: 5px 15px; border-radius: 10px;">Conectar</button>
        </div>
        <div id="panel-stats">
            <p style="margin: 0; color: #666; font-size: 0.9em;">Esperando solicitudes en el barrio...</p>
        </div>
    </div>

    <audio id="alarma" src="https://assets.mixkit.co/active_storage/sfx/2561/2561-preview.mp3"></audio>

    <script>
        // CONFIGURACIÓN SUPABASE (Asegúrate que coincidan con tu proyecto)
        const URL_SB = "TU_URL_DE_SUPABASE";
        const KEY_SB = "TU_KEY_DE_SUPABASE";
        const supabase = window.supabase.createClient(URL_SB, KEY_SB);

        let map, miMarcador, rutaLayer;
        let miPosicion = { lat: -34.61, lng: -58.75 }; // Coordenadas base Trujui/Moreno
        let estaOnline = false;
        let pedidoActual = null;

        // Iniciar Mapa
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([miPosicion.lat, miPosicion.lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            miMarcador = L.marker([miPosicion.lat, miPosicion.lng]).addTo(map).bindPopup("Tú");
        }

        // GPS con alta precisión para celular
        function trackGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    miPosicion.lat = pos.coords.latitude;
                    miPosicion.lng = pos.coords.longitude;
                    
                    const latlng = [miPosicion.lat, miPosicion.lng];
                    miMarcador.setLatLng(latlng);
                    if (!pedidoActual) map.panTo(latlng);

                    if (estaOnline) actualizarUbicaciónDB();
                }, err => console.log(err), { enableHighAccuracy: true, maximumAge: 3000 });
            }
        }

        async function actualizarUbicaciónDB() {
            // Actualizamos la tabla 'conductores' para que el pasajero nos vea
            await supabase.from('conductores').upsert({
                id_conductor: 'CHOFER_01', // ID fijo por ahora para pruebas
                lat: miPosicion.lat,
                lng: miPosicion.lng,
                ultima_conexion: new Date()
            });
        }

        function toggleConexion() {
            estaOnline = !estaOnline;
            const label = document.getElementById('status-label');
            const btn = document.getElementById('btn-toggle');
            
            if (estaOnline) {
                label.textContent = "EN LÍNEA";
                label.className = "badge online";
                btn.textContent = "Desconectar";
                escucharPedidos();
            } else {
                label.textContent = "DESCONECTADO";
                label.className = "badge offline";
                btn.textContent = "Conectar";
            }
        }

        // Suscripción en tiempo real a la tabla 'viajes'
        function escucharPedidos() {
            supabase
                .channel('pedidos-nuevos')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'viajes' }, payload => {
                    if (payload.new.estado === 'pendiente') {
                        lanzarAlerta(payload.new);
                    }
                })
                .subscribe();
        }

        function lanzarAlerta(viaje) {
            pedidoActual = viaje;
            document.getElementById('p-nombre').textContent = viaje.nombre_pasajero;
            document.getElementById('p-direccion').textContent = viaje.direccion_salida;
            document.getElementById('p-destino').textContent = viaje.destino;
            document.getElementById('p-precio').textContent = `$${viaje.precio}`;
            
            document.getElementById('pedido-entrante').classList.add('activo');
            document.getElementById('alarma').play();
        }

        async function aceptarViaje() {
            const { error } = await supabase
                .from('viajes')
                .update({ estado: 'en_camino', conductor_id: 'CHOFER_01' })
                .eq('id', pedidoActual.id);

            if (!error) {
                document.getElementById('pedido-entrante').classList.remove('activo');
                document.getElementById('alarma').pause();
                trazarRuta(pedidoActual);
                alert("¡Viaje aceptado! Dirígete al punto de encuentro.");
            }
        }

        function rechazarViaje() {
            document.getElementById('pedido-entrante').classList.remove('activo');
            document.getElementById('alarma').pause();
            pedidoActual = null;
        }

        function trazarRuta(viaje) {
            if (rutaLayer) map.removeLayer(rutaLayer);
            
            // Trazamos una línea simple entre chofer y pasajero para empezar
            rutaLayer = L.polyline([
                [miPosicion.lat, miPosicion.lng],
                [viaje.lat_salida, viaje.lng_salida]
            ], {color: 'red', weight: 5}).addTo(map);
            
            map.fitBounds(rutaLayer.getBounds(), {padding: [50, 50]});
        }

        window.onload = () => {
            initMap();
            trackGPS();
        };
    </script>
</body>
</html>
