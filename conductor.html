<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Las Catalinas - Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5; height: 100vh; overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white; padding: 10px 15px; text-align: center;
            position: fixed; top: 0; left: 0; right: 0; height: 55px;
            display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000;
        }
        .header h1 { font-size: 1.1rem; }
        .app-container { position: fixed; top: 55px; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; }
        .mapa-seccion { height: 25%; background: #e5e5e5; }
        .mapa-seccion iframe { width: 100%; height: 100%; border: none; }
        .panel-seccion { height: 75%; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); overflow-y: auto; padding: 15px; }
        .toggle-box { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .viaje-item { background: #f1f8e9; border: 2px solid #81c784; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .viaje-item h4 { color: #2e7d32; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 10px; border: 2px solid #ccc; border-radius: 10px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 8px; text-align: center; display: block; text-decoration: none; }
        .btn-primary { background: #11998e; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-nav { background: #007bff; color: white; margin-top: 5px; }
        .hidden { display: none !important; }
        .msg { padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: center; display: none; font-weight: bold; }
        .msg-success { background: #e8f5e9; color: #2e7d32; }
        .msg-error { background: #ffebee; color: #c62828; }
        .spinner { width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid #11998e; border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚕 TuMovil Conductor</h1>
    </div>

    <div class="app-container">
        <div class="mapa-seccion">
            <iframe id="mapaCond" class="hidden"></iframe>
            <div id="placeholderCond" style="text-align:center; padding-top:20px; color:#666;">Dirección de viaje</div>
        </div>

        <div class="panel-seccion">
            <div class="msg" id="msg"></div>

            <div id="pasoLogin">
                <div class="input-group"><label>Nombre</label><input type="text" id="cNombre" placeholder="Tu nombre"></div>
                <div class="input-group"><label>Auto / Modelo</label><input type="text" id="cAuto" placeholder="Ej: Fiat Cronos"></div>
                <button class="btn btn-primary" onclick="guardarPerfil()">Iniciar Sesión</button>
            </div>

            <div id="pasoDisponible" class="hidden">
                <div class="toggle-box">
                    <span id="txtEstado">🔴 Fuera de línea</span>
                    <input type="checkbox" id="chkDisp" onchange="toggleDisponibilidad()" style="width:25px; height:25px;">
                </div>
                <div id="listaViajes"></div>
            </div>

            <div id="pasoDetalle" class="hidden">
                <h3 style="margin-bottom:8px;">Detalles de la Solicitud</h3>
                <p><strong>Pasajero:</strong> <span id="paxNombre">-</span></p>
                <p><strong>Origen:</strong> <span id="paxOrigen">-</span></p>
                <p><strong>Destino:</strong> <span id="paxDestino">-</span></p>
                
                <div class="input-group" style="margin-top:15px;">
                    <label style="color:#11998e;">🔒 Colocar Kilómetros calculados:</label>
                    <input type="number" id="kmInput" placeholder="Ej: 7.5" step="0.1">
                </div>
                <button class="btn btn-success" onclick="enviarTarifa()">💰 ENVIAR PRECIO</button>
                <button class="btn btn-danger" onclick="volverDispo()">❌ RECHAZAR / VOLVER</button>
            </div>

            <div id="pasoEsperando" class="hidden">
                <div class="spinner"></div>
                <h3 style="text-align:center;">Tarifa enviada...</h3>
                <p style="text-align:center; color:#666;">Esperando que el cliente presione "Confirmar viaje".</p>
            </div>

            <div id="pasoActivo" class="hidden">
                <h3 style="color:#28a745; text-align:center; margin-bottom:15px;">¡VIAJE EN CURSO!</h3>
                
                <a id="lnkOrigen" class="btn btn-nav" target="_blank">🧭 ABRIR GOOGLE MAPS (IR AL PASAJERO)</a>
                <a id="lnkDestino" class="btn btn-nav" style="background:#6c757d;" target="_blank">🧭 ABRIR GOOGLE MAPS (IR AL DESTINO)</a>
                
                <button class="btn btn-success" id="btnAccionViaje" style="margin-top:20px;" onclick="avanzarEstadoViaje()">👉 PASAJERO A BORDO</button>
                <button class="btn btn-danger" onclick="cancelarViajeMesa()">❌ CANCELAR VIAJE</button>
            </div>

        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const BASE = 3000, POR_KM = 600;
        let conductor = null, viajeActual = null, listInterval = null, waitInterval = null;

        window.addEventListener('DOMContentLoaded', () => {
            const cache = localStorage.getItem('cond_perfil');
            if(cache) { conductor = JSON.parse(cache); mostrarPaso('pasoDisponible'); }
        });

        function guardarPerfil() {
            const n = document.getElementById('cNombre').value.trim();
            const a = document.getElementById('cAuto').value.trim();
            if(!n || !a) return;
            conductor = { nombre: n, auto: a };
            localStorage.setItem('cond_perfil', JSON.stringify(conductor));
            mostrarPaso('pasoDisponible');
        }

        function toggleDisponibilidad() {
            const chk = document.getElementById('chkDisp').checked;
            document.getElementById('txtEstado').textContent = chk ? '🟢 En línea - Buscando...' : '🔴 Fuera de línea';
            if(chk) {
                listInterval = setInterval(buscarViajesPendientes, 2500);
                buscarViajesPendientes();
            } else {
                clearInterval(listInterval);
                document.getElementById('listaViajes').innerHTML = '';
            }
        }

        async function buscarViajesPendientes() {
            const { data } = await supabaseClient.from('viajes').select('*').eq('estado', 'pendiente');
            const box = document.getElementById('listaViajes');
            if(!data || data.length === 0) { box.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">No hay pedidos activos...</div>'; return; }
            
            box.innerHTML = data.map(v => `
                <div class="viaje-item" onclick="verViaje('${v.id}')">
                    <h4>👤 ${v.pasajero_nombre}</h4>
                    <p><strong>Hacia:</strong> ${v.destino_direccion}</p>
                    <p style="font-size:0.8rem; color:#666; text-align:right;">Tocar para cotizar ➡️</p>
                </div>
            `).join('');
        }

        async function verViaje(id) {
            // Frenamos la búsqueda de la lista general para evitar sobreescritura de variables
            clearInterval(listInterval);
            const { data } = await supabaseClient.from('viajes').select('*').eq('id', id).single();
            if(!data) return volverDispo();

            viajeActual = data;
            document.getElementById('paxNombre').textContent = data.pasajero_nombre;
            document.getElementById('paxOrigen').textContent = data.origen_direccion;
            document.getElementById('paxDestino').textContent = data.destino_direccion;
            
            document.getElementById('mapaCond').src = `https://maps.google.com/maps?q=${encodeURIComponent(data.destino_direccion)}&t=&z=14&output=embed`;
            document.getElementById('mapaCond').classList.remove('hidden');
            document.getElementById('placeholderCond').classList.add('hidden');
            
            mostrarPaso('pasoDetalle');
        }

        async function enviarTarifa() {
            const km = parseFloat(document.getElementById('kmInput').value);
            if(!km || km <= 0) return alert('Ingresá los kilómetros del viaje');

            const total = BASE + (km * POR_KM);

            const { error } = await supabaseClient.from('viajes').update({
                estado: 'aceptado', precio: total, distancia_km: km,
                conductor_nombre: conductor.nombre, conductor_auto: conductor.auto
            }).eq('id', viajeActual.id);

            if(error) return alert('Error de sincronización');

            mostrarPaso('pasoEsperando');
            iniciarBucleEsperaCliente();
        }

        function iniciarBucleEsperaCliente() {
            if(waitInterval) clearInterval(waitInterval);
            
            // Este bucle monitorea directo la fila del viaje actual sin importar que cambie su estado
            waitInterval = setInterval(async () => {
                const { data } = await supabaseClient.from('viajes').select('*').eq('id', viajeActual.id).single();
                if(!data) return;

                if (data.estado === 'confirmado') {
                    clearInterval(waitInterval);
                    viajeActual = data;
                    prepararPantallaViajeActivo();
                } else if (data.estado === 'cancelado') {
                    clearInterval(waitInterval);
                    mostrarMsg('El cliente canceló la orden', 'error');
                    volverDispo();
                }
            }, 2000);
        }

        function prepararPantallaViajeActivo() {
            // Configuramos los accesos directos de Google Maps para el celular
            document.getElementById('lnkOrigen').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(viajeActual.origen_direccion)}`;
            document.getElementById('lnkDestino').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(viajeActual.destino_direccion)}`;
            
            document.getElementById('btnAccionViaje').textContent = '👉 PASAJERO A BORDO';
            document.getElementById('btnAccionViaje').className = 'btn btn-success';
            
            mostrarPaso('pasoActivo');
        }

        async function avanzarEstadoViaje() {
            if (viajeActual.estado === 'confirmado') {
                // Pasamos a viaje iniciado
                await supabaseClient.from('viajes').update({ estado: 'en_viaje' }).eq('id', viajeActual.id);
                viajeActual.estado = 'en_viaje';
                document.getElementById('btnAccionViaje').textContent = '🏁 FINALIZAR VIAJE';
                document.getElementById('btnAccionViaje').className = 'btn btn-danger';
                mostrarMsg('Viaje iniciado. Conducí con cuidado.', 'success');
            } else if (viajeActual.estado === 'en_viaje') {
                // Finalizamos la orden por completo
                await supabaseClient.from('viajes').update({ estado: 'completado' }).eq('id', viajeActual.id);
                mostrarMsg('¡Viaje cobrado y completado!', 'success');
                volverDispo();
            }
        }

        function volverDispo() {
            clearInterval(waitInterval);
            document.getElementById('mapaCond').classList.add('hidden');
            document.getElementById('placeholderCond').classList.remove('hidden');
            document.getElementById('kmInput').value = '';
            mostrarPaso('pasoDisponible');
            toggleDisponibilidad(); // Reinicia la escucha activa
        }

        async function cancelarViajeMesa() {
            if(viajeActual) await supabaseClient.from('viajes').update({ estado: 'cancelado' }).eq('id', viajeActual.id);
            volverDispo();
        }

        function mostrarPaso(id) {
            ['pasoLogin', 'pasoDisponible', 'pasoDetalle', 'pasoEsperando', 'pasoActivo'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function mostrarMsg(t, tipo) {
            const m = document.getElementById('msg'); m.textContent = t; m.className = `msg msg-${tipo} show`;
            setTimeout(() => m.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
