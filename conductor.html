<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - Las Catalinas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* MANTENEMOS TU DISEÑO ORIGINAL */
        :root {
            --gris-boton: #94a3a8;
            --verde-activo: #00ff88;
            --negro-fondo: #0a0a0a;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #fff; overflow: hidden; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; }

        /* EL PANEL BLANCO DE TU CAPTURA */
        .panel-inferior {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: white; padding: 20px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 1000; text-align: center;
        }

        .btn-conectar {
            width: 100%; padding: 18px;
            background-color: var(--gris-boton);
            color: white; border: none; border-radius: 15px;
            font-size: 1.1rem; font-weight: bold; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer;
            transition: 0.3s;
        }

        .btn-conectar.activo { background-color: var(--verde-activo); color: #000; }

        .subtexto { color: #888; font-size: 0.9rem; margin-top: 12px; line-height: 1.4; }

        /* ALERTA DE NUEVO VIAJE (Mantenemos tu estilo) */
        #alerta-pedido {
            display: none; position: fixed; top: 10%; left: 5%; right: 5%;
            background: #1a1a1a; color: white; padding: 20px;
            border-radius: 20px; z-index: 2000; border: 2px solid #00d4ff;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="alerta-pedido">
        <h3 style="margin-top:0; color:#00d4ff">¡Nuevo Viaje!</h3>
        <p id="info-pax" style="font-size: 0.9rem;"></p>
        <button onclick="aceptarViaje()" style="width:100%; padding:15px; background:#00ff88; border:none; border-radius:10px; font-weight:bold">ACEPTAR</button>
        <button onclick="cerrarAlerta()" style="width:100%; padding:10px; background:none; color:white; border:none; margin-top:5px">Rechazar</button>
    </div>

    <div class="panel-inferior">
        <button id="btn-main" class="btn-conectar" onclick="toggleConexion()">CONECTARSE</button>
        <p id="texto-estado" class="subtexto">Estás desconectado. Conéctate para recibir viajes.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const SUPABASE_URL = 'https://efryvjjunfeoxhekvwza.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmcnl2amp1bmZlb3hoZWt2d3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDEyODUsImV4cCI6MjA5MzQ3NzI4NX0.FgvwONdQhv6lr772YqKHDQ2gtqjZ7f_6BO4x-7wbOwM';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, markerChofer, markerPasajero;
        let online = false;
        let pedidoActual = null;

        // Inicializar mapa
        function init() {
            map = L.map('map', { zoomControl: false }).setView([-34.65, -58.79], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // Icono de tu auto
            markerChofer = L.circleMarker([-34.65, -58.79], { radius: 8, color: '#00d4ff', fillColor: '#00d4ff', fillOpacity: 1 }).addTo(map);
            
            iniciarGPS();
        }

        function iniciarGPS() {
            navigator.geolocation.watchPosition(pos => {
                const latlng = [pos.coords.latitude, pos.coords.longitude];
                markerChofer.setLatLng(latlng);
                if(online) actualizarUbicacion(pos.coords);
            }, null, { enableHighAccuracy: true });
        }

        async function actualizarUbicacion(coords) {
            await supabase.from('conductores').upsert({
                id: 'B2E55E81-B40E-48AD-89D8-0D41D56D5FB8', // Tu ID fijo
                lat: coords.latitude,
                lng: coords.longitude,
                ultima_conexion: new Date()
            });
        }

        function toggleConexion() {
            online = !online;
            const btn = document.getElementById('btn-main');
            const txt = document.getElementById('texto-estado');

            if(online) {
                btn.textContent = "EN LÍNEA";
                btn.classList.add('activo');
                txt.textContent = "Buscando pasajeros en Las Catalinas...";
                escucharViajes();
            } else {
                btn.textContent = "CONECTARSE";
                btn.classList.remove('activo');
                txt.textContent = "Estás desconectado. Conéctate para recibir viajes.";
            }
        }

        function escucharViajes() {
            supabase.channel('pedidos')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'viajes' }, payload => {
                    if(payload.new.estado === 'pendiente') {
                        mostrarAlerta(payload.new);
                    }
                }).subscribe();
        }

        function mostrarAlerta(viaje) {
            pedidoActual = viaje;
            document.getElementById('info-pax').innerHTML = `
                <b>Pasajero:</b> ${viaje.nombre_pasajero}<br>
                <b>Desde:</b> ${viaje.direccion_salida}<br>
                <b>Hacia:</b> ${viaje.destino}<br>
                <b>Precio:</b> $${viaje.tarifa_total}
            `;
            document.getElementById('alerta-pedido').style.display = 'block';
        }

        async function aceptarViaje() {
            const { error } = await supabase.from('viajes')
                .update({ estado: 'aceptado', conductor_id: 'B2E55E81-B40E-48AD-89D8-0D41D56D5FB8' })
                .eq('id', pedidoActual.id);

            if(!error) {
                document.getElementById('alerta-pedido').style.display = 'none';
                if(markerPasajero) map.removeLayer(markerPasajero);
                markerPasajero = L.marker([pedidoActual.lat_salida, pedidoActual.lng_salida]).addTo(map).bindPopup("RECOGER AQUÍ").openPopup();
                map.flyTo([pedidoActual.lat_salida, pedidoActual.lng_salida], 16);
            }
        }

        function cerrarAlerta() {
            document.getElementById('alerta-pedido').style.display = 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
