<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conductor - Las Catalinas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, sans-serif; background: #fff; overflow: hidden; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; }

        /* EL PANEL BLANCO IDÉNTICO A TU FOTO */
        .panel-inferior {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: white; padding: 30px 25px 40px 25px;
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            z-index: 1000; text-align: center;
        }

        .btn-conectar {
            width: 100%; padding: 22px;
            background-color: #94a3a8; /* Ese gris exacto de tu captura */
            color: white; border: none; border-radius: 18px;
            font-size: 1.2rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: background 0.3s;
        }

        .btn-conectar.activo { background-color: #2ecc71; }

        .subtexto { 
            color: #8e8e93; font-size: 1.05rem; 
            margin-top: 18px; font-weight: 400;
            letter-spacing: -0.2px;
        }

        /* ALERTA FLOTANTE PARA EL VIAJE */
        #alerta-pedido {
            display: none; position: fixed; top: 15%; left: 20px; right: 20px;
            background: #1c1c1e; color: white; padding: 25px;
            border-radius: 25px; z-index: 2000; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .btn-aceptar { width: 100%; padding: 18px; background: #2ecc71; border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 1rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="alerta-pedido">
        <h2 style="margin:0 0 15px 0; color:#2ecc71">¡Nuevo Viaje!</h2>
        <div id="detalles" style="line-height:1.6; font-size: 0.95rem; opacity: 0.9;"></div>
        <button class="btn-aceptar" onclick="aceptarViaje()">ACEPTAR VIAJE</button>
    </div>

    <div class="panel-inferior">
        <button id="btn-main" class="btn-conectar" onclick="toggleConexion()">CONECTARSE</button>
        <p id="texto-estado" class="subtexto">Estás desconectado. Conéctate para recibir viajes.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const SUPABASE_URL = 'https://efryvjjunfeoxhekvwza.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmcnl2amp1bmZlb3hoZWt2d3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDEyODUsImV4cCI6MjA5MzQ3NzI4NX0.FgvwONdQhv6lr772YqKHDQ2gtqjZ7f_6BO4x-7wbOwM';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, markerChofer, markerPasajero;
        let online = false;
        let pedidoActual = null;
        const CONDUCTOR_ID = 'b2e55e81-b40e-48ad-89d8-0d41d56d5fb8';

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-34.56, -58.77], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            markerChofer = L.circleMarker([-34.56, -58.77], { 
                radius: 10, color: '#fff', weight: 3, fillColor: '#007aff', fillOpacity: 1 
            }).addTo(map);

            iniciarRastreo();
        }

        function iniciarRastreo() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                markerChofer.setLatLng([latitude, longitude]);
                if (online) {
                    supabase.from('conductores').upsert({ id: CONDUCTOR_ID, lat: latitude, lng: longitude, ultima_conexion: new Date() }).then();
                }
            }, null, { enableHighAccuracy: true });
        }

        function toggleConexion() {
            online = !online;
            const btn = document.getElementById('btn-main');
            const txt = document.getElementById('texto-estado');

            if(online) {
                btn.textContent = "EN LÍNEA";
                btn.classList.add('activo');
                txt.textContent = "Buscando viajes cercanos...";
                escucharCanal();
            } else {
                btn.textContent = "CONECTARSE";
                btn.classList.remove('activo');
                txt.textContent = "Estás desconectado. Conéctate para recibir viajes.";
            }
        }

        function escucharCanal() {
            supabase.channel('viajes-nuevos').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'viajes' }, payload => {
                if(payload.new.estado === 'pendiente') {
                    pedidoActual = payload.new;
                    document.getElementById('detalles').innerHTML = `
                        <b>Pasajero:</b> ${pedidoActual.nombre_pasajero}<br>
                        <b>Recoger en:</b> ${pedidoActual.direccion_salida}<br>
                        <b>Destino:</b> ${pedidoActual.destino || 'A convenir'}<br>
                        <b>Tarifa:</b> $${pedidoActual.tarifa_total || pedidoActual.precio || '0'}
                    `;
                    document.getElementById('alerta-pedido').style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            }).subscribe();
        }

        async function aceptarViaje() {
            const { error } = await supabase.from('viajes').update({ estado: 'aceptado', conductor_id: CONDUCTOR_ID }).eq('id', pedidoActual.id);
            if(!error) {
                document.getElementById('alerta-pedido').style.display = 'none';
                if(markerPasajero) map.removeLayer(markerPasajero);
                markerPasajero = L.marker([pedidoActual.lat_salida, pedidoActual.lng_salida]).addTo(map).bindPopup("RECOGER AQUÍ").openPopup();
                map.flyTo([pedidoActual.lat_salida, pedidoActual.lng_salida], 16);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
