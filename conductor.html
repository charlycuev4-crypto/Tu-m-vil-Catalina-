<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Las Catalinas - Conductor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 10px 15px;
            text-align: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .header h1 { font-size: 1.1rem; margin: 0; }
        .header p { font-size: 0.7rem; opacity: 0.9; margin: 0; }
        .app-container {
            position: fixed;
            top: 55px; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
        }
        .mapa-seccion { height: 25%; min-height: 120px; position: relative; background: #e5e5e5; }
        .mapa-seccion iframe { width: 100%; height: 100%; border: none; }
        .mapa-placeholder {
            width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center;
            flex-direction: column; color: #888; font-size: 0.9rem;
            background: linear-gradient(135deg, #e0e0e0 0%, #f0f0f0 100%);
        }
        .mapa-fullscreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; background: #e5e5e5; display: none; }
        .mapa-fullscreen.activo { display: block; }
        .mapa-fullscreen iframe { width: 100%; height: 100%; border: none; }
        .btn-volver-nav {
            position: absolute; top: 15px; left: 15px; z-index: 10000;
            background: white; border: none; border-radius: 50%;
            width: 50px; height: 50px; font-size: 1.3rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
        }
        .btn-llegue {
            position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 10000;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white; border: none; border-radius: 16px; padding: 18px;
            font-size: 1.1rem; font-weight: 700; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .panel-seccion { height: 75%; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); overflow-y: auto; z-index: 10; }
        .panel-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 8px auto; }
        .panel-contenido { padding: 0 15px 20px; }
        .toggle-box { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; border-radius: 14px; padding: 12px 15px; margin-bottom: 12px; }
        .toggle-box .texto { font-size: 0.9rem; font-weight: 600; }
        .toggle-box .texto.disponible { color: #28a745; }
        .toggle-box .texto.ocupado { color: #dc3545; }
        .toggle-switch { position: relative; width: 56px; height: 30px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 30px; transition: 0.3s; }
        .toggle-slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .toggle-switch input:checked + .toggle-slider { background: #28a745; }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(26px); }
        .lista-viajes { margin-top: 10px; }
        .viaje-item { background: #f8f9fa; border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .viaje-item:hover { border-color: #11998e; background: #e8f5e9; }
        .viaje-item .nombre { font-weight: 700; font-size: 0.95rem; color: #333; margin-bottom: 4px; }
        .viaje-item .ruta { font-size: 0.8rem; color: #666; margin-bottom: 6px; }
        .viaje-item .badge { display: inline-block; background: #11998e; color: white; padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
        .sin-viajes { text-align: center; padding: 30px 20px; color: #888; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 3px; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.9rem; }
        .input-group input:focus { outline: none; border-color: #11998e; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; text-align: center; margin-bottom: 8px; }
        .btn-primary { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #34ce57 100%); color: white; }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-maps { background: linear-gradient(135deg, #4285f4 0%, #34a853 100%); color: white; }
        .btn-outline { background: transparent; color: #11998e; border: 2px solid #11998e; }
        .btn-nav { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-limpiar { background: #6c757d; color: white; font-size: 0.85rem; padding: 10px; }
        .btn-reset-total { background: #dc3545; color: white; font-size: 0.9rem; padding: 12px; margin-top: 8px; }
        .info-pasajero { background: #e3f2fd; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .info-pasajero .fila { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.1rem; font-weight: bold; }
        .datos h4 { margin: 0; font-size: 0.95rem; }
        .datos p { margin: 2px 0 0; font-size: 0.8rem; color: #666; }
        .ruta-box { background: #fff8f3; border-radius: 12px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #f47920; }
        .ruta-box .titulo { font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
        .ruta-box .direccion { font-size: 0.9rem; color: #333; font-weight: 600; }
        .tarifa-preview { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 16px; text-align: center; margin: 12px 0; }
        .tarifa-preview .precio { font-size: 2.2rem; font-weight: 800; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #11998e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg { padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.85rem; text-align: center; display: none; font-weight: 600; }
        .msg.show { display: block; }
        .msg-error { background: #ffebee; color: #c62828; }
        .msg-success { background: #e8f5e9; color: #2e7d32; }
        .msg-info { background: #e3f2fd; color: #1565c0; }
        .hidden { display: none !important; }

        .debug-log {
            background: #1a1a2e;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
            max-height: 100px;
            overflow-y: auto;
            line-height: 1.4;
        }
        .debug-log .line { margin: 1px 0; }
        .debug-log .line.error { color: #ff6b6b; }
        .debug-log .line.success { color: #00ff88; }
        .debug-log .line.warn { color: #ff9800; }

        .km-input-destacado { border: 3px solid #ff9800 !important; background: #fff8e1 !important; }
        .km-input-ok { border: 3px solid #28a745 !important; background: #e8f5e9 !important; }

        .stats-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚕 TuMovil Conductor</h1>
        <p>Control de Viajes en Tiempo Real</p>
    </div>

    <div class="mapa-fullscreen" id="mapaFullscreen">
        <button class="btn-volver-nav" onclick="cerrarNavegacion()">←</button>
        <iframe id="navIframe" src=""></iframe>
        <button class="btn-llegue" id="btnLlegue">✅ REGISTRAR ACCION</button>
    </div>

    <div class="app-container">
        <div class="mapa-seccion" id="mapaSeccion">
            <div class="mapa-placeholder" id="mapaPlaceholder">
                <div style="font-size:2.5rem; margin-bottom:8px;">🗺️</div>
                <div>Destino del Pasajero</div>
            </div>
            <iframe id="googleMapIframe" class="hidden" src=""></iframe>
        </div>

        <div class="panel-seccion">
            <div class="panel-handle"></div>
            <div class="panel-contenido">
                <div class="msg" id="msg"></div>

                <div id="pasoLogin">
                    <div class="input-group"><label>Tu nombre</label><input type="text" id="condNombre" placeholder="Ej: Juan Pérez"></div>
                    <div class="input-group"><label>Teléfono</label><input type="tel" id="condTelefono" placeholder="Ej: 1133667793"></div>
                    <div class="input-group"><label>Auto</label><input type="text" id="condAuto" placeholder="Ej: VW Gol Trend"></div>
                    <div class="input-group"><label>Patente</label><input type="text" id="condPatente" placeholder="Ej: ABC 123"></div>
                    <button class="btn btn-primary" onclick="registrarConductor()">✅ EMPEZAR A TRABAJAR</button>
                </div>

                <div id="pasoDisponible" class="hidden">
                    <div class="toggle-box">
                        <div class="texto" id="toggleTexto">🔴 No disponible</div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggleDisp" onchange="cambiarDisponibilidad()">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="stats-box">
                        <span id="statsPendientes">Viajes pendientes: --</span>
                        <span id="statsFantasmas">Fantasmas: --</span>
                    </div>
                    <div class="lista-viajes" id="listaViajes"></div>
                    <button class="btn btn-limpiar" onclick="limpiarViajesFantasma()">🧹 LIMPIAR VIAJES FANTASMA</button>
                    <button class="btn btn-reset-total" onclick="borrarTodosLosViajes()">🗑️ BORRAR TODOS LOS VIAJES</button>
                    <div class="debug-log" id="debugLogDisponible"></div>
                </div>

                <div id="pasoDetalle" class="hidden">
                    <div class="info-pasajero">
                        <div class="fila">
                            <div class="avatar" id="avatarPax">?</div>
                            <div class="datos"><h4 id="nombrePax">-</h4><p id="telPax">-</p></div>
                        </div>
                    </div>
                    <div class="ruta-box"><div class="titulo">🚩 ORIGEN</div><div class="direccion" id="origenPax">-</div></div>
                    <div class="ruta-box" style="border-left-color:#28a745;"><div class="titulo">🏁 DESTINO SOLICITADO</div><div class="direccion" id="destinoPax">-</div></div>

                    <div class="input-group" style="margin-top:15px;">
                        <label style="color:#11998e; font-weight:700;">✏️ Digitá los Kilómetros del mapa:</label>
                        <input type="number" id="kmInput" placeholder="Ej: 5.4" step="0.1" oninput="calcularTarifaEnVivo()">
                    </div>
                    <div class="tarifa-preview" id="liveTarifaBox" style="background:#444; padding:10px; margin-bottom:10px;">
                        <div style="font-size:1.2rem; font-weight:bold;" id="liveTarifaPrecio">$0</div>
                    </div>

                    <button class="btn btn-success" id="btnEnviarPrecio" onclick="enviarPrecio()">💰 ENVIAR ESTA TARIFA AL PASAJERO</button>
                    <button class="btn btn-danger" onclick="cancelarYLiberarViaje()">❌ RECHAZAR / LIBERAR VIAJE</button>
                    <div class="debug-log" id="debugLogDetalle"></div>
                </div>

                <div id="pasoEsperando" class="hidden">
                    <div class="estado-box">
                        <div class="spinner"></div>
                        <h2>Esperando respuesta del pasajero...</h2>
                        <p>Le enviamos la cotización.</p>
                    </div>
                    <div class="debug-log" id="debugLogEsperando"></div>
                    <button class="btn btn-danger" style="margin-top:20px;" onclick="cancelarYLiberarViaje()">❌ CANCELAR COTIZACIÓN</button>
                </div>

                <div id="pasoConfirmado" class="hidden">
                    <h2 style="text-align:center; margin:15px 0;">¡Confirmado! En viaje</h2>
                    <button class="btn btn-nav" onclick="navegarGPS('origen')">🧭 VER EN GOOGLE MAPS (ORIGEN)</button>
                    <button class="btn btn-nav" onclick="navegarGPS('destino')">🧭 VER EN GOOGLE MAPS (DESTINO)</button>
                    <button class="btn btn-success" onclick="finalizarViajeConductor()">🏁 FINALIZAR VIAJE</button>
                    <button class="btn btn-danger" onclick="cancelarYLiberarViaje()">❌ CANCELAR POR EMERGENCIA</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TARIFA_BASE = 3000;
        const TARIFA_POR_KM = 600;
        let conductorDatos = null;
        let viajeActual = null;
        let subViajes = null;
        let pollIntervalConductor = null;
        let pasoActual = '';

        function log(msg, tipo = 'info') {
            const hora = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const lineText = `[${hora}] ${msg}`;
            console.log(`[${tipo.toUpperCase()}] ${msg}`);

            let debugDiv = null;
            if (pasoActual === 'pasoDisponible') debugDiv = document.getElementById('debugLogDisponible');
            else if (pasoActual === 'pasoDetalle') debugDiv = document.getElementById('debugLogDetalle');
            else if (pasoActual === 'pasoEsperando') debugDiv = document.getElementById('debugLogEsperando');

            if (debugDiv) {
                const line = document.createElement('div');
                line.className = 'line ' + tipo;
                line.textContent = lineText;
                debugDiv.appendChild(line);
                debugDiv.scrollTop = debugDiv.scrollHeight;
            }
        }

        function registrarConductor() {
            const nombre = document.getElementById('condNombre').value.trim();
            const telefono = document.getElementById('condTelefono').value.trim();
            const auto = document.getElementById('condAuto').value.trim();
            const patente = document.getElementById('condPatente').value.trim();
            if(!nombre || !telefono) return mostrarMsg('Completá los datos básicos', 'error');

            conductorDatos = { nombre, telefono, auto: `${auto} (${patente})` };
            localStorage.setItem('conductorDatos', JSON.stringify(conductorDatos));
            log('Conductor registrado: ' + nombre, 'success');
            mostrarPaso('pasoDisponible');
            escucharViajesGlobales();
        }

        window.addEventListener('DOMContentLoaded', () => {
            const datos = localStorage.getItem('conductorDatos');
            if(datos) {
                conductorDatos = JSON.parse(datos);
                log('Conductor recuperado de localStorage', 'info');
                mostrarPaso('pasoDisponible');
                escucharViajesGlobales();
            }
        });

        function cambiarDisponibilidad() {
            const chk = document.getElementById('toggleDisp').checked;
            document.getElementById('toggleTexto').textContent = chk ? '🟢 Estoy disponible' : '🔴 No disponible';
            document.getElementById('toggleTexto').className = chk ? 'texto disponible' : 'texto ocupado';
            log('Disponibilidad: ' + (chk ? 'DISPONIBLE' : 'NO DISPONIBLE'), 'info');
            actualizarLista();
        }

        function escucharViajesGlobales() {
            if(subViajes) subViajes.unsubscribe();
            log('Iniciando escucha de viajes globales...', 'info');
            subViajes = supabaseClient.channel('global').on('postgres_changes', { event:'*', schema:'public', table:'viajes' }, () => {
                actualizarLista();
            }).subscribe();
            actualizarLista();
        }

        async function actualizarLista() {
            if(!document.getElementById('toggleDisp').checked) {
                document.getElementById('listaViajes').innerHTML = '<div class="sin-viajes">Activá disponibilidad para ver viajes.</div>';
                document.getElementById('statsPendientes').textContent = 'Viajes pendientes: --';
                document.getElementById('statsFantasmas').textContent = 'Fantasmas: --';
                return;
            }
            try {
                const { data: todos, error: errTodos } = await supabaseClient.from('viajes').select('estado, created_at');
                if (!errTodos && todos) {
                    const pendientes = todos.filter(v => v.estado === 'pendiente').length;
                    const fantasmas = todos.filter(v => {
                        if (v.estado !== 'pendiente' && v.estado !== 'aceptado') return false;
                        const creado = new Date(v.created_at);
                        const ahora = new Date();
                        const diffMin = (ahora - creado) / 1000 / 60;
                        return diffMin > 30;
                    }).length;
                    document.getElementById('statsPendientes').textContent = `Viajes pendientes: ${pendientes}`;
                    document.getElementById('statsFantasmas').textContent = `Fantasmas: ${fantasmas}`;
                }

                const { data, error } = await supabaseClient.from('viajes').select('*').eq('estado', 'pendiente');
                if (error) return;
                
                const lista = document.getElementById('listaViajes');
                if(!data || data.length === 0) {
                    lista.innerHTML = '<div class="sin-viajes">📭 No hay solicitudes activas en la zona</div>';
                    return;
                }
                lista.innerHTML = data.map(v => {
                    const creado = new Date(v.created_at);
                    const ahora = new Date();
                    const diffMin = Math.round((ahora - creado) / 1000 / 60);
                    const tiempo = diffMin < 1 ? 'Ahora' : diffMin + 'min';
                    return `
                    <div class="viaje-item" onclick="verDetalleViaje('${v.id}')">
                        <div class="nombre">👤 ${v.pasajero_nombre} <span style="font-size:0.7rem;color:#888;">(${tiempo})</span></div>
                        <div class="ruta">🚩 ${v.origen_direccion} <br> 🏁 Destino: ${v.destino_direccion}</div>
                        <span class="badge">Tomar Orden</span>
                    </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function limpiarViajesFantasma() {
            if (!confirm('¿Limpiar viajes antiguos y cancelados?')) return;
            try {
                const { data: antiguos } = await supabaseClient.from('viajes').select('id, estado').lt('created_at', new Date(Date.now() - 30*60*1000).toISOString());
                let borrados = 0;
                for (const v of antiguos || []) {
                    if (['pendiente', 'cancelado', 'completado'].includes(v.estado)) {
                        const { error } = await supabaseClient.from('viajes').delete().eq('id', v.id);
                        if (!error) borrados++;
                    }
                }
                mostrarMsg(`🧹 ${borrados} viajes limpiados`, 'success');
                actualizarLista();
            } catch (e) { console.error(e); }
        }

        async function borrarTodosLosViajes() {
            if (!confirm('⚠️ ¿Borrar TODOS los viajes de la base de datos?')) return;
            try {
                const { data: todos } = await supabaseClient.from('viajes').select('id');
                let borrados = 0;
                for (const viaje of todos || []) {
                    const { error } = await supabaseClient.from('viajes').delete().eq('id', viaje.id);
                    if (!error) borrados++;
                }
                mostrarMsg(`🗑️ ${borrados} viajes eliminados`, 'success');
                actualizarLista();
            } catch (e) { console.error(e); }
        }

        async function verDetalleViaje(id) {
            try {
                const { data, error } = await supabaseClient.from('viajes').select('*').eq('id', id).single();
                if(error || !data) return;
                viajeActual = data;

                document.getElementById('nombrePax').textContent = data.pasajero_nombre;
                document.getElementById('telPax').textContent = '📞 ' + data.pasajero_telefono;
                document.getElementById('origenPax').textContent = data.origen_direccion;
                document.getElementById('destinoPax').textContent = data.destino_direccion;

                document.getElementById('kmInput').value = '';
                document.getElementById('kmInput').className = '';
                document.getElementById('liveTarifaPrecio').textContent = '$0';
                document.getElementById('liveTarifaBox').style.background = '#444';

                // CORREGIDA la interpolación de mapas acá:
                const urlMaps = `https://maps.google.com/maps?q=${encodeURIComponent(data.destino_direccion)}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
                document.getElementById('googleMapIframe').src = urlMaps;
                document.getElementById('googleMapIframe').classList.remove('hidden');
                document.getElementById('mapaPlaceholder').classList.add('hidden');

                mostrarPaso('pasoDetalle');
            } catch (e) { console.error(e); }
        }

        function calcularTarifaEnVivo() {
            const input = document.getElementById('kmInput');
            const km = parseFloat(input.value);
            if (!km || km <= 0) {
                input.className = 'km-input-destacado';
                document.getElementById('liveTarifaPrecio').textContent = '$0';
                document.getElementById('liveTarifaBox').style.background = '#444';
                return;
            }
            input.className = 'km-input-ok';
            const total = TARIFA_BASE + (km * TARIFA_POR_KM);
            document.getElementById('liveTarifaPrecio').textContent = `Tarifa: $${total.toLocaleString('es-AR')}`;
            document.getElementById('liveTarifaBox').style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }

        async function enviarPrecio() {
            const kmInput = document.getElementById('kmInput');
            const km = parseFloat(kmInput.value);

            if(!km || km <= 0 || isNaN(km)) {
                kmInput.className = 'km-input-destacado';
                mostrarMsg('⚠️ Colocá los kilómetros primero', 'error');
                return;
            }

            const total = TARIFA_BASE + (km * TARIFA_POR_KM);
            const btn = document.getElementById('btnEnviarPrecio');
            btn.disabled = true;
            btn.textContent = '⏳ Enviando...';

            try {
                const { error } = await supabaseClient.from('viajes').update({
                    estado: 'aceptado',
                    precio: total,
                    distancia_km: km,
                    conductor_nombre: conductorDatos.nombre,
                    conductor_auto: conductorDatos.auto
                }).eq('id', viajeActual.id);

                if (error) {
                    mostrarMsg('Error: ' + error.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '💰 ENVIAR ESTA TARIFA';
                    return;
                }

                mostrarMsg('💰 Precio enviado', 'success');
                mostrarPaso('pasoEsperando');
                iniciarPollingEspera(viajeActual.id);
            } catch (e) {
                btn.disabled = false;
            }
        }

        function iniciarPollingEspera(id) {
            if (pollIntervalConductor) clearInterval(pollIntervalConductor);
            log('🔄 Esperando respuesta del pasajero...', 'info');

            pollIntervalConductor = setInterval(async () => {
                try {
                    const { data, error } = await supabaseClient.from('viajes').select('*').eq('id', id).single();
                    if (error || !data) return;

                    // CORREGIDO: Ahora escucha el estado "confirmado" que manda el pasajero
                    if (data.estado === 'confirmado') {
                        log('✅ ¡El pasajero aceptó la tarifa!', 'success');
                        clearInterval(pollIntervalConductor);
                        pollIntervalConductor = null;
                        mostrarPaso('pasoConfirmado');
                        mostrarMsg('¡Pasajero confirmó! Andá a buscarlo.', 'success');
                        return;
                    }

                    if (data.estado === 'pendiente' && !data.precio) {
                        clearInterval(pollIntervalConductor);
                        mostrarMsg('El pasajero rechazó la cotización.', 'warn');
                        limpiarYVolver();
                        return;
                    }

                    if (data.estado === 'cancelado') {
                        clearInterval(pollIntervalConductor);
                        mostrarMsg('El pasajero canceló el viaje.', 'error');
                        limpiarYVolver();
                        return;
                    }
                } catch (e) { console.error(e); }
            }, 2000);
        }

        async function finalizarViajeConductor() {
            if(!viajeActual) return;
            try {
                await supabaseClient.from('viajes').update({ estado: 'completado' }).eq('id', viajeActual.id);
                mostrarMsg('¡Viaje Completado con éxito!', 'success');
                limpiarYVolver();
            } catch (e) { console.error(e); }
        }

        async function cancelarYLiberarViaje() {
            if(!viajeActual) return;
            try {
                await supabaseClient.from('viajes').update({ 
                    estado: 'pendiente', precio: null, distancia_km: null, conductor_nombre: null, conductor_auto: null
                }).eq('id', viajeActual.id);
                mostrarMsg('Viaje liberado.', 'info');
                limpiarYVolver();
            } catch (e) { console.error(e); }
        }

        function limpiarYVolver() {
            if (pollIntervalConductor) { clearInterval(pollIntervalConductor); pollIntervalConductor = null; }
            viajeActual = null;
            document.getElementById('kmInput').value = '';
            document.getElementById('googleMapIframe').classList.add('hidden');
            document.getElementById('mapaPlaceholder').classList.remove('hidden');
            mostrarPaso('pasoDisponible');
            actualizarLista();
        }

        function navegarGPS(tipo) {
            if(!viajeActual) return;
            const dest = tipo === 'origen' ? viajeActual.origen_direccion : viajeActual.destino_direccion;
            
            // CORREGIDA la interpolación de texto de mapas quitando el '0' roto
            document.getElementById('navIframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(dest)}&t=&z=14&output=embed`;
            document.getElementById('mapaFullscreen').classList.add('activo');

            const btn = document.getElementById('btnLlegue');
            if(tipo === 'origen') {
                btn.textContent = '✅ LLEGUE AL PASAJERO (INICIAR VIAJE)';
                btn.onclick = async function() {
                    try {
                        // Cambia a "en_viaje" para avisarle al pasajero que ya arrancaron hacia el destino
                        await supabaseClient.from('viajes').update({ estado: 'en_viaje' }).eq('id', viajeActual.id);
                        cerrarNavegacion();
                        mostrarMsg('¡Pasajero a bordo! Yendo al destino...', 'success');
                    } catch (e) { console.error(e); }
                };
            } else {
                btn.textContent = '✅ LLEGUE AL DESTINO (FINALIZAR)';
                btn.onclick = function() {
                    finalizarViajeConductor();
                    cerrarNavegacion();
                };
            }
        }

        function cerrarNavegacion() { 
            document.getElementById('mapaFullscreen').classList.remove('activo'); 
        }

        function mostrarPaso(id) {
            pasoActual = id;
            ['pasoLogin', 'pasoDisponible', 'pasoDetalle', 'pasoEsperando', 'pasoConfirmado'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        
        function mostrarMsg(t, tipo) {
            const m = document.getElementById('msg'); m.textContent = t; m.className = `msg msg-${tipo} show`;
            setTimeout(() => m.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
