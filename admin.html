<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Panel de Control Familiar</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #1e293b; padding: 24px; border-radius: 16px; border: 1px solid #334155; }
        h2 { margin-top: 0; color: #38bdf8; text-align: center; }
        .grid-vehiculos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #0f172a; padding: 16px; border-radius: 12px; border: 1px solid #475569; }
        .card h3 { margin-top: 0; padding-bottom: 8px; border-bottom: 2px solid; font-size: 1.1rem; }
        .card-auto h3 { color: #60a5fa; border-color: #3b82f6; }
        .card-moto h3 { color: #facc15; border-color: #eab308; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #94a3b8; }
        input { width: 100%; padding: 10px; background: #1e293b; border: 1px solid #475569; border-radius: 6px; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background: #059669; }
        .msg { padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px; display: none; font-size: 0.9rem; }
        .success { background: #065f46; color: #34d399; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎛️ Panel de Control Familiar</h2>
        <div id="statusMsg" class="msg"></div>
        <div class="grid-vehiculos">
            <!-- SECCIÓN AUTO -->
            <div class="card card-auto">
                <h3>🚗 Categoría: AUTO</h3>
                <div class="form-group"><label>Chofer:</label><input type="text" id="autoChofer" value="Carlos Cueva"></div>
                <div class="form-group"><label>Vehículo / Modelo:</label><input type="text" id="autoModelo" value="Ford Fiesta Max"></div>
                <div class="form-group"><label>Patente:</label><input type="text" id="autoPatente" value="JCP 478"></div>
                <div class="form-group"><label>Tarifa Base ($):</label><input type="number" id="autoBase" value="3000"></div>
                <div class="form-group"><label>Precio x Km ($):</label><input type="number" id="autoKm" value="600"></div>
            </div>
            <!-- SECCIÓN MOTO -->
            <div class="card card-moto">
                <h3>🏍️ Categoría: MOTO</h3>
                <div class="form-group"><label>Chofer:</label><input type="text" id="motoChofer" value="Hijo de Carlos"></div>
                <div class="form-group"><label>Moto / Cilindrada:</label><input type="text" id="motoModelo" value="Honda Wave 110"></div>
                <div class="form-group"><label>Patente:</label><input type="text" id="motoPatente" value="999-XYZ"></div>
                <div class="form-group"><label>Tarifa Base ($):</label><input type="number" id="motoBase" value="1500"></div>
                <div class="form-group"><label>Precio x Km ($):</label><input type="number" id="motoKm" value="350"></div>
            </div>
        </div>
        <button onclick="guardarConfiguracion()">Guardar Flota y Tarifas</button>
    </div>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('cfg_auto_base')) {
                document.getElementById('autoChofer').value = localStorage.getItem('cfg_auto_chofer');
                document.getElementById('autoModelo').value = localStorage.getItem('cfg_auto_modelo');
                document.getElementById('autoPatente').value = localStorage.getItem('cfg_auto_patente');
                document.getElementById('autoBase').value = localStorage.getItem('cfg_auto_base');
                document.getElementById('autoKm').value = localStorage.getItem('cfg_auto_km');
            }
            if(localStorage.getItem('cfg_moto_base')) {
                document.getElementById('motoChofer').value = localStorage.getItem('cfg_moto_chofer');
                document.getElementById('motoModelo').value = localStorage.getItem('cfg_moto_modelo');
                document.getElementById('motoPatente').value = localStorage.getItem('cfg_moto_patente');
                document.getElementById('motoBase').value = localStorage.getItem('cfg_moto_base');
                document.getElementById('motoKm').value = localStorage.getItem('cfg_moto_km');
            }
        });
        function guardarConfiguracion() {
            localStorage.setItem('cfg_auto_chofer', document.getElementById('autoChofer').value.trim());
            localStorage.setItem('cfg_auto_modelo', document.getElementById('autoModelo').value.trim());
            localStorage.setItem('cfg_auto_patente', document.getElementById('autoPatente').value.trim());
            localStorage.setItem('cfg_auto_base', document.getElementById('autoBase').value.trim());
            localStorage.setItem('cfg_auto_km', document.getElementById('autoKm').value.trim());
            
            localStorage.setItem('cfg_moto_chofer', document.getElementById('motoChofer').value.trim());
            localStorage.setItem('cfg_moto_modelo', document.getElementById('motoModelo').value.trim());
            localStorage.setItem('cfg_moto_patente', document.getElementById('motoPatente').value.trim());
            localStorage.setItem('cfg_moto_base', document.getElementById('motoBase').value.trim());
            localStorage.setItem('cfg_moto_km', document.getElementById('motoKm').value.trim());

            const msg = document.getElementById('statusMsg');
            msg.textContent = "¡Configuraciones de la flota guardadas!";
            msg.className = "msg success";
            setTimeout(() => msg.className = "msg", 3000);
        }
    </script>
</body>
</html>
