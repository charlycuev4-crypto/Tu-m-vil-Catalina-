<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuMovil - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; }
        button { background: #667eea; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .paso { display: none; }
        .paso.activo { display: block; }
        .precio-box { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 12px; text-align: center; margin: 15px 0; }
        .precio-box h2 { font-size: 2rem; }
        .timer { color: #ff6b6b; font-size: 1.2rem; text-align: center; margin: 10px 0; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚕 TuMovil Pasajero</h1>
        
        <div id="paso1" class="paso activo">
            <input type="text" id="nombre" placeholder="Tu nombre">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <input type="text" id="destino" placeholder="¿A dónde vas?">
            <button onclick="pedirViaje()">PEDIR MÓVIL</button>
        </div>

        <div id="paso2" class="paso">
            <p>Buscando conductor...</p>
            <div id="estadoViaje" class="info">Estado: pendiente</div>
        </div>

        <div id="paso3" class="paso">
            <div class="precio-box">
                <div>Precio del viaje</div>
                <h2 id="montoPrecio">$0</h2>
                <div id="detallePrecio"></div>
            </div>
            <div id="infoConductor" class="info"></div>
            <div class="timer" id="timerConfirm">Tenés 60s para confirmar</div>
            <button onclick="confirmarViaje()" style="background: #28a745;">✅ CONFIRMAR Y VIAJAR</button>
            <button onclick="rechazarViaje()" style="background: #ff6b6b;">❌ RECHAZAR</button>
        </div>

        <div id="paso4" class="paso">
            <h2>¡Tu móvil está llegando! 🚗</h2>
            <div id="infoConductor2" class="info"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let viajeId = null;
        let pollInterval = null;
        let timerInterval = null;

        function mostrarPaso(id) {
            document.querySelectorAll('.paso').forEach(p => p.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        async function pedirViaje() {
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            const destino = document.getElementById('destino').value;
            
            if (!nombre || !telefono || !destino) {
                alert('Completá todos los datos');
                return;
            }

            const { data, error } = await supabase.from('viajes').insert({
                estado: 'pendiente',
                pasajero_nombre: nombre,
                pasajero_telefono: telefono,
                destino_direccion: destino,
                origen_direccion: 'Ubicación actual'
            }).select().single();

            if (error) {
                alert('Error: ' + error.message);
                return;
            }

            viajeId = data.id;
            mostrarPaso('paso2');
            iniciarPolling();
        }

        function iniciarPolling() {
            pollInterval = setInterval(async () => {
                const { data, error } = await supabase.from('viajes').select('*').eq('id', viajeId).single();
                if (error || !data) return;

                document.getElementById('estadoViaje').textContent = 'Estado: ' + data.estado + ' | Precio: ' + (data.precio || '---');

                if (data.estado === 'aceptado' && data.precio) {
                    clearInterval(pollInterval);
                    document.getElementById('montoPrecio').textContent = '$' + data.precio.toLocaleString();
                    document.getElementById('detallePrecio').textContent = `Base $3.000 + ${data.distancia_km}km × $600`;
                    document.getElementById('infoConductor').textContent = `Conductor: ${data.conductor_nombre} | ${data.conductor_auto}`;
                    mostrarPaso('paso3');
                    iniciarTimer();
                }
            }, 3000);
        }

        function iniciarTimer() {
            let seg = 60;
            timerInterval = setInterval(() => {
                seg--;
                document.getElementById('timerConfirm').textContent = 'Tenés ' + seg + 's para confirmar';
                if (seg <= 0) rechazarViaje();
            }, 1000);
        }

        async function confirmarViaje() {
            clearInterval(timerInterval);
            
            const { data, error } = await supabase.from('viajes')
                .update({ estado: 'en_viaje' })
                .eq('id', viajeId)
                .select();

            if (error) {
                alert('Error al confirmar: ' + error.message);
                return;
            }

            if (!data || data.length === 0) {
                alert('No se pudo confirmar. Probá de nuevo.');
                return;
            }

            mostrarPaso('paso4');
            document.getElementById('infoConductor2').textContent = 'Conductor en camino...';
        }

        async function rechazarViaje() {
            clearInterval(timerInterval);
            await supabase.from('viajes').update({ estado: 'pendiente', precio: null }).eq('id', viajeId);
            location.reload();
        }
    </script>
</body>
</html>
