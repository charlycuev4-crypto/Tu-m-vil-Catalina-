<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasajero PRO - Las Catalinas #53</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root{--naranja:#f47920;--celeste:#0093d0;--rojo:#e61e2b;--verde:#28a745;--fondo:#f4f7f6;--blanco:#fff;--texto:#1a1a1a;--sombra:0 4px 15px rgba(0,0,0,0.2)}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body,html{margin:0;padding:0;height:100%;width:100%;font-family:sans-serif;background:var(--fondo);overflow:hidden}
        
        #map{position:absolute;top:0;left:0;height:100%;width:100%;z-index:1}

        /* Contenedores UI */
        .overlay{position:absolute;z-index:1000;pointer-events:none;width:100%;display:flex;flex-direction:column;padding:12px}
        .top-ui{top:0;pointer-events:auto}
        .bottom-ui{bottom:0;pointer-events:auto;background:var(--blanco);border-radius:24px 24px 0 0;padding:20px;box-shadow:0 -5px 20px rgba(0,0,0,0.1)}

        /* Buscador Avanzado */
        .search-box{background:var(--blanco);border-radius:15px;padding:8px;box-shadow:var(--sombra);display:flex;flex-direction:column;gap:5px}
        .input-row{display:flex;align-items:center;padding:10px;background:#f0f2f5;border-radius:10px;gap:10px}
        .input-row input{border:none;background:transparent;width:100%;outline:none;font-size:16px}
        
        .results-list{background:var(--blanco);margin-top:5px;border-radius:12px;max-height:200px;overflow-y:auto;display:none;box-shadow:var(--sombra)}
        .results-list.active{display:block}
        .res-item{padding:12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;font-size:14px}

        /* Botones Flotantes */
        .map-tools{position:absolute;right:15px;bottom:32%;display:flex;flex-direction:column;gap:10px;pointer-events:auto}
        .tool-btn{width:50px;height:50px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--sombra);border:none;color:var(--celeste);font-size:1.2rem}
        .tool-btn.active{background:var(--naranja);color:white}

        /* Info de Viaje */
        .trip-info{display:none;margin-bottom:15px;background:#fff8f3;padding:12px;border-radius:12px;border:1px solid var(--naranja)}
        .trip-info b{color:var(--naranja);font-size:1.2rem}

        .btn-confirmar{width:100%;padding:16px;background:var(--rojo);color:white;border:none;border-radius:15px;font-weight:800;font-size:1.1rem;box-shadow:0 4px 15px rgba(230,30,43,0.3)}
        
        /* Indicador de "Punto Manual" */
        .center-marker{position:absolute;top:50%;left:50%;transform:translate(-50%, -100%);z-index:2;display:none;pointer-events:none}
        .center-marker i{font-size:40px;color:var(--rojo);text-shadow:0 2px 5px rgba(0,0,0,0.3)}
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="center-marker" id="manual-marker">
        <i class="fas fa-map-marker-alt"></i>
    </div>

    <div class="overlay top-ui">
        <div class="search-box">
            <div class="input-row">
                <i class="fas fa-user-circle"></i>
                <input type="text" id="nombre" placeholder="¿Quién viaja?">
            </div>
            <div class="input-row">
                <i class="fas fa-search-location" style="color:var(--rojo)"></i>
                <input type="text" id="destino" placeholder="Buscar destino en Moreno/S. Miguel" oninput="buscarInteligente(this.value)">
            </div>
            <div id="results" class="results-list"></div>
        </div>
    </div>

    <div class="map-tools">
        <button class="tool-btn" id="btn-manual" onclick="toggleModoManual()" title="Elegir en el mapa">
            <i class="fas fa-hand-pointer"></i>
        </button>
        <button class="tool-btn" onclick="centrarGPS()">
            <i class="fas fa-crosshairs"></i>
        </button>
    </div>

    <div class="overlay bottom-ui">
        <div class="trip-info" id="trip-card">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span>Distancia: <span id="dist-val">0</span> km</span>
                <b id="precio-val">$0</b>
            </div>
            <small id="dest-nombre" style="display:block; color:#666; margin-top:5px"></small>
        </div>
        <button class="btn-confirmar" id="btn-pedir" onclick="solicitarViaje()">SOLICITAR AHORA</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const SUPABASE_URL = 'https://efryvjjunfeoxhekvwza.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmcnl2amp1bmZlb3hoZWt2d3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDEyODUsImV4cCI6MjA5MzQ3NzI4NX0.FgvwONdQhv6lr772YqKHDQ2gtqjZ7f_6BO4x-7wbOwM';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, markerGPS, markerDest, polylineRuta;
        let userPos = {lat: -34.5847, lng: -58.7482}; // Trujui default
        let destPos = null;
        let modoManual = false;

        // Inicializar mapa
        map = L.map('map', {zoomControl: false, attributionControl: false}).setView([userPos.lat, userPos.lng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // GPS Real
        navigator.geolocation.watchPosition(p => {
            userPos = {lat: p.coords.latitude, lng: p.coords.longitude};
            if(!markerGPS) {
                markerGPS = L.circleMarker([userPos.lat, userPos.lng], {radius: 8, color: '#fff', weight: 3, fillColor: '#0093d0', fillOpacity: 1}).addTo(map);
            } else {
                markerGPS.setLatLng([userPos.lat, userPos.lng]);
            }
        }, null, {enableHighAccuracy: true});

        function centrarGPS() { map.flyTo([userPos.lat, userPos.lng], 17); }

        // MODO MANUAL: Elegir moviendo el mapa
        function toggleModoManual() {
            modoManual = !modoManual;
            const btn = document.getElementById('btn-manual');
            const pin = document.getElementById('manual-marker');
            
            if(modoManual) {
                btn.classList.add('active');
                pin.style.display = 'block';
                document.getElementById('destino').placeholder = "Mové el mapa hasta el destino...";
                map.on('moveend', actualizarDestinoManual);
            } else {
                btn.classList.remove('active');
                pin.style.display = 'none';
                map.off('moveend', actualizarDestinoManual);
            }
        }

        async function actualizarDestinoManual() {
            if(!modoManual) return;
            const centro = map.getCenter();
            // Reverse Geocoding simple para saber qué calle es
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${centro.lat}&lon=${centro.lng}`);
                const data = await res.json();
                seleccionarUbicacion(data.display_name.split(',')[0], centro.lat, centro.lng);
            } catch(e) {
                seleccionarUbicacion("Punto en el mapa", centro.lat, centro.lng);
            }
        }

        // BUSCADOR INTELIGENTE (Filtro Moreno/San Miguel)
        async function buscarInteligente(q) {
            if(q.length < 3) return;
            const box = document.getElementById('results');
            box.innerHTML = '<div class="res-item">Buscando...</div>';
            box.classList.add('active');

            // Buscamos con sesgo hacia las coordenadas de Trujui
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${q}&viewbox=-58.85,-34.50,-58.60,-34.65&bounded=1&limit=6&addressdetails=1`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                box.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'res-item';
                    div.innerHTML = `<i class="fas fa-map-marker-alt"></i> <div><b>${item.display_name.split(',')[0]}</b><br><small>${item.address.suburb || item.address.city || ''}</small></div>`;
                    div.onclick = () => {
                        seleccionarUbicacion(item.display_name.split(',')[0], item.lat, item.lng);
                        box.classList.remove('active');
                        document.getElementById('destino').value = item.display_name.split(',')[0];
                    };
                    box.appendChild(div);
                });
            } catch(e) {}
        }

        // RUTEADOR POR CALLES (OSRM)
        async function seleccionarUbicacion(nombre, lat, lng) {
            destPos = {lat: parseFloat(lat), lng: parseFloat(lng)};
            
            if(markerDest) map.removeLayer(markerDest);
            markerDest = L.marker([destPos.lat, destPos.lng]).addTo(map);

            // Llamada al motor de ruteo OSRM para no cruzar por encima de las casas
            const routeUrl = `https://router.project-osrm.org/route/v1/driving/${userPos.lng},${userPos.lat};${destPos.lng},${destPos.lat}?overview=full&geometries=geojson`;
            
            try {
                const res = await fetch(routeUrl);
                const data = await res.json();
                const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                const distanciaKm = (data.routes[0].distance / 1000).toFixed(2);
                
                if(polylineRuta) map.removeLayer(polylineRuta);
                polylineRuta = L.polyline(coords, {color: '#f47920', weight: 6, opacity: 0.8}).addTo(map);

                // Mostrar Info y Precio
                document.getElementById('trip-card').style.display = 'block';
                document.getElementById('dist-val').innerText = distanciaKm;
                document.getElementById('dest-nombre').innerText = nombre;
                
                // Cálculo de Tarifa ($3000 base + $800 por km)
                const total = Math.round(3000 + (distanciaKm * 800));
                document.getElementById('precio-val').innerText = `$${total}`;

                map.fitBounds(polylineRuta.getBounds(), {padding: [50, 50]});
            } catch(e) {
                console.error("Error en ruteo:", e);
            }
        }

        async function solicitarViaje() {
            const nombre = document.getElementById('nombre').value;
            if(!nombre || !destPos) { alert("Completá tu nombre y elegí destino"); return; }
            
            const btn = document.getElementById('btn-pedir');
            btn.disabled = true;
            btn.innerText = "ENVIANDO PEDIDO...";

            try {
                const { data: pax } = await supabase.from('pasajeros').insert({nombre}).select().single();
                await supabase.from('viajes').insert({
                    pasajero_id: pax.id,
                    nombre_pasajero: nombre,
                    destino: document.getElementById('dest-nombre').innerText,
                    lat_salida: userPos.lat,
                    lng_salida: userPos.lng,
                    lat_destino: destPos.lat,
                    lng_destino: destPos.lng,
                    tarifa_total: parseInt(document.getElementById('precio-val').innerText.replace('$','')),
                    estado: 'pendiente'
                });
                alert("¡Pedido enviado con éxito! Buscando chofer en Las Catalinas.");
                btn.innerText = "PEDIDO ENVIADO ✅";
            } catch(e) {
                alert("Error de conexión");
                btn.disabled = false;
                btn.innerText = "SOLICITAR AHORA";
            }
        }
    </script>
</body>
</html>
