<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Las Catalinas - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 15px; }
        .header h1 { font-size: 1.4rem; margin-bottom: 5px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
        }

        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #444;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #667eea; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-maps {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.2);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Contenedor del Mapa Embebido */
        .mapa-contenedor {
            width: 100%;
            height: 240px;
            border-radius: 12px;
            border: 2px solid #4285f4;
            overflow: hidden;
            margin: 15px 0;
        }
        .mapa-contenedor iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .precio-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 15px 0;
        }
        .precio-box .monto { font-size: 2.3rem; font-weight: 700; }
        .precio-box .detalle { font-size: 0.85rem; opacity: 0.9; margin-top: 5px; }

        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        .status-box .estado { font-size: 1.1rem; font-weight: 600; color: #667eea; }

        .msg {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .msg.show { display: block; }
        .msg-error { background: #ffebee; color: #c62828; }
        .msg-success { background: #e8f5e9; color: #2e7d32; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚕 TuMovil Las Catalinas</h1>
            <p>Tu móvil, tu viaje, tu camino</p>
        </div>

        <div class="msg" id="msg"></div>

        <div class="card" id="cardDatos">
            <div class="card-title">📝 Datos para el viaje</div>

            <div class="input-group">
                <label>Tu nombre</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
            </div>

            <div class="input-group">
                <label>Teléfono</label>
                <input type="tel" id="telefono" placeholder="Ej: 1133667793">
            </div>

            <div class="input-group">
                <label>Dirección de destino</label>
                <input type="text" id="destino" placeholder="Ej: Cruce Castelar, Moreno">
            </div>

            <button class="btn btn-maps" onclick="procesarRutaYMapa()">
                🗺️ MOSTRAR RUTA EN EL MAPA
            </button>

            <div class="mapa-contenedor hidden" id="contenedorMapa">
                <iframe id="googleMapIframe" src=""></iframe>
            </div>

            <div id="seccionKm" class="hidden" style="border-top: 2px dashed #eee; padding-top: 15px;">
                <div class="input-group">
                    <label style="color:#2e7d32; font-size: 0.9rem;">¿Cuántos kilómetros (km) marcó Google Maps?</label>
                    <input type="number" id="distancia" placeholder="Ej: 5.3" min="0.1" max="99" step="0.1">
                </div>
                <button class="btn btn-primary" onclick="calcularPrecio()">
                    💰 CALCULAR PRECIO VIAJE
                </button>
            </div>
        </div>

        <div class="card hidden" id="cardPrecio">
            <div class="card-title">💰 Confirmación de Tarifa</div>
            <div class="precio-box">
                <div class="monto" id="precioMonto">$0</div>
                <div class="detalle" id="precioDetalle">Base $3.000 + 0km × $800</div>
            </div>

            <button class="btn btn-success" id="btnSolicitar" onclick="solicitarViaje()">
                🚕 SOLICITAR MÓVIL AHORA
            </button>
            <button class="btn" onclick="volverAtras()" style="margin-top:10px; background:#f0f0f0; color:#333;">
                ← MODIFICAR DATOS
            </button>
        </div>

        <div class="card hidden" id="cardEstado">
            <div class="status-box">
                <div class="estado" id="estadoTexto">⏳ Buscando conductor...</div>
                <div class="info" style="font-size:0.85rem; color:#666; margin-top:5px;">Tu viaje fue solicitado a la base.</div>
            </div>
            <button class="btn" onclick="cancelarViaje()" style="background:#ff6b6b; color:white; margin-top:10px;">
                ❌ CANCELAR VIAJE
            </button>
        </div>
    </div>

    <script>
        // CONFIG SUPABASE
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let viajeId = null;
        let subscription = null;
        let precioCalculado = 0;
        let distanciaKm = 0;
        let destinoTexto = '';

        // PROCESAR MAPA E INTENT SIMULTÁNEO
        function procesarRutaYMapa() {
            destinoTexto = document.getElementById('destino').value.trim();

            if (!destinoTexto) {
                mostrarMsg('Escribí una dirección de destino primero', 'error');
                return;
            }

            // 1. Cargamos la vista de confirmación en el mapa de abajo
            const mapaUrl = `http://googleusercontent.com/maps.google.com/6{encodeURIComponent(destinoTexto)}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
            document.getElementById('googleMapIframe').src = mapaUrl;

            // Mostrar elementos ocultos en la pantalla
            document.getElementById('contenedorMapa').classList.remove('hidden');
            document.getElementById('seccionKm').classList.remove('hidden');

            // 2. LA MAGIA: Abrimos la app nativa de Maps para que calcule los KM reales al instante
            const appMapsUrl = `http://googleusercontent.com/maps.google.com/7{encodeURIComponent(destinoTexto)}&travelmode=driving`;
            window.open(appMapsUrl, '_blank');
            
            mostrarMsg('¡Revisá los kilómetros en la app de Google Maps y anotalos acá abajo!', 'success');
        }

        // CALCULAR PRECIO
        function calcularPrecio() {
            const distancia = parseFloat(document.getElementById('distancia').value);

            if (!distancia || distancia <= 0) {
                mostrarMsg('Por favor, ingresá los kilómetros que viste en Maps', 'error');
                return;
            }

            distanciaKm = distancia;
            precioCalculado = Math.round(3000 + (distancia * 800));

            document.getElementById('precioMonto').textContent = '$' + precioCalculado.toLocaleString('es-AR');
            document.getElementById('precioDetalle').textContent = 'Base $3.000 + ' + distancia + 'km × $800';

            document.getElementById('cardDatos').classList.add('hidden');
            document.getElementById('cardPrecio').classList.remove('hidden');
        }

        function volverAtras() {
            document.getElementById('cardPrecio').classList.add('hidden');
            document.getElementById('cardDatos').classList.remove('hidden');
        }

        // SOLICITAR VIAJE
        async function solicitarViaje() {
            const nombre = document.getElementById('nombre').value.trim() || 'Pasajero';
            const telefono = document.getElementById('telefono').value.trim();

            const btn = document.getElementById('btnSolicitar');
            btn.disabled = true;
            btn.textContent = '⏳ Enviando...';

            try {
                const { data, error } = await supabaseClient.rpc('crear_viaje', {
                    p_pasajero_nombre: nombre,
                    p_pasajero_telefono: telefono,
                    p_origen_lat: -34.640, 
                    p_origen_lng: -58.715,
                    p_origen_direccion: 'Ubicación actual',
                    p_destino_lat: -34.640,
                    p_destino_lng: -58.715,
                    p_destino_direccion: destinoTexto,
                    p_distancia_km: distanciaKm
                });

                if (error) throw error;

                viajeId = data;
                document.getElementById('cardPrecio').classList.add('hidden');
                document.getElementById('cardEstado').classList.remove('hidden');
                
                if (subscription) subscription.unsubscribe();
                subscription = supabaseClient
                    .channel('viaje-' + viajeId)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'viajes', filter: 'id=eq.' + viajeId }, 
                        payload => {
                            if(payload.new.estado === 'aceptado') {
                                document.getElementById('estadoTexto').textContent = '✅ ¡Conductor Asignado!';
                            }
                        }
                    ).subscribe();

            } catch (e) {
                mostrarMsg('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = '🚕 SOLICITAR MÓVIL AHORA';
            }
        }

        function mostrarMsg(texto, tipo) {
            const msg = document.getElementById('msg');
            msg.textContent = texto;
            msg.className = 'msg msg-' + tipo + ' show';
            setTimeout(() => msg.classList.remove('show'), 6000);
        }
    </script>
</body>
</html>
