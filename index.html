<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viajes Moreno</title>
    
    <!-- CSS de Leaflet (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --blue: #2563eb; --bg: #f1f5f9; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        
        /* Contenedor del Mapa */
        #map { height: 350px; width: 100%; background: #cbd5e1; }
        
        .main-card { 
            margin: -20px 15px 20px; background: white; padding: 20px; 
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative; z-index: 1000;
        }
        
        h2 { margin: 0 0 20px 0; font-size: 22px; text-align: center; }
        
        .input-box { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--blue); }

        /* Botón Principal */
        #btn-solicitar { 
            width: 100%; padding: 18px; background: var(--blue); color: white; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 18px;
            margin-top: 10px; cursor: pointer;
        }
        #btn-solicitar:disabled { background: #94a3b8; }

        /* Sugerencias */
        .res-busqueda { 
            background: white; border: 1px solid #e2e8f0; border-top: none; 
            max-height: 200px; overflow-y: auto; border-radius: 0 0 12px 12px; 
        }
        .item-sug { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .precio-box { 
            text-align: center; color: #059669; font-size: 20px; 
            font-weight: 800; margin: 15px 0; display: none;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="main-card">
    <h2>Solicitar Viaje</h2>
    
    <div class="input-box">
        <label>Punto de Recogida</label>
        <input type="text" id="origen" value="Detectando tu ubicación..." readonly>
    </div>

    <div class="input-box">
        <label>Destino (Moreno / San Miguel)</label>
        <input type="text" id="destino" placeholder="Ej: Murillo 124 o Cruce Castelar" autocomplete="off">
        <div id="lista-sug" class="res-busqueda"></div>
    </div>

    <div id="precio" class="precio-box"></div>
    
    <button id="btn-solicitar" disabled>PEDIR MÓVIL</button>
</div>

<!-- LIBRERÍAS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // --- 1. CONFIGURACIÓN ---
    const SB_URL = "TU_URL_AQUÍ";
    const SB_KEY = "TU_KEY_AQUÍ";
    
    // Inicialización segura de Supabase
    const { createClient } = window['@supabase/supabase-js'];
    const supabase = createClient(SB_URL, SB_KEY);

    let map, markerO, markerD, ruta;
    let coordsO, coordsD;

    // --- 2. MAPA ---
    function iniciarMapa() {
        // Por defecto en Moreno Centro por si falla el GPS
        map = L.map('map', { zoomControl: false }).setView([-34.648, -58.791], 14);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Pedir GPS
        map.locate({setView: true, maxZoom: 16});

        map.on('locationfound', (e) => {
            coordsO = [e.latlng.lat, e.latlng.lng];
            if(markerO) map.removeLayer(markerO);
            markerO = L.marker(coordsO).addTo(map).bindPopup("Estás aquí").openPopup();
            document.getElementById('origen').value = "Mi ubicación actual ✅";
        });

        map.on('locationerror', () => {
            document.getElementById('origen').value = "GPS no disponible (Escribe origen)";
            document.getElementById('origen').readOnly = false;
        });
    }

    // --- 3. BUSCADOR INTELIGENTE ---
    const inputDestino = document.getElementById('destino');
    const sugerencias = document.getElementById('lista-sug');

    inputDestino.addEventListener('input', async () => {
        const busqueda = inputDestino.value;
        if(busqueda.length < 3) { sugerencias.innerHTML = ""; return; }

        // El truco para Moreno: añadimos el contexto a la búsqueda
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${busqueda}, Moreno, Buenos Aires&limit=4`;
        
        try {
            const r = await fetch(url);
            const datos = await r.json();
            sugerencias.innerHTML = datos.map(i => `
                <div class="item-sug" onclick="elegirDestino(${i.lat}, ${i.lon}, '${i.display_name}')">
                    ${i.display_name}
                </div>
            `).join('');
        } catch(e) { console.log("Error busqueda"); }
    });

    function elegirDestino(lat, lon, nombre) {
        coordsD = [lat, lon];
        inputDestino.value = nombre;
        sugerencias.innerHTML = "";
        
        if(markerD) map.removeLayer(markerD);
        markerD = L.marker(coordsD, {
            icon: L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                iconSize: [25, 41], iconAnchor: [12, 41]
            })
        }).addTo(map);

        calcularRuta();
    }

    // --- 4. RUTA POR CALLES (NO LÍNEA RECTA) ---
    async function calcularRuta() {
        if(!coordsO || !coordsD) return;

        const url = `https://router.project-osrm.org/route/v1/driving/${coordsO[1]},${coordsO[0]};${coordsD[1]},${coordsD[0]}?overview=full&geometries=geojson`;
        
        const res = await fetch(url);
        const data = await res.json();

        if(data.routes.length > 0) {
            const camino = data.routes[0];
            if(ruta) map.removeLayer(ruta);
            
            ruta = L.geoJSON(camino.geometry, {style: {color: '#2563eb', weight: 7}}).addTo(map);
            map.fitBounds(ruta.getBounds(), {padding: [50, 50]});

            // Tarifa: $600 Base + $400 por KM
            const dist = camino.distance / 1000;
            const total = 600 + (dist * 400);
            
            const pBox = document.getElementById('precio');
            pBox.innerText = `VALOR: $${Math.round(total)}`;
            pBox.style.display = "block";
            document.getElementById('btn-solicitar').disabled = false;
        }
    }

    // Ejecutar al cargar
    window.onload = iniciarMapa;
</script>
</body>
</html>
