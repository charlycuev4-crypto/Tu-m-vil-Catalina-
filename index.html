<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viajes Moreno</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #2563eb; }
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f1f5f9; }
        
        /* Ajuste para que el mapa siempre se vea */
        #map { height: 300px; width: 100%; background: #e0e7ff; position: relative; }
        
        .container { padding: 15px; }
        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-top: -30px; position: relative; z-index: 1000;
        }
        
        .input-group { margin-bottom: 15px; }
        label { font-size: 14px; font-weight: bold; color: #475569; display: block; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 10px; font-size: 16px; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); }

        button { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: white; border: none; border-radius: 10px; 
            font-weight: bold; font-size: 16px; transition: 0.3s;
        }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        .price-info { 
            text-align: center; margin: 10px 0; font-weight: bold; 
            color: #16a34a; display: none; font-size: 18px;
        }

        .suggestions {
            background: white; border: 1px solid #ddd; max-height: 200px; 
            overflow-y: auto; border-radius: 0 0 10px 10px;
        }
        .sug-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">
    <div class="card">
        <h2 style="margin:0 0 15px 0; font-size: 20px;">¿A dónde vamos?</h2>
        
        <div class="input-group">
            <label>Recogida</label>
            <input type="text" id="origen" placeholder="Buscando tu ubicación..." readonly>
        </div>

        <div class="input-group">
            <label>Destino (Moreno / San Miguel)</label>
            <input type="text" id="destino" placeholder="Ej: Murillo y España" autocomplete="off">
            <div id="lista-sug" class="suggestions"></div>
        </div>

        <div id="precio" class="price-info"></div>
        
        <button id="btn-solicitar" disabled>Solicitar Viaje</button>
    </div>
</div>

<!-- Scripts al final para asegurar carga -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. CONFIGURACIÓN (Pon tus llaves aquí)
    const SB_URL = "TU_URL";
    const SB_KEY = "TU_KEY";
    const supabase = libsupabase.createClient(SB_URL, SB_KEY);

    let map, markerO, markerD, routeL;
    let coordsO = null, coordsD = null;

    // 2. INICIALIZAR MAPA CON FALLBACK
    function init() {
        // Centro Moreno por defecto si el GPS falla al inicio
        map = L.map('map').setView([-34.648, -58.791], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Forzar detección de ubicación
        map.locate({setView: true, maxZoom: 16});

        map.on('locationfound', (e) => {
            coordsO = [e.latlng.lat, e.latlng.lng];
            if(markerO) map.removeLayer(markerO);
            markerO = L.marker(coordsO).addTo(map).bindPopup("Estás aquí").openPopup();
            document.getElementById('origen').value = "Mi ubicación detectada ✅";
        });

        map.on('locationerror', () => {
            alert("Por favor, activa el GPS y recarga la página.");
            document.getElementById('origen').value = "GPS no detectado";
        });
    }

    // 3. BUSCADOR CON FILTRO LOCAL (Murillo, La Pinta, etc.)
    const inputD = document.getElementById('destino');
    const lista = document.getElementById('lista-sug');

    inputD.addEventListener('input', async () => {
        const val = inputD.value;
        if(val.length < 3) { lista.innerHTML = ""; return; }

        // Buscamos forzando la zona Moreno/San Miguel
        const query = `${val}, Moreno, Buenos Aires, Argentina`;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
        const data = await res.json();

        lista.innerHTML = data.map(i => `
            <div class="sug-item" onclick="setDestino(${i.lat}, ${i.lon}, '${i.display_name}')">
                ${i.display_name}
            </div>
        `).join('');
    });

    async function setDestino(lat, lon, nombre) {
        coordsD = [lat, lon];
        inputD.value = nombre;
        lista.innerHTML = "";
        
        if(markerD) map.removeLayer(markerD);
        markerD = L.marker(coordsD, {icon: L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41]
        })}).addTo(map);

        trazar();
    }

    // 4. TRAZADO REAL (OSRM - NO LÍNEA RECTA)
    async function trazar() {
        if(!coordsO || !coordsD) return;

        const url = `https://router.project-osrm.org/route/v1/driving/${coordsO[1]},${coordsO[0]};${coordsD[1]},${coordsD[0]}?overview=full&geometries=geojson`;
        
        const res = await fetch(url);
        const data = await res.json();

        if(data.routes.length > 0) {
            const r = data.routes[0];
            if(routeL) map.removeLayer(routeL);
            
            routeL = L.geoJSON(r.geometry, {style: {color: '#2563eb', weight: 6}}).addTo(map);
            map.fitBounds(routeL.getBounds());

            // Precio base $600 + $350 por KM
            const kms = r.distance / 1000;
            const final = 600 + (kms * 350);
            
            const p = document.getElementById('precio');
            p.innerText = `Total: $${Math.round(final)}`;
            p.style.display = "block";
            document.getElementById('btn-solicitar').disabled = false;
        }
    }

    window.onload = init;
</script>
</body>
</html>
