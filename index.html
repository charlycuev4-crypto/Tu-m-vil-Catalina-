<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Las Catalinas - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; opacity: 0.9; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #667eea; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .precio-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 15px 0;
        }
        .precio-box .monto { font-size: 2.5rem; font-weight: 700; }
        .precio-box .detalle { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }

        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        .status-box .estado { font-size: 1.2rem; font-weight: 600; color: #667eea; }

        .msg {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }
        .msg.show { display: block; }
        .msg-error { background: #ffebee; color: #c62828; }
        .msg-success { background: #e8f5e9; color: #2e7d32; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚕 TuMovil Las Catalinas</h1>
            <p>Tu móvil, tu viaje, tu camino</p>
        </div>

        <div class="msg" id="msg"></div>

        <div class="card" id="cardDatos">
            <div class="card-title">📝 Datos del viaje</div>

            <div class="input-group">
                <label>Tu nombre</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
            </div>

            <div class="input-group">
                <label>Teléfono</label>
                <input type="tel" id="telefono" placeholder="Ej: 1133667793">
            </div>

            <div class="input-group">
                <label>Dirección de destino (Localidad y Calle)</label>
                <input type="text" id="destino" placeholder="Ej: San Miguel, Mitre 1234">
            </div>

            <button class="btn btn-primary" id="btnCotizar" onclick="cotizarViajeAutomatico()">
                💰 COTIZAR VIAJE AL INSTANTE
            </button>
        </div>

        <div class="card hidden" id="cardPrecio">
            <div class="card-title">💸 Tu Tarifa Estimada</div>
            
            <div class="precio-box">
                <div class="monto" id="precioMonto">$0</div>
                <div class="detalle" id="precioDetalle">Calculando...</div>
            </div>

            <button class="btn btn-success" id="btnSolicitar" onclick="solicitarViaje()">
                🚕 SOLICITAR MÓVIL AHORA
            </button>
            <button class="btn" onclick="volverAtras()" style="margin-top:10px; background:#f0f0f0; color:#333;">
                ← MODIFICAR DESTINO
            </button>
        </div>

        <div class="card hidden" id="cardEstado">
            <div class="status-box">
                <div class="estado" id="estadoTexto">⏳ Buscando conductor...</div>
                <div style="font-size: 0.85rem; color:#666; margin-top:5px;">Tu solicitud llegó a la base central.</div>
            </div>
            <button class="btn" onclick="cancelarViaje()" style="background:#ff6b6b; color:white; margin-top:10px;">
                ❌ CANCELAR VIAJE
            </button>
        </div>
    </div>

    <script>
        // CONFIG SUPABASE
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Coordenadas fijas estimadas de tu base central o zona operativa (Moreno / Cruce Castelar)
        const BASE_LAT = -34.6404;
        const BASE_LNG = -58.7145;

        let viajeId = null;
        let subscription = null;
        let precioCalculado = 0;
        let distanciaKm = 0;
        let destinoTexto = '';

        // COTIZACIÓN INTELIGENTE Y AUTOMÁTICA EN SEGUNDO PLANO
        async function cotizarViajeAutomatico() {
            destinoTexto = document.getElementById('destino').value.trim();
            const btn = document.getElementById('btnCotizar');

            if (!destinoTexto) {
                mostrarMsg('Por favor, ingresá una dirección de destino', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Calculando ruta óptima...';

            try {
                // 1. Buscamos las coordenadas del destino usando el buscador gratuito de OpenStreetMap (Nominatim)
                // Le agregamos ", Buenos Aires, Argentina" al final de forma automática para asegurar la zona correcta
                const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(destinoTexto + ', Buenos Aires, Argentina')}&limit=1`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();

                if (!geoData || geoData.length === 0) {
                    throw new Error('No pudimos localizar esa dirección exacta. Probá agregando la localidad (ej: Moreno o San Miguel).');
                }

                const destLat = parseFloat(geoData[0].lat);
                const destLng = parseFloat(geoData[0].lon);

                // 2. Usamos el motor OSRM para calcular la distancia manejando real por calles entre la base y el destino
                const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${BASE_LNG},${BASE_LAT};${destLng},${destLat}?overview=false`;
                const osrmRes = await fetch(osrmUrl);
                const osrmData = await osrmRes.json();

                if (!osrmData.routes || osrmData.routes.length === 0) {
                    throw new Error('No se pudo trazar una ruta en auto hasta ese lugar.');
                }

                // OSRM devuelve la distancia en metros, la pasamos a Kilómetros
                const metros = osrmData.routes[0].distance;
                distanciaKm = parseFloat((metros / 1000).toFixed(1));

                // 3. Calculamos la tarifa de forma automática
                precioCalculado = Math.round(3000 + (distanciaKm * 800));

                // Dibujamos los datos en la pantalla de precio
                document.getElementById('precioMonto').textContent = '$' + precioCalculado.toLocaleString('es-AR');
                document.getElementById('precioDetalle').textContent = `Viaje de ${distanciaKm} km (Base $3.000 + $800 x km)`;

                // Hacemos el cambio de pantalla automático
                document.getElementById('cardDatos').classList.add('hidden');
                document.getElementById('cardPrecio').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                mostrarMsg(error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '💰 COTIZAR VIAJE AL INSTANTE';
            }
        }

        function volverAtras() {
            document.getElementById('cardPrecio').classList.add('hidden');
            document.getElementById('cardDatos').classList.remove('hidden');
        }

        // ENVIAR SOLICITUD A SUPABASE
        async function solicitarViaje() {
            const nombre = document.getElementById('nombre').value.trim() || 'Pasajero';
            const telefono = document.getElementById('telefono').value.trim();
            const btn = document.getElementById('btnSolicitar');

            btn.disabled = true;
            btn.textContent = '⏳ Despachando móvil...';

            try {
                const { data, error } = await supabaseClient.rpc('crear_viaje', {
                    p_pasajero_nombre: nombre,
                    p_pasajero_telefono: telefono,
                    p_origen_lat: BASE_LAT, 
                    p_origen_lng: BASE_LNG,
                    p_origen_direccion: 'Ubicación de Origen',
                    p_destino_lat: BASE_LAT, // valores estimados de respaldo
                    p_destino_lng: BASE_LNG,
                    p_destino_direccion: destinoTexto,
                    p_distancia_km: distanciaKm
                });

                if (error) throw error;

                viajeId = data;
                document.getElementById('cardPrecio').classList.add('hidden');
                document.getElementById('cardEstado').classList.remove('hidden');
                mostrarMsg('¡Viaje solicitado! Esperando asignación.', 'success');

                // Suscripción Realtime normal
                if (subscription) subscription.unsubscribe();
                subscription = supabaseClient
                    .channel('viaje-' + viajeId)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'viajes', filter: 'id=eq.' + viajeId }, 
                        payload => {
                            if(payload.new.estado === 'aceptado') {
                                document.getElementById('estadoTexto').textContent = '✅ ¡Conductor Asignado!';
                            }
                        }
                    ).subscribe();

            } catch (e) {
                mostrarMsg('Error al guardar: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = '🚕 SOLICITAR MÓVIL AHORA';
            }
        }

        function mostrarMsg(texto, tipo) {
            const msg = document.getElementById('msg');
            msg.textContent = texto;
            msg.className = 'msg msg-' + tipo + ' show';
            setTimeout(() => msg.classList.remove('show'), 6000);
        }
    </script>
</body>
</html>
