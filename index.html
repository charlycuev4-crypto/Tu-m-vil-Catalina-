<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Las Catalinas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f4f4f6; height: 100vh; overflow: hidden; }
        #mapaContainer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
        #mapaLeaflet { width: 100%; height: 100%; }
        .header-float { position: fixed; top: 16px; left: 16px; right: 16px; z-index: 1000; display: flex; justify-content: space-between; }
        .gps-btn { width: 44px; height: 44px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border: none; box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .bottom-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: white; border-radius: 24px 24px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.15); padding: 20px; min-height: 35vh; }
        .selector-tipo { display: flex; gap: 12px; margin-bottom: 12px; }
        .tipo-btn { flex: 1; border: 2px solid #e2e8f0; border-radius: 14px; padding: 12px; display: flex; flex-direction: column; align-items: center; background: white; cursor: pointer; font-weight: bold; color: #475569; }
        .tipo-btn.selected { border-color: #3b82f6; background: #eff6ff; color: #1e3a8a; }
        .tipo-btn span { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
        .price-box { background: #eef2ff; color: #3b5bdb; padding: 12px; border-radius: 14px; text-align: center; font-weight: 700; margin-bottom: 12px; font-size: 1.1rem; }
        .input-group { background: #f5f5f7; border-radius: 16px; padding: 12px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
        .btn-action { width: 100%; background: #2cd44a; color: white; border: none; padding: 15px; border-radius: 50px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .hidden { display: none !important; }
        .pasajero-ping { background: #007aff; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; }
        .destino-ping { background: #ff4757; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="header-float">
        <div style="font-weight: bold; background: white; padding: 10px 16px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);">TuMóvil Catalina</div>
        <button class="gps-btn" onclick="obtenerGPS()">🎯</button>
    </div>

    <div id="mapaContainer"><div id="mapaLeaflet"></div></div>

    <div class="bottom-panel">
        <div id="pasoPedido">
            <div class="selector-tipo">
                <div class="tipo-btn selected" id="btnAuto" onclick="cambiarTipo('auto')">🚗 Auto <span id="lblAuto">Base $3000</span></div>
                <div class="tipo-btn" id="btnMoto" onclick="cambiarTipo('moto')">🏍️ Moto <span id="lblMoto">Base $1500</span></div>
            </div>

            <div class="price-box" id="boxPrecio">Tarifa Estimada: $0.00</div>

            <div class="input-group">
                <input type="text" id="txtNombre" placeholder="Tu Nombre" value="Pasajero Anonimo">
                <input type="tel" id="txtTelefono" placeholder="Tu Teléfono" value="1122334455">
            </div>
            <button class="btn-action" onclick="solicitarViaje()">Confirmar Solicitud</button>
        </div>

        <div id="pasoProgreso" class="hidden" style="text-align: center; padding: 20px 0;">
            <h3 id="lblEstadoViaje" style="color: #1e3a8a; margin-bottom: 10px;">Buscando conductor cercano...</h3>
            <p id="lblDatosChofer" style="color: #475569; font-size: 0.9rem;"></p>
            <button class="btn-action" style="background: #ef4444; margin-top: 15px;" onclick="cancelarViaje()">Cancelar Solicitud</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3yncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mapa, markerOrigen, markerDestino, rutaLink;
        let origenCoords = { lat: -34.54291, lng: -58.71212 }; // Centro San Miguel
        let destinoCoords = { lat: -34.55000, lng: -58.72000 };
        let tipoVehiculo = 'auto', precioFinal = 0, distanciaKm = 0, viajeId = null;

        function init() {
            mapa = L.map('mapaLeaflet', { zoomControl: false, attributionControl: false }).setView([origenCoords.lat, origenCoords.lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            
            markerOrigen = L.marker([origenCoords.lat, origenCoords.lng], { icon: L.divIcon({ className: 'pasajero-ping' }) }).addTo(mapa);
            markerDestino = L.marker([destinoCoords.lat, destinoCoords.lng], { icon: L.divIcon({ className: 'destino-ping' }) }).addTo(mapa);

            mapa.on('click', (e) => {
                destinoCoords = { lat: e.latlng.lat, lng: e.latlng.lng };
                markerDestino.setLatLng([destinoCoords.lat, destinoCoords.lng]);
                calcularDistanciaYPrecio();
            });

            document.getElementById('lblAuto').textContent = `Base $${localStorage.getItem('cfg_auto_base') || 3000}`;
            document.getElementById('lblMoto').textContent = `Base $${localStorage.getItem('cfg_moto_base') || 1500}`;

            calcularDistanciaYPrecio();
        }

        function cambiarTipo(tipo) {
            tipoVehiculo = tipo;
            document.getElementById('btnAuto').classList.toggle('selected', tipo === 'auto');
            document.getElementById('btnMoto').classList.toggle('selected', tipo === 'moto');
            calcularDistanciaYPrecio();
        }

        async function calcularDistanciaYPrecio() {
            try {
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${origenCoords.lng},${origenCoords.lat};${destinoCoords.lng},${destinoCoords.lat}?overview=full&geometries=geojson`);
                const data = await res.json();
                if (data.code === 'Ok' && data.routes.length > 0) {
                    if (rutaLink) mapa.removeLayer(rutaLink);
                    rutaLink = L.polyline(data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]), { color: '#3b82f6', weight: 5 }).addTo(mapa);
                    distanciaKm = parseFloat((data.routes[0].distance / 1000).toFixed(1));
                    
                    let base = 3000, kmVal = 600;
                    if (tipoVehiculo === 'auto') {
                        base = Number(localStorage.getItem('cfg_auto_base')) || 3000;
                        kmVal = Number(localStorage.getItem('cfg_auto_km')) || 600;
                    } else {
                        base = Number(localStorage.getItem('cfg_moto_base')) || 1500;
                        kmVal = Number(localStorage.getItem('cfg_moto_km')) || 350;
                    }
                    precioFinal = Math.round(base + (distanciaKm * kmVal));
                    document.getElementById('boxPrecio').textContent = `Tarifa Estimada: $${precioFinal} (${distanciaKm} km)`;
                }
            } catch(e) {}
        }

        function obtenerGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    origenCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    markerOrigen.setLatLng([origenCoords.lat, origenCoords.lng]);
                    mapa.setView([origenCoords.lat, origenCoords.lng], 14);
                    calcularDistanciaYPrecio();
                }, () => {}, { enableHighAccuracy: true });
            }
        }

        async function solicitarViaje() {
            // Nota: Conservamos únicamente tus columnas operativas nativas
            const { data, error } = await supabaseClient.from('viajes').insert({
                estado: 'pendiente',
                precio: precioFinal,
                distancia_km: distanciaKm,
                destino_lat: destinoCoords.lat,
                destino_lng: destinoCoords.lng
            }).select().single();

            if (error) {
                alert("Error al solicitar viaje.");
            } else {
                viajeId = data.id;
                document.getElementById('pasoPedido').classList.add('hidden');
                document.getElementById('pasoProgreso').classList.remove('hidden');
                escucharEstadoViaje();
            }
        }

        function escucharEstadoViaje() {
            supabaseClient.channel('cambios-pasajero').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'viajes', filter: `id=eq.${viajeId}` }, (p) => {
                const v = p.new;
                if(v.conductor_nombre) {
                    document.getElementById('lblEstadoViaje').textContent = `Móvil asignado. Estado: ${v.estado}`;
                    document.getElementById('lblDatosChofer').textContent = `${v.conductor_nombre} - ${v.conductor_auto}`;
                }
                if(v.estado === 'finalizado') {
                    alert("¡Viaje finalizado con éxito!");
                    location.reload();
                }
            }).subscribe();
        }

        function cancelarViaje() { location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
