        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body,html{margin:0;padding:0;height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--fondo);color:var(--texto);overflow:hidden}
        #map{position:absolute;top:0;left:0;height:72%;width:100%;z-index:1;background:#e5e5e5}
        .header{position:absolute;top:12px;left:12px;right:12px;z-index:1000;display:flex;justify-content:space-between;align-items:center;pointer-events:none}
        .menu-btn{background:var(--blanco);color:var(--naranja);width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer;border:none;box-shadow:var(--sombra);font-size:1.2rem}
        .logo-tag{background:var(--blanco);padding:10px 18px;border-radius:25px;border:2px solid var(--celeste);font-weight:800;color:var(--celeste);font-size:.85rem;box-shadow:var(--sombra);pointer-events:auto}
        .gps-status{position:absolute;top:70px;right:12px;z-index:1000;background:var(--blanco);padding:6px 12px;border-radius:20px;font-size:.75rem;font-weight:600;box-shadow:var(--sombra);display:flex;align-items:center;gap:6px}
        .gps-status.preciso{color:var(--verde);border:2px solid var(--verde)}
        .gps-status.aproximado{color:var(--naranja);border:2px solid var(--naranja)}
        .gps-status.error{color:var(--rojo);border:2px solid var(--rojo)}
        .btn-mi-ubicacion{position:absolute;bottom:30%;right:15px;z-index:1000;width:50px;height:50px;background:var(--blanco);border:none;border-radius:50%;box-shadow:var(--sombra);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--celeste);font-size:1.3rem}
        .panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:var(--blanco);border-radius:24px 24px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.15);padding:15px 20px 25px;max-height:35vh;overflow-y:auto}
        .panel-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 12px}
        .input-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--fondo);border-radius:14px;border:2px solid transparent;transition:all .2s;margin-bottom:8px}

        .input-row i{width:24px;text-align:center;font-size:1.1rem;color:var(--celeste)}
        .input-row input{flex:1;border:none;background:transparent;font-size:1rem;outline:none;color:var(--texto)}
        .buscador-container{position:relative}
        .sugerencias{position:absolute;top:100%;left:0;right:0;background:var(--blanco);border-radius:14px;box-shadow:0 8px 25px rgba(0,0,0,0.15);max-height:250px;overflow-y:auto;z-index:1500;display:none;margin-top:5px}
        .sugerencias.activo{display:block}
        .sugerencia-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px}
        .sugerencia-item:last-child{border-bottom:none}
        .sugerencia-item:hover{background:var(--fondo)}

        .sugerencia-item .sug-zona{font-size:.75rem;color:var(--gris);margin-top:2px}
        .sugerencia-item .sug-badge{font-size:.65rem;color:#fff;background:var(--verde);padding:1px 6px;border-radius:8px;margin-top:3px;display:inline-block}

        .sugerencia-item .sug-badge.escuela{background:#6f42c1}
        .sugerencia-item .sug-badge.plaza{background:#20c997}
        .sugerencia-item .sug-badge.tren{background:#0d6efd}
        .sugerencia-item .sug-badge.cruce{background:#fd7e14}

        .alerta-box i{color:#ffc107;font-size:1.1rem}
        .sin-gps-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;background:white;padding:20px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3);text-align:center;display:none;width:90%;max-width:300px}
        .sin-gps-box.activo{display:block}

        .sin-gps-box p{margin:0 0 15px;font-size:.9rem;color:var(--gris)}
        .sin-gps-box button{background:var(--celeste);color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:600}
    </style>
</head>

        // INICIALIZACIÓN

        document.addEventListener('DOMContentLoaded', async () => {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            map = L.map('map',{zoomControl:false,attributionControl:false}).setView([-34.650,-58.790],14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
            iniciarGPS();
        });

        function iniciarGPS(){
            if(!navigator.geolocation){
                mostrarSinGPS();
                return;
            }

            // Intento 1: Alta precisión
            navigator.geolocation.getCurrentPosition(
                pos => { gpsActivo = true; actualizarGPSPos(pos, true); },
                err => {
                    // Intento 2: Estándar
                    navigator.geolocation.getCurrentPosition(
                        pos => { gpsActivo = true; actualizarGPSPos(pos, true); },
                        err2 => {
                            // Intento 3: Última conocida
                            navigator.geolocation.getCurrentPosition(
                                pos => { gpsActivo = true; actualizarGPSPos(pos, true); },
                                err3 => {
                                    actualizarGPS('error','GPS bloqueado');
                                    mostrarSinGPS();
                                },
                                {enableHighAccuracy:false, timeout:5000, maximumAge:600000}
                            );
                        },
                        {enableHighAccuracy:false, timeout:10000, maximumAge:300000}
                    );
                },
                {enableHighAccuracy:true, timeout:20000, maximumAge:0}
            );

            if(watchIdGPS) navigator.geolocation.clearWatch(watchIdGPS);
            watchIdGPS = navigator.geolocation.watchPosition(
                pos => { gpsActivo = true; actualizarGPSPos(pos, false); },
                err => {},
                {enableHighAccuracy:true, maximumAge:10000, timeout:30000}
            );
        }

        function actualizarGPSPos(position, primera){
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = Math.round(position.coords.accuracy);

            // Validar coordenadas razonables (Argentina)
            if(lat > -30 || lat < -55 || lng < -75 || lng > -50){
                console.log('GPS inválido:', lat, lng);
                return;
            }

            miPosicion = {lat, lng};

            if(markerGPS) map.removeLayer(markerGPS);
            if(circuloGPS) map.removeLayer(circuloGPS);

            markerGPS = L.circleMarker([lat, lng], {
                radius: 10, fillColor: '#0093d0', color: '#fff', weight: 3, fillOpacity: 0.9
            }).addTo(map);

            circuloGPS = L.circle([lat, lng], {
                radius: accuracy, color: '#0093d0', weight: 1, fillColor: '#0093d0', fillOpacity: 0.1
            }).addTo(map);

            if(primera || !destinoCoords){
                map.setView([lat, lng], 16);
            }

            const clase = accuracy < 30 ? 'preciso' : (accuracy < 200 ? 'aproximado' : 'busqueda');
            const texto = accuracy < 30 ? `GPS Preciso (${accuracy}m)` : (accuracy < 200 ? `GPS Aproximado (${accuracy}m)` : `GPS ±${accuracy}m`);
            actualizarGPS(clase, texto);

            if(destinoCoords) actualizarRuta();
        }

        function actualizarGPS(clase, texto){
            document.getElementById('gps-status').className = 'gps-status ' + clase;

        // BUSCADOR INTELIGENTE
        // ═══════════════════════════════════════════════════════════════════════
        async function buscar(query){
            const div = document.getElementById('sugerencias');
            if(!query || query.length < 2){div.innerHTML='';div.classList.remove('activo');return;}

            if(timeoutBusq) clearTimeout(timeoutBusq);
            const miId = ++idBusq;

            timeoutBusq = setTimeout(async() => {
                if(idBusq !== miId) return;

                div.innerHTML = '<div class="sugerencia-item" style="cursor:default"><i class="fas fa-spinner fa-spin"></i><div><div class="sug-text">Buscando...</div></div></div>';
                div.classList.add('activo');

                let resultados = [];
                const q = query.toLowerCase().trim();
                const qNumMatch = q.match(/(\d+)/);
                const qNum = qNumMatch ? parseInt(qNumMatch[1]) : null;
                let qCalle = q.replace(/\d+/g,'').replace(/\s+/g,' ').trim();
                qCalle = qCalle.replace(/^av\./i,'avenida').replace(/^av /i,'avenida ').replace(/^est\./i,'estacion').replace(/^est /i,'estacion ');

                // 1. BÚSQUEDA POR TIPO DE LUGAR (hospital, escuela, plaza, tren, cruce)
                const tiposBusqueda = [
                    {palabras:['hospital','sanatorio','clinica','clínica','maternidad','centro medico','centro médico'], tipo:'hospital', data:HOSPITALES},
                    {palabras:['escuela','colegio','instituto','liceo','primaria','secundaria','tecnica','técnica','normal'], tipo:'escuela', data:ESCUELAS},
                    {palabras:['plaza','parque','plazoleta','paseo'], tipo:'plaza', data:PLAZAS},
                    {palabras:['tren','estacion','estación','ferrocarril','ffcc','fc'], tipo:'tren', data:ESTACIONES_TREN},
                    {palabras:['cruce','esquina','interseccion','intersección','cruce castelar','cruce derqui'], tipo:'cruce', data:CRUCES_IMPORTANTES}
                ];

                for(let tb of tiposBusqueda){
                    for(let palabra of tb.palabras){
                        if(q.includes(palabra)){
                            tb.data.forEach(item => {
                                const nombreLower = item.nombre.toLowerCase();
                                const dirLower = item.direccion ? item.direccion.toLowerCase() : '';
                                const locLower = item.localidad ? item.localidad.toLowerCase() : '';
                                
                                // Si coincide con la búsqueda o es búsqueda general del tipo
                                if(nombreLower.includes(q.replace(palabra,'').trim()) || 
                                   dirLower.includes(q) || 
                                   locLower.includes(q) ||
                                   q.trim() === palabra){
                                    resultados.push({
                                        texto: `${item.nombre}${item.direccion ? ' - ' + item.direccion : ''}, ${item.localidad}`,
                                        lat: item.lat, lng: item.lng,
                                        exacta: true, fuente: 'local', tipo: tb.tipo,
                                        prioridad: 0
                                    });
                                }
                            });
                        }
                    }
                }

                // 2. BÚSQUEDA DE DIRECCIONES EXACTAS CON ALTURA
                if(qNum){
                    DIRECCIONES_REALES.forEach(dir => {
                        const calleLower = dir.calle.toLowerCase();
                        const calleSinAv = calleLower.replace('avenida ','');
                        const qSinAv = qCalle.replace('avenida ','');
                        
                        if(calleLower.includes(qCalle) || qCalle.includes(calleSinAv) || 
                           calleSinAv.includes(qSinAv) || qSinAv.includes(calleSinAv)){
                            const diff = Math.abs(dir.altura - qNum);
                            if(diff <= 400){
                                resultados.push({
                                    texto: `${dir.calle} ${dir.altura}, ${dir.localidad}, Buenos Aires`,
                                    lat: dir.lat, lng: dir.lng,
                                    exacta: true, fuente: 'local', tipo: 'exacta', prioridad: diff
                                });
                            }
                        }
                    });
                    resultados.sort((a,b) => (a.prioridad || 999) - (b.prioridad || 999));
                }

                // 3. BÚSQUEDA DE CRUCES DE CALLES (esquinas)

                const patronCruce = q.match(/(.+?)\s+(y|e|and)\s+(.+)/i);

                    const calle1 = patronCruce[1].trim().toLowerCase().replace(/^av\./i,'avenida').replace(/^av /i,'avenida ');
                    const calle2 = patronCruce[3].trim().toLowerCase().replace(/^av\./i,'avenida').replace(/^av /i,'avenida ');
                    
                    CRUCES_CALLES.forEach(c => {
                        const nombreLower = c.calle.toLowerCase();
                        const nombreSinAv = nombreLower.replace('avenida ','');
                        
                        if(nombreLower.includes(calle1) || nombreSinAv.includes(calle1) || calle1.includes(nombreSinAv)){
                            c.cruces.forEach(cruce => {
                                const cruceLower = cruce.toLowerCase();
                                const cruceSinAv = cruceLower.replace('avenida ','');
                                
                                if(cruceLower.includes(calle2) || cruceSinAv.includes(calle2) || calle2.includes(cruceSinAv)){
                                    // Calcular coordenadas promedio aproximadas
                                    const dir1 = DIRECCIONES_REALES.find(d => d.calle.toLowerCase() === c.calle.toLowerCase());
                                    const dir2 = DIRECCIONES_REALES.find(d => d.calle.toLowerCase() === cruce.toLowerCase());
                                    let lat = null, lng = null;
                                    if(dir1 && dir2){
                                        lat = (dir1.lat + dir2.lat) / 2;
                                        lng = (dir1.lng + dir2.lng) / 2;
                                    }
                                    
                                    resultados.unshift({
                                        texto: `${c.calle} y ${cruce}, ${c.localidad}, Buenos Aires`,
                                        lat: lat, lng: lng,
                                        exacta: false, fuente: 'local', tipo: 'cruce',
                                        prioridad: -10 // Alta prioridad

                                }
                            });
                        }

                    const dirLower = cruce.direccion.toLowerCase();
                    if(nombreLower.includes(q) || dirLower.includes(q) || q.includes(nombreLower.replace('cruce ',''))){
                        resultados.unshift({

                            lat: cruce.lat, lng: cruce.lng,

                        });

                            const alturaMedia = alturas.length > 0 ? alturas[Math.floor(alturas.length/2)] : 500;

                                texto: `${dir.calle} ${alturaMedia}, ${dir.localidad}, Buenos Aires`,
                                lat: dir.lat, lng: dir.lng,
                                exacta: false, fuente: 'local', tipo: 'calle', prioridad: 100
                            });
                        }

                // 7. Nominatim (solo si faltan con coordenadas)
                const conCoords = resultados.filter(r => r.lat !== null);
                if(conCoords.length < 5){
                    try{
                        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ', Moreno, Buenos Aires, Argentina')}&limit=5&countrycodes=ar&addressdetails=1&viewbox=-58.95,-34.50,-58.65,-34.72&bounded=1`;
                        const res = await fetch(url, {headers:{'Accept-Language':'es-AR','User-Agent':'LasCatalinas53/7.0'}});
                        const data = await res.json();

                        data.forEach(l => {

                            if(texto && texto !== 'null'){

                                const dup = resultados.some(r => r.texto.toLowerCase() === textoCompleto.toLowerCase());
                                if(!dup){
                                    resultados.push({
                                        texto: textoCompleto, lat, lng,
                                        exacta: !!addr.house_number, fuente: 'nom', tipo: 'direccion'

                                <div class="sug-zona">Solo trabajamos en Moreno y San Miguel</div>
