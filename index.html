<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<style>
    :root {
        --naranja: #f47920;
        --celeste: #0093d0;
        --rojo: #e61e2b;
        --verde: #28a745;
        --fondo: #f0f2f5;
        --blanco: #ffffff;
        --texto: #1a1a1a;
        --gris: #666666;
        --sombra: 0 2px 12px rgba(0,0,0,0.15);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--fondo); color: var(--texto); overflow: hidden;
    }

    #map { 
        position: absolute; top: 0; left: 0; 
        height: 72%; width: 100%; z-index: 1;
        background: #e5e5e5;
    }

    /* MENU LATERAL */
    .menu-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5); z-index: 2000;
        display: none; opacity: 0; transition: opacity 0.3s;
    }
    .menu-overlay.activo { display: block; opacity: 1; }

    .menu-lateral {
        position: fixed; top: 0; left: -280px; bottom: 0;
        width: 280px; background: var(--blanco);
        z-index: 2001; transition: left 0.3s ease;
        box-shadow: 2px 0 20px rgba(0,0,0,0.2);
        display: flex; flex-direction: column;
    }
    .menu-lateral.abierto { left: 0; }

    .menu-header {
        background: linear-gradient(135deg, var(--naranja), var(--rojo));
        padding: 30px 20px; color: white;
    }
    .menu-header h2 { margin: 0; font-size: 1.3rem; }
    .menu-header p { margin: 5px 0 0; opacity: 0.9; font-size: 0.85rem; }

    .menu-items {
        flex: 1; padding: 10px 0;
    }
    .menu-item {
        display: flex; align-items: center; gap: 15px;
        padding: 16px 20px; cursor: pointer;
        transition: background 0.2s; border: none; background: none;
        width: 100%; text-align: left; font-size: 1rem; color: var(--texto);
    }
    .menu-item:hover, .menu-item:active { background: var(--fondo); }
    .menu-item i { width: 24px; text-align: center; color: var(--naranja); }

    .menu-footer {
        padding: 20px; border-top: 1px solid #eee;
        font-size: 0.8rem; color: var(--gris); text-align: center;
    }

    /* HEADER */
    .header {
        position: absolute; top: 12px; left: 12px; right: 12px;
        z-index: 1000; display: flex; justify-content: space-between; align-items: center;
        pointer-events: none;
    }

    .menu-btn {
        background: var(--blanco); color: var(--naranja);
        width: 44px; height: 44px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        pointer-events: auto; cursor: pointer; border: none;
        box-shadow: var(--sombra); font-size: 1.2rem;
    }

    .logo-tag {
        background: var(--blanco); padding: 10px 18px;
        border-radius: 25px; border: 2px solid var(--celeste);
        font-weight: 800; color: var(--celeste); font-size: 0.85rem;
        box-shadow: var(--sombra); pointer-events: auto;
    }

    .btn-mi-ubicacion {
        position: absolute; bottom: 30%; right: 15px;
        z-index: 1000; width: 50px; height: 50px;
        background: var(--blanco); border: none; border-radius: 50%;
        box-shadow: var(--sombra); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: var(--celeste); font-size: 1.3rem;
    }

    /* PANEL INFERIOR */
    .panel {
        position: absolute; bottom: 0; left: 0; right: 0;
        z-index: 1000; background: var(--blanco);
        border-radius: 24px 24px 0 0;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        padding: 15px 20px 25px;
        max-height: 30vh;
        overflow-y: auto;
    }

    .panel-handle {
        width: 40px; height: 4px; background: #ddd;
        border-radius: 2px; margin: 0 auto 12px;
    }

    /* BUSCADOR INTELIGENTE */
    .buscador-container {
        position: relative; margin-bottom: 10px;
    }

    .input-row {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px;
        background: var(--fondo); border-radius: 14px;
        border: 2px solid transparent; transition: all 0.2s;
    }

    .input-row:focus-within { border-color: var(--naranja); background: #fff8f3; }

    .input-row i { 
        width: 24px; text-align: center; 
        font-size: 1.1rem; color: var(--celeste);
    }

    .input-row input {
        flex: 1; border: none; background: transparent;
        font-size: 1rem; outline: none; color: var(--texto);
    }

    .sugerencias {
        position: absolute; top: 100%; left: 0; right: 0;
        background: var(--blanco); border-radius: 14px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        max-height: 200px; overflow-y: auto;
        z-index: 1500; display: none;
        margin-top: 5px;
    }

    .sugerencias.activo { display: block; }

    .sugerencia-item {
        padding: 12px 16px; cursor: pointer;
        border-bottom: 1px solid #f0f0f0;
        display: flex; align-items: center; gap: 10px;
    }

    .sugerencia-item:last-child { border-bottom: none; }
    .sugerencia-item:hover { background: var(--fondo); }
    .sugerencia-item i { color: var(--celeste); font-size: 0.9rem; }
    .sugerencia-item .sug-text { font-size: 0.9rem; }
    .sugerencia-item .sug-zona { font-size: 0.75rem; color: var(--gris); }

    .btn-principal {
        width: 100%; padding: 16px;
        background: var(--rojo); color: white;
        border: none; border-radius: 16px;
        font-size: 1.1rem; font-weight: 800;
        text-transform: uppercase; letter-spacing: 0.5px;
        cursor: pointer; box-shadow: 0 6px 20px rgba(230,30,43,0.35);
        display: flex; align-items: center; justify-content: center; gap: 10px;
        margin-top: 10px; transition: all 0.2s;
    }

    .btn-principal:active { transform: scale(0.97); }
    .btn-principal:disabled { background: #ccc; box-shadow: none; }

    .estado-viaje { display: none; }
    .estado-viaje.activo { display: block; animation: slideUp 0.4s ease; }

    .estado-header {
        text-align: center; padding: 8px 0 15px;
    }

    .estado-header .icono-grande {
        font-size: 3rem; margin-bottom: 8px;
    }

    .estado-header h2 { margin: 0; font-size: 1.2rem; color: var(--texto); }
    .estado-header p { margin: 4px 0 0; color: var(--gris); font-size: 0.9rem; }

    .spinner {
        width: 40px; height: 40px;
        border: 4px solid #eee; border-top-color: var(--naranja);
        border-radius: 50%; animation: spin 0.8s linear infinite;
        margin: 0 auto 10px;
    }

    .info-conductor {
        background: var(--fondo); border-radius: 16px;
        padding: 14px; margin: 12px 0;
    }

    .info-conductor .fila {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 8px;
    }

    .info-conductor .fila:last-child { margin-bottom: 0; }

    .avatar {
        width: 45px; height: 45px; border-radius: 50%;
        background: linear-gradient(135deg, var(--naranja), var(--rojo));
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 1.3rem; font-weight: bold;
    }

    .datos-conductor h4 { margin: 0; font-size: 1rem; }
    .datos-conductor p { margin: 2px 0 0; color: var(--gris); font-size: 0.8rem; }

    .btn-secundario {
        width: 100%; padding: 12px;
        background: transparent; color: var(--gris);
        border: 2px solid #ddd; border-radius: 14px;
        font-size: 0.95rem; font-weight: 600; cursor: pointer;
        margin-top: 8px;
    }

    .btn-llamar {
        background: var(--verde); color: white; border: none;
    }

    .tarifa-box {
        background: linear-gradient(135deg, var(--naranja), #ff9a44);
        border-radius: 14px; padding: 14px; margin: 12px 0;
        color: white; text-align: center;
        box-shadow: 0 4px 15px rgba(244,121,32,0.3);
    }

    .tarifa-box .precio {
        font-size: 1.8rem; font-weight: 800; margin: 5px 0;
    }

    .tarifa-box .detalle {
        font-size: 0.8rem; opacity: 0.9;
    }

    .ruta-real {
        background: var(--fondo); border-radius: 12px;
        padding: 10px 14px; margin: 8px 0;
        font-size: 0.85rem; color: var(--gris);
    }

    .ruta-real i { color: var(--naranja); margin-right: 8px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
