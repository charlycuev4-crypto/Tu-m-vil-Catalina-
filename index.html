<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero - Las Catalinas #53</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root { --naranja: #f47920; --celeste: #0093d0; --rojo: #e61e2b; --fondo: #1a1a1a; --blanco: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--fondo); color: var(--blanco); overflow: hidden; }
        #map { height: 60vh; width: 100%; border-bottom: 4px solid var(--naranja); }
        .interface { height: 40vh; background: #2d2d2d; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .input-group { background: rgba(244, 121, 32, 0.1); border: 1px solid var(--naranja); border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-group i { color: var(--celeste); width: 20px; text-align: center; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1rem; }
        .btn-pedir { background: var(--rojo); color: white; border: none; border-radius: 50px; padding: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(230, 30, 43, 0.3); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="interface">
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="nombre" placeholder="¿Cuál es tu nombre?"></div>
        <div class="input-group"><i class="fas fa-map-marker-alt"></i><input type="text" id="dir" placeholder="Dirección de salida"></div>
        <div class="input-group"><i class="fas fa-info-circle"></i><input type="text" id="ref" placeholder="Ref: Portón, color de casa, etc."></div>
        <button class="btn-pedir" onclick="enviarPedido()"><i class="fas fa-paper-plane"></i> SOLICITAR MÓVIL</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SB_URL = "https://efryvjjunfeoxhekvwza.supabase.co";
        const SB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmcnl2amp1bmZlb3hoZWt2d3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDEyODUsImV4cCI6MjA5MzQ3NzI4NX0.FgvwONdQhv6lr772YqKHDQ2gtqjZ7f_6BO4x-7wbOwM";

        const map = L.map('map', {zoomControl: false}).setView([-34.564, -58.770], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let marker = L.marker([-34.564, -58.770], {draggable: true}).addTo(map);

        async function enviarPedido() {
            const nombre = document.getElementById('nombre').value;
            const dir = document.getElementById('dir').value;
            const ref = document.getElementById('ref').value;
            const coords = marker.getLatLng();

            if (!nombre || !dir) { alert("Por favor, completá nombre y dirección"); return; }

            const res = await fetch(`${SB_URL}/rest/v1/pedidos`, {
                method: "POST",
                headers: {
                    "apikey": SB_KEY,
                    "Authorization": `Bearer ${SB_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify({
                    pasajero: nombre,
                    origen: dir,
                    referencia: ref,
                    latitud: coords.lat,
                    longitud: coords.lng
                })
            });

            if (res.ok) {
                alert("¡Pedido enviado! El móvil #53 está en camino.");
            } else {
                alert("Error al enviar. Revisá la conexión.");
            }
        }
    </script>
</body>
</html>
