<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TuMovil Las Catalinas - Pasajero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
        }

        /* ===== 80% MAPA ===== */
        #mapa-container {
            height: 80vh;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        #mapa {
            height: 100%;
            width: 100%;
        }

        /* Overlay del mapa */
        .mapa-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .overlay-badge {
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        .overlay-badge.activo { background: rgba(17,153,142,0.9); }
        .overlay-badge.precio { background: rgba(102,126,234,0.9); font-size: 1rem; }

        /* Botón flotante para volver al menú */
        .btn-flotante {
            position: absolute;
            bottom: 20px;
            right: 15px;
            z-index: 1000;
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Marcador central fijo (crosshair) */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 500;
            pointer-events: none;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* ===== 20% MENÚ ===== */
        #menu-container {
            height: 20vh;
            width: 100%;
            background: white;
            border-radius: 20px 20px 0 0;
            position: relative;
            z-index: 10;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Handle de arrastre */
        .menu-handle {
            width: 40px;
            height: 4px;
            background: #ccc;
            border-radius: 2px;
            margin: 8px auto;
            flex-shrink: 0;
        }

        /* Contenido scrollable del menú */
        .menu-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 15px 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* Secciones del menú */
        .menu-seccion {
            display: none;
        }
        .menu-seccion.activa { display: block; }

        /* Inputs compactos */
        .campo-compacto {
            margin-bottom: 10px;
        }
        .campo-compacto label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 3px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .campo-compacto input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.05rem;
            transition: border-color 0.3s;
        }
        .campo-compacto input:focus { 
            outline: none; 
            border-color: #667eea; 
        }

        /* Sugerencias flotantes sobre el mapa */
        .sugerencias-flotante {
            position: absolute;
            bottom: 21vh;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 16px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 2000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        }
        .sugerencias-flotante.mostrar { display: block; }
        .sugerencia-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .sugerencia-item:hover { background: #f0f4ff; }
        .sugerencia-item .calle { 
            font-weight: 700; 
            color: #333; 
            font-size: 1rem; 
        }
        .sugerencia-item .zona { 
            font-size: 0.85rem; 
            color: #667eea; 
            margin-top: 2px;
        }
        .sugerencia-item .distancia {
            font-size: 0.75rem;
            margin-top: 2px;
        }
        .sugerencia-item .cerca { color: #2e7d32; }
        .sugerencia-item .lejos { color: #c62828; font-weight: 600; }

        /* Botones del menú */
        .btn-menu {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn-menu:active { transform: scale(0.97); }

        .btn-verde {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(17,153,142,0.3);
        }
        .btn-morado {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }
        .btn-gris {
            background: #f0f0f0;
            color: #555;
        }
        .btn-rojo {
            background: #ff6b6b;
            color: white;
        }
        .btn-naranja {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Precio en el menú */
        .precio-menu {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 12px;
        }
        .precio-menu .monto { 
            font-size: 2.2rem; 
            font-weight: 800; 
        }
        .precio-menu .info { 
            font-size: 0.85rem; 
            opacity: 0.9; 
            margin-top: 4px; 
        }

        /* Estado en el menú */
        .estado-menu {
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            margin-bottom: 12px;
        }
        .estado-buscando { background: #fff3cd; color: #856404; }
        .estado-asignado { background: #d4edda; color: #155724; }
        .estado-camino { background: #cce5ff; color: #004085; }
        .estado-menu .icono { font-size: 2rem; margin-bottom: 5px; }
        .estado-menu .texto { font-size: 1.1rem; font-weight: bold; }
        .estado-menu .subtexto { font-size: 0.8rem; margin-top: 4px; opacity: 0.8; }

        /* Info del conductor */
        .info-conductor {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.95rem;
            color: #333;
        }

        /* Mensajes */
        .mensaje-flotante {
            position: absolute;
            top: 60px;
            left: 15px;
            right: 15px;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 600;
            z-index: 3000;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .mensaje-flotante.mostrar { display: block; }
        .mensaje-ok { background: #d4edda; color: #155724; }
        .mensaje-error { background: #f8d7da; color: #721c24; }
        .mensaje-info { background: #e3f2fd; color: #1565c0; }

        /* Botón manual */
        .btn-manual {
            width: 100%;
            padding: 12px;
            background: #fff3e0;
            border: 2px dashed #ff9800;
            border-radius: 12px;
            color: #e65100;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            text-align: center;
        }
        .btn-manual:hover { background: #ffe0b2; }

        /* Header del menú */
        .menu-header {
            text-align: center;
            padding: 5px 0 10px 0;
        }
        .menu-header h2 {
            font-size: 1.1rem;
            color: #333;
        }
        .menu-header p {
            font-size: 0.8rem;
            color: #888;
        }

        /* Verificación */
        .verificacion-compacta {
            background: #f3e5f5;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #4a148c;
        }
        .verificacion-compacta strong { color: #0d47a1; }
    </style>
</head>
<body>
    <!-- MENSAJE FLOTANTE -->
    <div class="mensaje-flotante" id="mensaje"></div>

    <!-- ===== 80% MAPA ===== -->
    <div id="mapa-container">
        <div id="mapa"></div>

        <!-- Overlays -->
        <div class="mapa-overlay">
            <div class="overlay-badge" id="badgeEstado">🚕 TuMovil Las Catalinas</div>
            <div class="overlay-badge precio oculto" id="badgePrecio"></div>
        </div>

        <!-- Crosshair central -->
        <div class="crosshair" id="crosshair">📍</div>

        <!-- Botón flotante -->
        <button class="btn-flotante" id="btnCentrar" onclick="centrarMapa()" title="Centrar en mi ubicación">
            🎯
        </button>
    </div>

    <!-- SUGERENCIAS FLOTANTES -->
    <div class="sugerencias-flotante" id="sugerencias"></div>

    <!-- ===== 20% MENÚ ===== -->
    <div id="menu-container">
        <div class="menu-handle"></div>

        <div class="menu-scroll">

            <!-- PASO 1: DATOS -->
            <div class="menu-seccion activa" id="menuDatos">
                <div class="menu-header">
                    <h2>¿A dónde vas?</h2>
                    <p>Mové el mapa o escribí la dirección</p>
                </div>

                <div class="campo-compacto">
                    <input type="text" id="nombre" placeholder="👤 Tu nombre (Ej: Juan)" style="font-size:1rem;">
                </div>

                <div class="campo-compacto">
                    <input type="tel" id="telefono" placeholder="📞 Teléfono (Ej: 1133667793)" style="font-size:1rem;">
                </div>

                <div class="campo-compacto">
                    <input type="text" id="destino" placeholder="📍 Calle y número (Ej: Mitre 1234)" 
                           style="font-size:1rem;" autocomplete="off">
                </div>

                <button class="btn-manual" onclick="activarModoManual()">
                    ✋ ¿No encontrás tu dirección? Marcala en el mapa
                </button>

                <button class="btn-menu btn-morado" id="btnCotizar" onclick="cotizarViaje()">
                    💰 VER CUÁNTO CUESTA
                </button>
            </div>

            <!-- PASO 2: PRECIO -->
            <div class="menu-seccion" id="menuPrecio">
                <div class="menu-header">
                    <h2>✅ Verificá el destino</h2>
                    <p>Mové el mapa si no es exacto</p>
                </div>

                <div class="verificacion-compacta">
                    <p>🏁 <strong>Hasta:</strong> <span id="destinoConfirmado">-</span></p>
                    <p>📏 <strong>Distancia:</strong> <span id="distanciaConfirmada">-</span> km</p>
                </div>

                <div class="precio-menu">
                    <div class="monto" id="precioMonto">$0</div>
                    <div class="info" id="precioInfo">Calculando...</div>
                </div>

                <button class="btn-menu btn-verde" id="btnSolicitar" onclick="solicitarViaje()">
                    🚕 ¡PEDIR MÓVIL!
                </button>
                <button class="btn-menu btn-gris" onclick="volverAtras()">
                    ← CAMBIAR DIRECCIÓN
                </button>
            </div>

            <!-- PASO 3: ESTADO -->
            <div class="menu-seccion" id="menuEstado">
                <div class="estado-menu estado-buscando" id="cajaEstado">
                    <div class="icono" id="estadoIcono">🔍</div>
                    <div class="texto" id="estadoTexto">Buscando móvil...</div>
                    <div class="subtexto" id="estadoSubtexto">Unos segundos más</div>
                </div>

                <div id="infoConductor" class="info-conductor oculto">
                    👤 <strong id="nombreConductor">-</strong><br>
                    🚗 <span id="autoConductor">-</span>
                </div>

                <button class="btn-menu btn-rojo" onclick="cancelarViaje()">
                    ❌ CANCELAR
                </button>
            </div>

        </div>
    </div>

    <script>
        // CONFIG SUPABASE
        const SUPABASE_URL = 'https://hinqiuvbwygqhbabvxrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbnFpdXZid3lncWhiYWJ2eHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODIyMzIsImV4cCI6MjA5NTA1ODIzMn0.wdnO33BVRtJ9-va3iqiAdWCttkAzpL5K1-b4vtyDvJA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const BASE_LAT = -34.6404;
        const BASE_LNG = -58.7145;
        const RADIO_COBERTURA_KM = 35;

        const ZONAS_CERCANAS = [
            'moreno', 'san miguel', 'castelar', 'morón', 'moron',
            'ituzaingó', 'ituzaingo', 'merlo', 'paso del rey',
            'haedo', 'ramos mejía', 'ramos mejia', 'el palomar',
            'ciudadela', 'jose c paz', 'jose c. paz',
            'trujui', 'francisco alvarez', 'cuartel v', 'la reja',
            'parque leloir', 'villa tesei', 'william morris',
            'libertad', 'general rodriguez', 'mariano acosta',
            'gregorio de laferrere', 'gonzalez catan', 'virrey del pino'
        ];

        let viajeId = null;
        let subscription = null;
        let precioCalculado = 0;
        let distanciaKm = 0;
        let destinoTexto = '';
        let destinoCoords = null;
        let mapa = null;
        let marcadorBase = null;
        let marcadorDestino = null;
        let modoManual = false;
        let circuloCobertura = null;

        // ========== INICIALIZAR MAPA ==========
        function initMapa() {
            mapa = L.map('mapa', {
                zoomControl: true,
                attributionControl: false
            }).setView([BASE_LAT, BASE_LNG], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(mapa);

            // Marcador de la base
            marcadorBase = L.marker([BASE_LAT, BASE_LNG], {
                icon: L.divIcon({
                    className: 'custom-div-icon',
                    html: '<div style="background:#1976d2;color:white;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:bold;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3);">🚕 BASE</div>',
                    iconSize: [80, 30],
                    iconAnchor: [40, 15]
                })
            }).addTo(mapa).bindPopup('Base Las Catalinas');

            // Círculo de cobertura
            circuloCobertura = L.circle([BASE_LAT, BASE_LNG], {
                color: '#667eea',
                fillColor: '#667eea',
                fillOpacity: 0.08,
                radius: RADIO_COBERTURA_KM * 1000,
                weight: 2,
                dashArray: '10, 10'
            }).addTo(mapa);

            // Escuchar movimiento del mapa en modo manual
            mapa.on('moveend', function() {
                if (modoManual) {
                    const centro = mapa.getCenter();
                    destinoCoords = { lat: centro.lat, lng: centro.lng };
                    reverseGeocoding(centro.lat, centro.lng);
                }
            });
        }

        // ========== DISTANCIA ==========
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function estaEnZona(lat, lng, nombre) {
            const d = calcularDistancia(BASE_LAT, BASE_LNG, lat, lng);
            const esZona = ZONAS_CERCANAS.some(z => nombre.toLowerCase().includes(z));
            return { dentro: d <= RADIO_COBERTURA_KM || esZona, distanciaKm: d.toFixed(1) };
        }

        // ========== REVERSE GEOCODING ==========
        async function reverseGeocoding(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
                const res = await fetch(url);
                const data = await res.json();
                if (data && data.display_name) {
                    destinoTexto = data.display_name;
                    const a = data.address;
                    const calle = a.road || '';
                    const num = a.house_number || '';
                    const loc = a.city || a.town || a.suburb || '';
                    const corto = `${calle} ${num}, ${loc}`.replace(/^ ,/, '').replace(/,$/, '').trim();
                    document.getElementById('destino').value = corto || data.display_name.split(',')[0];
                }
            } catch(e) {}
        }

        // ========== AUTOCOMPLETADO ==========
        let timeoutBusqueda = null;
        document.getElementById('destino').addEventListener('input', function(e) {
            const texto = e.target.value.trim();
            const sug = document.getElementById('sugerencias');
            clearTimeout(timeoutBusqueda);

            if (texto.length < 3) { sug.classList.remove('mostrar'); return; }

            timeoutBusqueda = setTimeout(async () => {
                try {
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(texto)}&limit=8&addressdetails=1&countrycodes=ar&bounded=1&viewbox=${BASE_LNG-0.5},${BASE_LAT+0.5},${BASE_LNG+0.5},${BASE_LAT-0.5}`;
                    const res = await fetch(url);
                    const datos = await res.json();

                    if (datos.length === 0) {
                        sug.innerHTML = `<div class="sugerencia-item" style="color:#888;text-align:center;padding:20px;">No encontramos esa dirección.<br><small>Usá "Marcar en el mapa"</small></div>`;
                        sug.classList.add('mostrar');
                        return;
                    }

                    const resultados = datos.map(l => {
                        const info = estaEnZona(parseFloat(l.lat), parseFloat(l.lon), l.display_name);
                        return {...l, distanciaBase: info.distanciaKm, enCobertura: info.dentro};
                    }).sort((a,b) => {
                        if (a.enCobertura && !b.enCobertura) return -1;
                        if (!a.enCobertura && b.enCobertura) return 1;
                        return a.distanciaBase - b.distanciaBase;
                    }).slice(0, 5);

                    sug.innerHTML = resultados.map(l => {
                        const calle = l.address.road || l.display_name.split(',')[0];
                        const num = l.address.house_number ? ` ${l.address.house_number}` : '';
                        const loc = l.address.city || l.address.town || l.address.suburb || 'Buenos Aires';
                        const partido = l.address.county || '';
                        const zona = partido ? `${loc}, ${partido}` : loc;
                        const distClass = l.enCobertura ? 'cerca' : 'lejos';
                        const distText = l.enCobertura ? `🟢 ${l.distanciaBase} km` : `🔴 ${l.distanciaBase} km`;

                        return `<div class="sugerencia-item" onclick="seleccionarDireccion('${l.display_name.replace(/'/g,"\'")}',${l.lat},${l.lon})">
                            <div class="calle">${calle}${num}</div>
                            <div class="zona">📍 ${zona}</div>
                            <div class="distancia ${distClass}">${distText}</div>
                        </div>`;
                    }).join('');
                    sug.classList.add('mostrar');
                } catch(err) {}
            }, 300);
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('.campo-compacto')) document.getElementById('sugerencias').classList.remove('mostrar');
        });

        // ========== SELECCIONAR DIRECCIÓN ==========
        function seleccionarDireccion(direccion, lat, lng) {
            document.getElementById('destino').value = direccion.split(',')[0];
            document.getElementById('sugerencias').classList.remove('mostrar');
            destinoTexto = direccion;
            destinoCoords = { lat: parseFloat(lat), lng: parseFloat(lng) };
            modoManual = false;
            document.getElementById('crosshair').style.display = 'none';

            // Mover mapa al destino
            mapa.setView([lat, lng], 16);

            // Agregar marcador de destino
            if (marcadorDestino) mapa.removeLayer(marcadorDestino);
            marcadorDestino = L.marker([lat, lng], {
                icon: L.divIcon({
                    html: '<div style="background:#e53935;color:white;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:bold;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3);">📍 DESTINO</div>',
                    iconSize: [90, 30],
                    iconAnchor: [45, 15]
                })
            }).addTo(mapa).bindPopup('Tu destino');

            // Dibujar línea de ruta
            dibujarRuta();
        }

        // ========== MODO MANUAL ==========
        function activarModoManual() {
            modoManual = true;
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('sugerencias').classList.remove('mostrar');
            document.getElementById('destino').value = '';
            destinoTexto = '';

            // Quitar marcador anterior
            if (marcadorDestino) { mapa.removeLayer(marcadorDestino); marcadorDestino = null; }

            mostrarMensaje('📍 Mové el mapa. El punto rojo es tu destino.', 'info');

            // La primera vez, centrar en la base
            const centro = mapa.getCenter();
            destinoCoords = { lat: centro.lat, lng: centro.lng };
        }

        // ========== DIBUJAR RUTA ==========
        let lineaRuta = null;
        function dibujarRuta() {
            if (lineaRuta) mapa.removeLayer(lineaRuta);
            if (destinoCoords) {
                lineaRuta = L.polyline(
                    [[BASE_LAT, BASE_LNG], [destinoCoords.lat, destinoCoords.lng]],
                    { color: '#667eea', weight: 4, opacity: 0.7, dashArray: '8, 8' }
                ).addTo(mapa);
            }
        }

        // ========== CENTRAR MAPA ==========
        function centrarMapa() {
            if (destinoCoords) {
                mapa.setView([destinoCoords.lat, destinoCoords.lng], 16);
            } else {
                mapa.setView([BASE_LAT, BASE_LNG], 13);
            }
        }

        // ========== COTIZAR ==========
        async function cotizarViaje() {
            // Si está en modo manual, usar coordenadas del centro
            if (modoManual) {
                const centro = mapa.getCenter();
                destinoCoords = { lat: centro.lat, lng: centro.lng };
                if (!destinoTexto) {
                    await reverseGeocoding(centro.lat, centro.lng);
                }
            }

            const inputDestino = document.getElementById('destino').value.trim();
            const btn = document.getElementById('btnCotizar');

            if (!destinoCoords && !inputDestino) {
                mostrarMensaje('Escribí una dirección o marcala en el mapa', 'error');
                return;
            }

            if (!destinoCoords) {
                btn.disabled = true; btn.textContent = '⏳ Buscando...';

                try {
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(inputDestino)}&limit=5&addressdetails=1&countrycodes=ar&bounded=1&viewbox=${BASE_LNG-0.5},${BASE_LAT+0.5},${BASE_LNG+0.5},${BASE_LAT-0.5}`;
                    const res = await fetch(url);
                    const data = await res.json();

                    if (!data || data.length === 0) {
                        throw new Error('No encontramos esa dirección. Marcala en el mapa.');
                    }

                    let mejor = data[0], menor = Infinity;
                    for (const l of data) {
                        const d = calcularDistancia(BASE_LAT, BASE_LNG, parseFloat(l.lat), parseFloat(l.lon));
                        if (d < menor) { menor = d; mejor = l; }
                    }

                    destinoCoords = { lat: parseFloat(mejor.lat), lng: parseFloat(mejor.lon) };
                    destinoTexto = mejor.display_name;

                    // Mostrar en mapa
                    mapa.setView([destinoCoords.lat, destinoCoords.lng], 16);
                    if (marcadorDestino) mapa.removeLayer(marcadorDestino);
                    marcadorDestino = L.marker([destinoCoords.lat, destinoCoords.lng], {
                        icon: L.divIcon({
                            html: '<div style="background:#e53935;color:white;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:bold;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3);">📍 DESTINO</div>',
                            iconSize: [90, 30],
                            iconAnchor: [45, 15]
                        })
                    }).addTo(mapa);
                    dibujarRuta();

                } catch (e) {
                    mostrarMensaje(e.message, 'error');
                    btn.disabled = false; btn.textContent = '💰 VER CUÁNTO CUESTA';
                    return;
                }
            }

            btn.disabled = true; btn.textContent = '⏳...';

            try {
                const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${BASE_LNG},${BASE_LAT};${destinoCoords.lng},${destinoCoords.lat}?overview=false`;
                const osrmRes = await fetch(osrmUrl);
                const osrmData = await osrmRes.json();

                if (!osrmData.routes || osrmData.routes.length === 0) {
                    throw new Error('No pudimos calcular la ruta.');
                }

                const metros = osrmData.routes[0].distance;
                distanciaKm = parseFloat((metros / 1000).toFixed(1));
                precioCalculado = Math.round(3000 + (distanciaKm * 800));

                // Actualizar badge del mapa
                document.getElementById('badgePrecio').textContent = `$${precioCalculado.toLocaleString('es-AR')}`;
                document.getElementById('badgePrecio').classList.remove('oculto');

                // Actualizar menú
                document.getElementById('precioMonto').textContent = '$' + precioCalculado.toLocaleString('es-AR');
                const textoDist = distanciaKm < 3 ? 'Viaje corto' : distanciaKm < 8 ? 'Viaje mediano' : 'Viaje largo';
                document.getElementById('precioInfo').textContent = `${textoDist} • ${distanciaKm} km`;
                document.getElementById('destinoConfirmado').textContent = destinoTexto.split(',')[0] || 'Destino marcado en mapa';
                document.getElementById('distanciaConfirmada').textContent = distanciaKm;

                // Cambiar sección
                cambiarSeccion('menuPrecio');

            } catch (e) {
                mostrarMensaje(e.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = '💰 VER CUÁNTO CUESTA';
            }
        }

        // ========== CAMBIAR SECCIÓN ==========
        function cambiarSeccion(id) {
            document.querySelectorAll('.menu-seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        function volverAtras() {
            cambiarSeccion('menuDatos');
            document.getElementById('badgePrecio').classList.add('oculto');
            document.getElementById('crosshair').style.display = modoManual ? 'block' : 'none';
        }

        // ========== SOLICITAR VIAJE ==========
        async function solicitarViaje() {
            const nombre = document.getElementById('nombre').value.trim() || 'Pasajero';
            const telefono = document.getElementById('telefono').value.trim();
            const btn = document.getElementById('btnSolicitar');

            if (!telefono) {
                mostrarMensaje('Ingresá tu teléfono', 'error');
                document.getElementById('telefono').focus();
                return;
            }

            btn.disabled = true; btn.textContent = '⏳...';

            try {
                const { data, error } = await supabaseClient.rpc('crear_viaje', {
                    p_pasajero_nombre: nombre,
                    p_pasajero_telefono: telefono,
                    p_origen_lat: BASE_LAT,
                    p_origen_lng: BASE_LNG,
                    p_origen_direccion: 'Base Las Catalinas, Moreno',
                    p_destino_lat: destinoCoords.lat,
                    p_destino_lng: destinoCoords.lng,
                    p_destino_direccion: destinoTexto || 'Destino marcado en mapa',
                    p_distancia_km: distanciaKm,
                    p_precio_estimado: precioCalculado
                });

                if (error) throw error;

                viajeId = data;
                cambiarSeccion('menuEstado');
                document.getElementById('badgeEstado').textContent = '⏳ Buscando móvil...';
                document.getElementById('badgeEstado').classList.add('activo');
                mostrarMensaje('¡Listo! Buscando tu móvil', 'ok');

                if (subscription) subscription.unsubscribe();
                subscription = supabaseClient
                    .channel('viaje-' + viajeId)
                    .on('postgres_changes', { 
                        event: '*', schema: 'public', table: 'viajes', filter: 'id=eq.' + viajeId 
                    }, payload => { actualizarEstado(payload.new); })
                    .subscribe();

            } catch (e) {
                mostrarMensaje('Error: ' + e.message, 'error');
                btn.disabled = false; btn.textContent = '🚕 ¡PEDIR MÓVIL!';
            }
        }

        function actualizarEstado(viaje) {
            const caja = document.getElementById('cajaEstado');
            const icono = document.getElementById('estadoIcono');
            const texto = document.getElementById('estadoTexto');
            const subtexto = document.getElementById('estadoSubtexto');
            const badge = document.getElementById('badgeEstado');

            switch(viaje.estado) {
                case 'pendiente':
                    caja.className = 'estado-menu estado-buscando';
                    icono.textContent = '🔍'; texto.textContent = 'Buscando móvil...';
                    subtexto.textContent = 'Unos segundos más';
                    badge.textContent = '⏳ Buscando móvil...';
                    break;
                case 'aceptado':
                    caja.className = 'estado-menu estado-asignado';
                    icono.textContent = '✅'; texto.textContent = '¡Móvil asignado!';
                    subtexto.textContent = 'Va en camino';
                    badge.textContent = '✅ Móvil asignado';
                    if (viaje.conductor_nombre) {
                        document.getElementById('nombreConductor').textContent = viaje.conductor_nombre;
                        document.getElementById('autoConductor').textContent = viaje.conductor_auto || 'Móvil';
                        document.getElementById('infoConductor').classList.remove('oculto');
                    }
                    break;
                case 'en_camino':
                    caja.className = 'estado-menu estado-camino';
                    icono.textContent = '🚗'; texto.textContent = '¡Está llegando!';
                    subtexto.textContent = 'Mirá por la ventana';
                    badge.textContent = '🚗 Tu móvil llega';
                    break;
                case 'completado':
                    caja.className = 'estado-menu estado-asignado';
                    icono.textContent = '🎉'; texto.textContent = '¡Llegaste!';
                    subtexto.textContent = 'Gracias por viajar con nosotros';
                    badge.textContent = '🎉 Viaje completado';
                    break;
                case 'cancelado':
                    caja.className = 'estado-menu estado-buscando';
                    icono.textContent = '❌'; texto.textContent = 'Cancelado';
                    subtexto.textContent = 'Podés pedir otro';
                    badge.textContent = '❌ Cancelado';
                    break;
            }
        }

        function cancelarViaje() {
            if (confirm('¿Cancelar el viaje?')) {
                mostrarMensaje('Viaje cancelado', 'ok');
                setTimeout(() => location.reload(), 2000);
            }
        }

        function mostrarMensaje(texto, tipo) {
            const msg = document.getElementById('mensaje');
            msg.textContent = texto;
            msg.className = 'mensaje-flotante mensaje-' + tipo + ' mostrar';
            setTimeout(() => msg.classList.remove('mostrar'), 5000);
        }

        // ========== INICIAR ==========
        window.addEventListener('load', initMapa);
    </script>
</body>
</html>
